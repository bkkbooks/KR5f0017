body:
  text: 二方二州二部三家迎陰家水亦準咸入迎次二日舍輿鬼陰氣成形乎下物咸溯而迎之遡音素宋曰遡向也初一迎他匪應無貞有邪測曰迎他匪應非所與并也王曰處迎之初而失位當夜迎之不以其道者也物之非其宜應而往迎之則失正而陷邪也光謂迎準咸咸感也一為思始而當夜感於外物而非正應者也次二蛟潜於淵陵卵化之人或陰言百姓和之測曰蛟潜之化中精誠也王本或作有小宋本人或陰言作人言或陰今從宋陸范本和胡卧切范曰蛟潜於水産卵高陵下復於淵氣應相感然後剖化光謂二為思中而當晝君子精誠之至無所不通也易曰鳴鶴在陰其子和之次三精微往來妖先靈覺測曰精微往來妖咎徵也三為思終而當夜天人之際精祲相感人失其道妖靈先覺也次四裳有衣襦男子目珠婦人喋鈎貞測曰裳有衣襦陰感陽也王本感作盛今從諸家襦音儒短衣也喋色甲切吳本作嚏音帝次五黃乘否貞測曰黃乘否貞不可與朋也乘時證切王曰五雖居中而處陰當夜不正而乘中位故曰黃乘否貞光謂不正當位不足合也次六玄黃相迎其意感感測曰玄黃相迎以類應也范曰天玄地黃天地相迎則風雨時調君臣相迎則政教以度光謂六為極大感之盛也自天地至於萬物君臣上下夫婦朋友無不以類相應也次七遠之𥅠近之掊迎父迦逅測曰遠𥅠近掊失父類也小宋𥅠作䀨今從諸家𥅠許候切怒目視貌掊普后切擊也迦與邂同音蟹逅音后不期而會也次八見血入門撫迎中庭測曰見血入門以賢自衛也宋陸本撫作椒今從范王本撫音府捍也八為禍中故曰見血入門傷之者至也當日之晝能以賢自衛迎拒之於中庭物不能傷故曰撫迎中庭上九濕迎牀足纍于墻屋測曰濕迎牀足顛在內也小宋王本濕作澤今從宋陸范本范王本纍作罦范曰罦覆也今從宋陸本宋陸范本顛作願今從王本纍良瑞切九為禍極而當夜小人女子所以能傾國家者非一朝一夕之故其所由來者漸矣如濕氣之迎牀足浸潤而上將纍及墻屋而不可如何究其顛沛之原自內興也一方二州三部一家遇陽家火準姤入遇初一日舍柳陰氣始來陽氣始往往來相逢初一幽遇神及師夢貞測曰幽遇神思得理也王曰居遇之初神遇而未形冥交神會之象光謂一為思始而當晝精誠感通故遇神及師雖或發於夢寐而不失其正若高宗夢傅說是也夢者事之難據者也精誠之至猶得正而可據况僉謀師錫者乎次二衝衝兒遇不定之諭測曰衝衝兒遇不肖子也范本不定之諭作不受定之諭今從諸家王曰無心而遇曰衝衝兒者黃昏無知之稱也則其所遇何定之有乎所以然者失位當夜不得遇之宜也不肖子者明非有知之兒次三不往不來得士女之貞測曰不往不來士女則也范王本不往不來作不往不來不求測曰不往不求今從宋陸本宋曰則法也光謂自炫自媒者士女之醜行故不往不來而自遇乃士女之正也次四㒁㒁兑人遇雨厲測曰兑人遇雨還自賊也王曰㒁㒁勇而無禮之貌次五田遇禽人莫之禁測曰田遇禽誠可勉也五為盛福而當晝如田遇禽獲則取之誰能禦也次六俾蛛罔罔遇蜂利雖大不得從測曰蛛之罔害不遠也蜂與蜂同范曰使蜘蛛設罔而得於蜂蜂螫蟲也所以不能制雖以為利不得從而取也光謂六為上祿而當夜小人見利鋭於進取而不得所欲者也次七振其角君父遇辱匪正命測曰振其角直道行也七為禍始而當晝如君父不幸遇辱則君子振角直道而行死之可也雖非正命而死義不得不爾次八兩兕鬭一角亡不勝喪測曰兩兕鬭亡角喪也勝詩證切喪息浪切八為禍中而當夜如兩兕相遇方鬭而一亡其角必不勝而喪身矣角以諭禦侮之士也上九或氏其角遇下毁足測曰或氏其角何可當也范王本或氐其角作抵其角今從宋陸本抵都禮切二方二州三部二家竈陰家木準鼎入竈次九二十八分二十八秒日次鶉火小暑氣應斗建未位律中林鐘鼎大烹以養聖賢故竈多養賢之象陰雖沃而灑之陽猶執而和之和古和字下同宋曰竈以和陰陽者也故或沃之或和之於是乎在光謂陰灑陽和有炊爨之象初一竈無實乞于鄰測曰竈無實有虛名也王曰處竈之初失位當夜無實者也既失烹飪之道無以供食故乞于鄰光謂一為思始而當夜小人內無其實竊它人之善以為己名者也次二黃鼎介其中裔不飲不食孚無害測曰黃鼎介中廉貞也王曰鼎者竈之器也介然特立之貌其中裔者寬容虛受之義也光謂二在下體之中而當晝位為方沮未及下祿君子守其中道隱居自養而不苟食者也內養其志不慕外物故雖不飲不食亦信無所害也次三竈無薪黃金瀕測曰竈無薪有不用也瀕音頻次四鬲實之食得其勞力測曰鬲實之食時我奉也鬲音歷王曰鬲釜之小者光謂鼎款足者謂之鬲四為下祿而當晝君子以祿養賢雖少亦得其勞力也時我奉者賢者得時則仕也次五鼎大可觴不齊不莊測曰鼎大可觴饗無意也齊側皆切王曰無大饗齊莊之意光謂觴當作鬺音商煮也五居盛位可以養賢故曰鼎大可鬺而當日之夜不能以禮待天下之士則士皆莫肯歸之矣洪範曰凡厥正人既富方穀次六五味和調如美如大人之饗測曰味和之饗宰輔事也王本美作羹小宋本作五味和調滋如美如今從宋陸范本王曰宰相之事調和五味大人任得其人饗之而已光謂六為上祿而當晝君子輔佐國家獻可替否進賢退不肖燮和其政調美如羹獻之於君而君響之則天下大治矣高宗命說曰若作和羹爾惟鹽梅三公承君有鼎之象次七脂牛正肪不濯斧而烹則歐之疾至測曰脂牛歐不潔志也肪音方歐烏后切哀都切范曰歐吐逆之聲也王曰脂牛肥牛也光謂肪脂也歐吐也心有所惡而吐也肥牛之脂以諭美祿也人君雖以美祿養士若不以誠潔之志將之則士斯惡之矣七為禍始失士心之象也次八食其委雖噭不毁測曰食其委蒙厥德也委於僞切噭與呌同上九竈滅其火唯家之禍測曰竈滅其火國之賊也竈滅火以諭不養賢也不養賢者自賊其國者也桀殺關龍逢紂殺比干夫差殺伍員項羽逐范增之類皆是也二方二州三部三家大陽家金準豐陰虛在內陽蓬其外物與盤蓋范王本在內作其內今從宋陸本范本蓬作逢今從二宋陸王本宋曰蓬猶盛也光謂與皆也物皆如盤蓋外隆大而內虛也初一淵潢洋包無方冥測曰淵潢洋資裹無方也王本裹作懷今從諸家潢音黃一為水又為思始而當晝君子之心如淵潢洋無所不包所以為大也居下體之下冥者隱而未見也次二大其慮躬自爐測曰大其慮為思所傷也爐音慮王曰處大之時失位當夜乖於其宜徒欲廣大其慮而智不能周反傷其躬也爐者錯磨之具錯磨太過必有所傷光謂二為思中而當夜小人智小而謀大者也詩云無田甫田維莠驕驕次三大不大利以成大測曰大不大以小作基也王曰得位當晝故能大不自大以謙虛自保利用積小以成其高大光謂三為思上而當晝君子志大而心小故能成其大也次四大其門郊不得其刀鳴虛測曰大其門郊實去名來也王曰有聲無實故曰鳴虛光謂門在外郊在遠刀所以斷鳴者名聞之謂也四為外他而當夜小人不治其內而務大其外故曰大其門郊言遺近而務遠也不得其刀不能斷也雖聲名遠聞其實內虛也次五包荒以中克測曰包荒以中督九夷也王本九作四今從諸家范曰克能也光謂五居盛位而當晝聖人執大中之道能懷服四海者也次六大失小多失少測曰大失小禍由微也王本測作禍中發今從諸家范曰六水也水之所失在於隙穴事從細生禍由微起光謂六過中而當夜大之始失者也次七大奢迂自削以觚或益之餔測曰奢迂自削能自非也觚奇孤餔博孤切范曰觚法也光謂奢猶哆也迂遠也餔食也七為禍始而當晝大已過甚至于哆遠君子見微知禍將至能以法自裁制則更受福祿故曰或益之餔也次八豐墻峭址三歲不築崩測曰豐墻之峭崩不遲也址與趾同范曰豐大也峭峻也址足也謂基也三終也墻大基峻若不終歲加之板築則有崩墜之憂猶君子之道不隆其本末必危也光謂八處禍中而當夜小人不知禍至務自張大而不顧其本者也三者數之成也上九大終以蔑否出天外測曰大終以蔑小為大資也王本無以字測曰大終蔑否今從諸家宋陸范本資皆作質今從虞王本二方三州一部一家廓陰家水亦準豐入廓次四日舍七星陰氣而𢙅之陽猶恢而廓之宋陸本作陰應匿而𢙅之今從范王本陳曰苦協切𢙅音合是以為字也吳曰於計切靜也然則字當從宋曰𢙅之言翕也謂是時陰氣應時翳匿之於下陽氣猶盛壯而廓之於上也圖曰虛中弘外存乎廓范曰協也𢙅合也王曰陰氣尚弱潜而𢙅合之𢙅古歙字光謂陰氣翳匿閉合萬物而陽氣尚務恢廓之故曰廓也廓者張大之意也初一廓之恢之不正其基測曰廓之恢之始基傾也王曰處廓之初而失位當夜雖然恢廓之而不能自正其始光謂一為思始而當夜小人務自恢廓而不正其基故動則傾也次二金幹玉楨廓于城測曰金幹玉楨蕃輔正也范曰金玉者皆其美質也王曰二居下體之中得位當晝金玉以為楨幹得賢之謂也楨幹者板築之具也光謂板築之具旁曰幹題曰楨二為思中而當晝君子能以賢哲為輔恢廓其德以自衛也次三廓無子室石婦測曰廓無子焉得後生也王曰室於石女無復嗣續之道光謂三為思上而當夜小人思慮恢廓而後不能繼故曰廓無子也室石婦謂求室而得石婦也次四恢其門户用圉寇虜測曰恢其門户大經營也范本用圉作以禦王本作用固小宋作用禦今從宋陸本圉與禦同四為外它而當晝君子恢其禮義以禦小人者也故曰恢其門户用圉寇虜次五天門大開恢堂之階或生之差測曰天門大開德不能滿堂也王本恢堂作恢當二宋陸王測無堂字今從范本五在廓家而當盛位故曰天門大開恢堂之階言通達而尊高也然當日之夜小人不能享此盛福德不能充其位必有差失以致顛覆也次六維豐維崇百辟馮馮伊德攸興測曰維豐維崇兹太平也王本兹作欲今從諸家馮古憑字馮馮盛多貌六為極大而當晝君子恢廓其德以致太平豐大崇高萬邦率服馮馮盛多駿奔輻凑者也次七外大杚其中失君子至野小人入室測曰外大杚中無人也范小宋杚作扢今從宋陸王本宋陸本入室作至室王作在室今從范本陳曰扢音訖摩也王曰杚者斗概木也吳曰扢與概同柯愛切說文古沒切平也光謂扢當作圪魚乙切高壯貌七在廓家而居上體故曰外大圪言廓大而高壯也然當日之夜小人處大而驕遠賢能近不肖亂自內興者也故曰其中失君子至野小人入室也一曰扢許訖切喜也次八廓其外虛其內利鼓鉦測曰廓外虛內乃能有聞也八居外而當晝君子廓外以昭德虛內以納物故能令名遠聞譬如鼓鉦亦外廓內虛而能有聲也君子之德在外而恢廓者惟令名也上九極廓于高庸三歲無童測曰極廓高庸終無所臣也庸與墉同王曰處廓之極失位當夜雖能恢廓其垣墉而中無童役可使高而無人悔可知矣光謂九居上極而當夜小人務自恢廓崇高而不知止者也故曰廓于高庸不能降意接下則下將叛之故曰三歲無童二方三州一部二家文陽家火準涣楊子蓋以涣為焕故名其首曰文入文次九日舍張陰斂其質陽散其文文質班班萬物粲然初一夾何縵王貞測曰夾何縵文在內也夾乞洽切與繢同音會何下可切縵莫旦切夾襟也畫也何被也繒無文曰縵一為思始而當晝君子內文外質如施畫於襟而被以縵服純素含章如玉之正美之至也中庸曰衣錦尚絅惡其文之著也次二文蔚質否測曰文蔚質否不能俱睟也王曰文之為體當文質彬彬二位當夜既無其質文雖蔚然不足美也睟純美也光謂蔚細縟貌二為思中而當夜小人文華雖美而實不能副也寧嬴謂處父華而不實怨之所聚也次三大文彌朴孚似不足測曰大文彌朴質有餘也王本彌作珍朴作璞今從二宋陸范本孚大信也三為思終而當晝君子大文似朴大信似不足次四斐如邠如虎豹文如匪天之享否測曰斐邠之否奚足譽也邠與彬同否音鄙范曰虎豹之獸以其文貴斐邠者文盛貌也王曰四失位當夜蓋同虎豹以文害其躬匪天所享故曰否也享嚮也次五炳如彪如尚文昭如車服庸如測曰彪如在上天文炳也王本尚文作質文今從宋陸范本王曰五居中體正得位當晝為文明之主焕然可觀也光謂尚文昭如聖王貴尚禮文昭然明辨也車服庸如言以車服表顯賢者之功庸也用文之大莫過於此舜典曰敷納以言明試以功車服以庸次六鴻文無范恣于川測曰鴻文無范恣意往也范曰范法也光謂鴻雁之飛偶有文字之象而無也遇川則自恣而已六過中而當夜小人之文無法而妄為者也次七雉之不祿而雞藎穀測曰雉之不祿難幽養也宋陸本而雞藎穀作而不雞藎穀王本無而字測不祿皆作不雞今從范本藎徐刃切王曰七雖過滿而得位當晝如翟雉有文采而懷耿潔之性不受人之馴養故曰不祿終不若雞之進食其穀也藎進也光謂七在外體而當晝君子有文而耿介避世而不仕者也七為禍階故賢人隱也次八雕韯穀布亡于時文則亂測曰雕韯之文徒費日也王曰八居將極而失位當夜若務其雕韯之文無事費日俾穀之與布俱亡于時其文之弊乃為亂也光謂八為耗而當夜故有是象上九極文密密易以黼黻測曰極文之易當以質也王曰九居文極而得位當晝能易極文之弊者也文工之極至於密密然至韯至微而能易之使如黼黻之有制度也光謂九為盡弊而當晝故有是象白與黑謂之黼黑與青謂之黻黼黻雖文校於雕韯則為質也二方三州一部三家禮陰家木準履入禮次四六分三秒大暑氣應陰在下而陽在上上下正體物與有禮小宋本陽在上作陽益高今從諸家初一履于跂後其祖禰測曰履于跂退其親也宋陸本跂作跛今從范王本王曰居禮之初失位當夜是始而乖禮者也履于跂非敬之道也光謂跂舉踵也一居下體之下履之至卑者也乃欲舉踵彊高居下而僭上之象也凡臣之事君猶事父也事大君猶事祖也在下位而禮僭於上是猶退其祖父使居己後也不亦悖乎次二目穆穆足肅肅乃貫以棘測曰穆穆肅肅敬出心也王曰棘取赤心也光謂穆穆肅肅皆恭謹貌二為思中而當晝外貌之恭必貫之以誠然後善也次三畫象成形孚無成測曰畫象成形非其真也王曰忠信禮之本既乖於本何禮之有光謂三為思末而當夜飾外貌而無內實者也故曰畫象成形孚無成女叔齊謂魯昭公屑屑焉習儀以不可謂禮次四孔雁之儀用登于階測曰孔雁之儀可法則也虞曰雁飛成行孔雀亦成行也光謂孔雀有文章雁有行字皆威儀之象階諭進而登位也四為下祿而當晝君居位有威可畏有儀可象其下畏而愛之則而象之是以其教不肅而成其政不嚴而治也次五懷其違折其七過喪錫九矢測曰懷違折七貶其祿也王本過喪錫九矢作過鬯錫今從諸家范小宋本貶其祿作貶天祿王本作敗其祿今從宋陸本次六魚鱗差之乃大施之帝用登于天測曰魚鱗差之貴賤位也范小宋本大作失今從宋陸王本六為極大而當晝君子制禮使貴賤有序差若魚鱗執此道而大施之於天下天下莫不治也帝者用此則可以格于皇天矣次七出禮不畏入畏測曰出禮不畏人所棄也七為禍始而當夜小人逾越禮法而不顧者也由其不畏所以入畏謂陷刑戮也書曰弗畏入畏次八冠戚䏔履全履測曰冠戚履賤不可不上也二宋陸王本全作金今從范本宋陸本測曰冠戚履賤不可不正也范本冠戚䏔明不可上也王本冠戚䏔不可不上也今從小宋本范曰戚䏔以諭敗也冠雖敗宜加之首履雖全宜踐之足光謂八在上體而為禍中冠敗之象也當日之晝故下不能陵也上九戴無首焉用此九測曰無首之戴焉所往也焉於虔切九陽之盛也禮主卑讓故雖天子必有禮也九為亢極而當夜上無所戴高而必危譬如戴冠而無首焉用此盛極之位哉二方三州二部一家逃陽家金準遁陰氣章彊陽氣潜退萬物將亡宋曰謂萬物與陽盛衰者也於七分消卦為遁微陰在內欲出地矣王曰章明彊大初一逃水之夷滅其創迹測曰逃水之夷迹不創也一為思始而當晝君子避禍於未萌逃惡於未形制之於思慮之初人不見其迹則患難何由及焉譬如逃於水中水從而平夷其創迹皆合人不能見其際也次二心惕惕足金舄不志溝壑測曰心惕惕義不將也范本作𢞫王本作𢡕云古惕字今從二宋陸本宋陸金作含王本作望今從范小宋本宋曰將行也不能以義斷心而行也光謂金者堅固之象也二為思中而當夜小人雖睹禍之將至惕惕而懼不能以義自斷懷其寵祿滯留不去不知溝壑在於足下俄則顛躓也孔子曰見義不為無勇也次三兢其股鞭其馬寇望其户逃利測曰兢股鞭馬近有見也范本望作𧩆今從宋陸王本陳曰𧩆古望字宋曰近有見謂見寇已近也光謂三為思終而當晝逃得其宜者也兢其股懼也鞭其馬欲速去也寇望其户患將至也當是之時利於逃也次四喬木維摐飛烏過之或止降測曰喬木之鳥欲止則降也宋陸王本摐作樅今從范本或止降宋陸本作止之范本作或降今從王本范曰上撩稱摐上撩之木鳥所不集故過之而去光謂摐長密之貌四為下祿而當夜小人遁逃之志不堅遇美祿則止而不去故未免於患也次五見鷺踤于林獺入于淵征測曰見鷺及獺深居逃凶也范本鷺作鷺王本作鷺今從二宋陸本王本征作利征今從宋陸范本古隼字一本作鷹踤慈恤切宋曰鷺害鳥獺害魚吳踤踏也光謂五為中祿而當晝君子雖居顯位食厚祿見小人用事於朝知其必為禍亂則行而去之矣次六多田不婁費我膎功測曰多田不婁費力無功也宋陸本費作會今從范王本膎户佳切范曰孰食為膎王曰六居過滿失位當夜不得處逃之宜若田於多田而不婁理之徒費食與功而無益也光謂六為上祿為盛多為極大而當夜小人德薄位尊力少任重雖有盛大之資業不能修治賢者皆棄之而逃徒費食力安得成功也次七見于纍後乃克飛測曰見于纍幾不足高也幾音畿宋曰幾近也已見纍索僅然得免此用明近也王曰逃難之時而七居禍始逃而後時者也故見于纍然得位當晝能保終吉故後乃克飛免其患也君子雖見縻綴然亂邦不居終當自引遠去故曰後乃克飛也次八頸加于矰維䋚其繩測曰頸加維䋚無自勞也王曰䋚與翼同八失位當夜不能避患故首加于矰雖鼓翼於繩罔之中終無克飛之理光謂矰弋射之失也八為禍中而當夜不能遁逃遠禍矰已加於頸矣雖復奮翼掣曳其繩安得去哉徒自勞也上九利逃跰跰盜德嬰城測曰盜德嬰城何至逃也王本作德盜小宋本作盜得今從宋陸范本陳曰跰音瓶又蒲賢切字書跰胝皮堅也二方三州二部二家唐陰家士亦準遁陸曰唐蕩天下皆遁遁亦蕩也光謂唐猶蕩蕩無拘撿有喪失之意也陰氣兹來陽氣兹往物且蕩蕩宋曰兹益也陸曰蕩蕩空盡之貌也初一唐于內勿作厲測曰唐于內無執守也一為思始而當夜內無所守動則危矣次二唐處冥利用東征測曰唐冥之利利明道也冥昧也東者日所出也二為思中而處下體之內故曰唐處冥言其中心蕩蕩迷所適也然當日之晝君子能求明道以自進者也次三唐素不貞亡彼瓏玲測曰亡彼瓏玲非爾所也王曰瓏玲玉聲也次四唐無適道義之辟測曰唐無適惟義豫也適丁歷切下同辟必益切豫余吕切王曰四得位當晝得唐之宜蕩蕩然無適無莫惟以道義為辟知所之往唐之美也辟君也光謂適必然也四為條暢而當晝孔子曰君子之於天下也無適也無莫也義之與比故曰道義之辟言其最尊高也次五奔鹿懷鼷得不訾測曰奔鹿懷鼷不足功也范王本不足功作奚足功今從宋陸本吳曰鼷户雞切小鼠也王曰五居盛位當首主而失位當夜無君之德蕩然無守迷於利害之嚮逐鹿而奔又鼷鼠是顧則其所得不足以為資訾與資同次六唐不獨足代天班祿測曰唐不獨足無私容也王曰得位當晝為唐之主蕩然無私不求獨足與天下同其美利故可代天班布爵祿為時明君處唐之美莫過是矣光謂六為上祿為盛多而當晝君子不獨享天祿與天下賢雋共之次七弋彼三飛明明于征終日不歸亡測曰弋彼三飛適無所從也王曰居過滿而失位當夜不明於道自取危亡若一弋而求三飛無所適從自明而行至暮忘返蕩然昏昧復何益矣光謂七為失志而當夜小人二三其德從此失彼蕩無所守徒自勞苦自幼至老終無所得者也次八唐收祿社鬼輟哭或得其沐測曰唐收祿復亡也復符目切下同王曰得位當晝善於處唐之道故能復收其祿光謂八為禍中福祿已散然當日之晝能興衰起廢者也故曰唐收祿社稷之靈復得血食故輟哭民已枯瘁而復蒙潤澤故曰或得其沐也上九明珠彈于飛肉其得不復測曰明珠彈肉費不當也當丁浪切范曰飛肉禽鳥也珠至重鳥至輕以重求輕故不復也王曰九居亢極而失位當夜蕩蕩然門於大數者也如以珠彈雀所得不復其所亡也光謂九為禍極而當夜小人縱情極欲蕩然忘返者也二方三州二部三家常陽家水準恆入常次七二十三分二十六秒立秋氣應日次鶉尾斗建申位律中夷則次九日舍翼陰以知臣陽以知辟君臣之道萬世不易辟音壁宋曰辟君也此立秋之首也以秋承夏天道之常故於是時陰知為臣陽知為君光謂以秋承夏以陰承陽以臣承君之象也初一戴神墨履靈式以一耦萬終不稷測曰戴神墨體一形也王吳皆云稷與昊同墨式皆法也神靈尊之也一為思始而當晝君子之心執一以為常法應萬物變終無虧昊也易曰天下之動貞夫一者也次二內常微女貞厲測曰內常微女不正也王本作常內微今從諸家王曰處常之時當正君臣夫婦之道失位當夜是常以微賤之女處內不正之象且近於危故曰貞厲次三日常其德三歲不食測曰日常其德君道明也三為自如而當晝日常其德故免薄食之災君常其德故無狂僣之咎伊尹戒太甲作咸有一德次四月不常或失之行測曰月不常臣失行也行皆如字月有虧盈故曰不常行道也四為外他而當夜臣德不常則失道也次五其從其橫天地之常測曰其從其橫君臣常也從即容切范曰天從地橫是其常道也王曰五居中位為常之主得位當晝故從橫經緯皆合天地之常得萬世不易之道光謂五為中和常之盛也君臣之道相經緯也次六得七而九懦撓其剛不克常測曰得七而九棄盛乘衰也七陽之盛也九陽之衰也六過中而當夜棄盛乘衰也小人懦弱撓敗其剛不能守其常道也次七淹淹往來有常衰如克承貞測曰淹淹往來以正承非也次八常疾不疾咎成不語測曰常疾不疾不能自治也八為禍中而當夜常道久而有敝者也故曰常疾夫疾者自知其疾則尚可治也若不知其疾而惡必不可治矣小人不知其禍而惡聞之至於凶咎成不可復詰也上九疾其疾巫醫不失測曰疾其疾能自醫也王曰九居亢極而得位當晝能疾其疾者也善於自警則醫巫治之不失也醫巫諭賢者耳光謂九為禍終而當晝君子能思患而豫防之納忠求賢以自輔故禍可解也二方三州三部一家度陰家火準節法者為模度者為之分寸也陰氣日躁陽氣日舍躁躁舍舍各得其度舍音捨又如字宋曰躁動也舍藏王曰舍止也光謂躁謂進盛也舍謂陽退也躁者益躁舍者益舍各守常度也初一中度獨失測曰中度獨失不能有成也一為思始而當夜小人在心之度先已乖失安能有成也商晝曰若虞機張往省括于度則釋次二澤不舍冥中度測曰澤不舍乃能有正也次三小度差差大攋之階測曰小度差差大度傾也小宋陳吳本攋作䄤王本作傾今從宋陸范本范本測差差作之差今從宋陸王本攋音賴光謂攋也三為思終而當夜思不中度則事乖失矣故曰小度差差大攋之階言所失雖小所毁將大也次四幹楨利于城測曰幹楨之利利經營也范王于作于今從宋陸王本四為下祿而當晝君子既得其位常以法度為幹楨則可以保衛其民有所營為矣次五幹不幹攋于營測曰幹不幹不能有寧也王曰失位當夜不能為首之主幹而非幹之才則必傾其所經營矣光謂不度之人民無則焉猶幹之不幹將毁所經營不能有安也次六大度檢檢于天示象垂其范測曰大度檢檢垂象貞也范與範同王曰六居盛位度之大者得位當晝明于法制以度檢物則天之象而垂法於人也光謂君子之立法度非取諸心也乃觀象於天以垂範於世故曰天示象垂其范易曰天垂象聖人則之次七不度規之鬼即訾之測曰不度規之明察笑也訾音紫又即移切王曰七居過滿失位當夜是以不度之度為規制者也訾毁笑也贊云鬼訾測云明察幽明同笑故互文見義光謂七為敗損而當夜小人溢不以法度自規鬼所毁笑將降之禍也明察者莫若鬼人之愚者或未之知鬼先見其禍也次八石赤不奪節士之必測曰石赤不奪可與有要也要一遙切范曰石不可奪堅丹不可奪赤王曰八居度之將終得位當晝必能有所執守不改其度者也光謂要約也八為禍中而當晝君子雖遇禍亂不改其度秉志堅明不可移奪故可以與之有約謂寄百里之命托六尺之孤也上九積差之貸十年不復測曰積差之貸不得造也范本差作善今從二宋陸王本王本十作七今從諸家陸曰造至也王曰居度之終而失位當夜失度之極者也積其差失浸以乖遠貸者寬緩後於時也雖七年之久亦不可復其度也光謂貸當作吐得切與忒同差之甚者也易曰迷復凶至于十年不克征也二方三州三部二家永陽家木準同人二宋陸范王皆象恆吳曰常首象恆卦次七立秋初一當二百二十六日行張十五度於易期日恆卦九四次度首象節卦初一巳行翼二度次永首次七當二百三十八日行翼九度於易朞日同人卦今從之陰以武取陽以文與道可長久宋曰陰者刑氣故以武言之陽者德氣故以文言之武以濟文文以濟武陰陽取與之道也故其道可以長久初一不替不爽長子之常測曰不替不爽永宗道也王本替作朁云古僣字今從宋陸范本長知丈切永長久也有繼嗣之象替廢也一當日之晝得永之道者也先王之制立嫡以長所以安宗廟重社稷不替不爽萬世之常法也永久之道莫大於此次二內懷替爽永失貞祥測曰內懷替爽安可久也二當日之夜失永之道也昏惑之君違禮立愛以孽代宗內懷替爽之心於其長子如此則長失正善之道也次三永其道未得無咎測曰永其道誠可保也三為成意而當晝君子道業已成未躋祿位者也夫君子不患無位患所以立日新其道久而不倦雖未得福祿又何咎哉次四子序不序先賓永失主測曰子序不序非永方也王曰四近於五而以陰居陽位且當夜失其可久之道子而不居子之次序則祭祀賓客長無主矣故先賓永失主也次五三綱得于中極天永厥福測曰三綱之永其道長也王曰居中體正為首之主得位當晝有君之德是能使三綱皆得其中天之所助故永厥福也光謂三綱者君為臣綱父為子綱夫為妻綱五為中和而當晝王者正三綱以建皇極永保天祿次六大永于福反虛庭入于酋冥測曰大永于福福反亡也范本入于酋冥作入酋冥小宋本作於酋冥今從宋陸王本六過中而當夜小人恃福之永驕淫矜夸福終則禍至故反虛庭言無所獲也入于酋冥言不知悔懼禍釁既就則至於晦冥也次七老木生蒔永以纏其所無測曰老木生蒔永厥體也蒔時吏切王曰七居過滿老木之象然得位當晝得其永道故生蒔蒔者旁生之栽也既有華葉復得長久始無今有故云纏其所無次八永不軌凶亡流于後測曰永不軌其命劑也劑才詣切宋曰劑翦也王曰居將極之位而以陰居陽時且當夜是則永不法之事豈止禍其身而已凶亡之事乃流於後也光謂八為禍中而當夜小人長為不法身既凶亡餘殃流後也上九永終馴首測曰永終馴首長愷悌也馴順也愷樂也悌易也九在永終而當晝君子之道永長樂易慎終如首若一永道乃全也二方三州三部三家昆昆户衮切又如字陰家金亦準同人陸曰昆亦同也陰將離之陽尚昆之昆道尚同宋曰陰氣將殺故離散萬物陽氣將藏故萬物同歸也王曰陰氣主殺將離萬物陽氣仁愛猶尚昆而同之初一昆于黑不知白測曰昆于黑不可謂人也宋曰白智也黑愚也光謂黑以諭垢濁白以諭廉潔一為思始而當夜小人自同於垢濁而不知廉潔之為美者也次二白黑菲菲三禽一角同尾測曰三禽一角無害心也菲敷尾切與斐同王曰得位當晝白黑菲菲分别明白之義三禽諭三人一角同尾終始皆同無乖異也光謂菲菲白黑相雜貌角在首而拒鬬者也尾體之終也二為思中而當晝君子與人交廉而不劌濁而不污菲菲然群居而不亂一角者共禦侮也同尾者今其終也孔子曰君子和而不同次三昆于白失不黑無際一尾三角測曰昆白不黑不相親也范王本際皆作除今從宋陸本次四鳥托巢于菆人寄命于公測曰鳥托巢公無貧也范小宋本菆作叢今從宋陸王本菆古叢字宋曰公均也光謂公者道大同無彼我也四為下祿而當晝君子能推大同至公之心以待人則皆歸往而寄命焉故曰公無貧也次五穀失疏數衆犛毁玉測曰穀失疏數奚足旬也范小宋本穀失疏數作穀不穀失疏數王本作轂不轂失疏數今從宋陸本穀轂古字通陸曰旬均也王曰五居盛位當為物主而以陽居陰位且當夜不得混同之道轂為衆輻所湊五既失道不能包容故云轂不轂也衆犛之輕積以成多必致毁玉之患如衆鑠金也光謂轂之受輻疏數必均乃能運行五以小人而居盛位無至公之心好惡住私故讒慝并進而衆犛毁玉也次六昆于井市文車同軌測曰昆于井市同一倫也井市者人所聚也六為盛多當晝君子道隆德盛四海會同書同文車同軌無有遠邇混為一類也次七蓋偏不覆晏雨不救測曰蓋偏不覆德不均也覆敷救切下并同晏晚也晚而得雨則稚者昌而稙者傷矣七為敗損而當夜小人之德不能大同用心頗僻有愛有惡如蓋偏則物有不覆者矣雨晚則禾有不救者矣次八昆于危難乃覆之安測曰危難之安素施仁也八為禍中為耗為剝落有危難之象然當日之晝君子素以昆同之道沉愛容衆一視同仁故危難之際能庇覆於物使之就安上九昆于死棄寇遺測曰昆于死棄厥身也遺以醉切王曰棄身遺寇凶之甚也光謂為惡不同同歸于亂九居禍極而當夜故有是象集注太玄經卷之四
