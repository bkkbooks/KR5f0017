body:
  text: 一方二州一部三家童陰家木準蒙陽氣始窺物僮然咸未有知范曰立春之節萬物孚甲始出枝葉未舒故謂之童光謂陽氣微見地上故曰始窺初一顓童不寤會我蒙昏測曰顓童不寤恐終晦也一為思始而當夜顓童之人不寤於學終亦歸於蒙昏而已次二錯于靈蓍焯于龜資出泥入脂測曰錯蓍焯龜比光道也王本龜資作元龜而注云灼于元龜資取吉凶之兆蓋經誤也焯與灼同比頻寐切泥滯泥之象脂所以為明也二為思中而當晝能以暗求明如錯蓍焯龜以決其疑出於滯泥而入於光明故曰比光道也比近也錯者錯綜蓍數以筮也次三東辰以明不能以行測曰東辰以明奚不逝也小宋本奚不逝作奚不可逝今從諸家三為成意如東方已明可以行矣而不能以行失時不學者也次四或後前夫先錫之光測曰或後前夫先光大也次五蒙柴求兕其得不美測曰蒙柴求兕得不慶也次六大開帷幕以引方客測曰大開帷幕覽衆明也帷幕蔽明之物也六為上福久為盛多如人君延納四方之士無有雍蔽也舜賓于四門明四目達四聰次七修侏侏比于朱儒測曰侏侏之修無可為也侏音株修長也侏侏長大貌七為七十年已長矣而當日之夜雖侏侏然長大其智識乃比於侏儒不免童蒙也以象居君子之位行小人之道也次八或擊之或刺之修其玄鑒渝測曰擊之刺之過以衰也刺七亦切不學而愚以至衰老陷於禍中故曰或擊之或刺之然當日之晝若尚能從學修其玄鑒猶足以變禍為福也晉平公問於師曠曰吾年七十欲學恐已暮矣師曠曰少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明炳燭之明孰與昧行上九童麋觸犀灰其首測曰童麋觸犀還自纍也諸家纍作纍今從小宋本力遂切王曰處童之極當夜之位昏昧之甚不能自反者也童麋無角之麋光謂灰猶縻碎也九居童之極逢禍之窮如童麋觸犀縻碎其首不量其力愚之甚也一方二州二部一家增陽家金準益陽氣蕃息物則增益日宣而殖宋陸本陽氣蕃息作陽氣兹蕃息王小宋本作陽兹蕃息今從范本陸范王本增益作益增今從二宋本二宋陸王而作如今從范本初一聞貞增默外人不得測曰聞貞增墨識內也王本聞作間今從諸家墨當作默一為思始而當晝君子多聞正道以益其德默而識之不見於外也次二不增其方而增其光冥測曰不增其方徒飾外也范曰方道也冥晦也王曰不增益其道而外自夸耀欲增其光反自冥也光謂君子增修其道而榮名從之小人舍內而飾外求光而愈晦也次三木以止漸增測曰木止漸增不可蓋也范本蓋作益今從宋陸王本王曰蓋掩也光謂君子之學如木根止於所生之士而枝葉寖長君子止於所守之道而德行日新法言請問木漸曰止於下而漸於上者其木也哉亦猶水而已矣次四要不克或增之戴測曰要不克可敗也四為下祿而當夜無德而享其祿如要弱而增戴必不勝任矣次五澤庳其容衆潤攸同測曰澤庳其容謙虛大也王曰如澤之庳下衆潤所歸光謂五增之盛也衆共益之非謙虛何以致此哉次六朱車燭分一日增我三千君子慶小人傷測曰朱車之增小人不當也次七增其高刃其峭丘貞測曰增高刃峭與損皆行也七居上體而為禍基可懼之地也家性為增增而不已必受其殃七當日之晝君子之道也故能每自裁損以保其安夫丘之所以傾者峭也若能每增其高輒刃其峭使之陂陀則終無傾矣此丘之正道也正考父三命兹益恭一命而僂再命而傴三命而俯次八兼貝以役往益來剔測曰兼貝以役前慶後亡也剔他歷切削也貝富資也役賤事也以富資而為賤事貪求不已往雖得益來必被削故曰前慶後亡也上九崔嵬不崩賴彼坱埤測曰崔嵬不崩群士㩖㩖也宋陸本坱埤作岟崥今從范王小宋本崔徂回切坱於兩切埤必弭切㩖渠良切范曰坱埤山足也王曰㩖㩖者扶助之貌光謂九處增之極逢禍之窮然而免咎者以群士為之助如高山之不崩以坱埤為之足也一方二州二部二家鋭陰家士準漸入鋭次五三十一分一十三秒雨水氣應陽氣岑以鋭物之生也咸專一而不二岑鉏簪切岑然鋭貌鋭道尚專初一蟹之郭索後蚓黃泉測曰蟹之郭索心不一也范曰郭索多足貌王曰郭索匡穰也吳曰匡穰躁動貌光謂荀子曰蚓無爪牙之利筋骨之強上食埃士下飲黃泉用心一也蟹六跪而二敖非蛇蟺之穴無所寄託者用心躁也一為思始而當夜家性為鋭故有是象跪去委切足也次二鋭一無不達測曰鋭一之達執道必也二為思中而當晝故曰鋭一無不達咸有一德曰德惟一動罔不吉德二三動罔不凶荀子曰行衢道者不至事兩君者不容目不兩視而明耳不兩聽而聰螣蛇無足而飛梧鼠五技而窮詩曰鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮故君子結於一也次三狂鋭蕩測曰狂鋭之蕩不能處一也三為思終而當夜狂者進不一之謂也蕩然無所守則不見成功也易曰晉如鼫鼠貞厲次四鋭于時無不利測曰鋭于時得其適也四為福始而當晝鋭得其時者也故無不利次五鋭其東忘其西見其背不見其心測曰鋭東忘西不能回避也背外也心內也五為盛福而當夜小人知得而不知喪見利不顧其害貪箭忘後棄內逐外者也次六鋭于醜含于五軌萬鍾貞測曰鋭于醜福祿不量也醜衆也六為上福又為盛多當日之晝鋭之盛美者也君子之進取務合衆心而已矣故能含容五軌萬鍾而不失其正也古者度塗以軌軌者兩轍之間其廣八尺釜十曰鍾鍾六斛四斗也五軌諭廣萬鍾諭多次七鋭于利忝惡至測曰鋭于利辱在一方也范曰忝辱也光謂七為禍始而當夜小人鋭於利而蒙辱惡者也方嚮也辱在一方者言其所以取辱者在於一嚮見利而不思義也次八鋭其鋭救其敗測曰鋭其鋭恐轉作殃也八為禍中而當晝君子見得而思義瞻前而顧後雖鋭其鋭而常救其敗失故免於殃咎也上九陵峥岸峭陀測曰陵峥岸峭鋭極必崩也陀直爾切范曰陀墮也峥謂峥嶸也峭峻也峥嶸高峻將墮於下故言阤也一方二州二部三家達陽家水準泰入達初一日舍東壁陽氣枝枚條出物莫不達宋曰自枝别者為枚自枚别者為條謂陽氣動出萬物皆得其理無有鉤纏而不達陸曰枝枚條出此言陽布施無不浹也初一中冥獨達迵迵不屈測曰中冥獨達內曉無方也迵徒弄切范曰迵通也屈盡也光謂一思之微者也故曰中冥當日之晝君子內明默識通達無方者也次二迷腹達目測曰迷腹達目以道不明也宋陸本以不道明今從范本光謂二為思中而當夜內心不明則視外物亦不審矣故不明於道而恃外察無益也以用也所以迷腹達目由其用道不明故也次三蒼木維流厥美可以達于瓜苞測曰蒼木維流內恕以量也量力張切范曰維流枝枚垂下也瓜苞牽蔓於地木不下其枝枚則不得虆而蔓之而達於上光謂苞與匏同三為進人近於祿而當晝仁者已欲立而立人已欲達而達人不專其美如木垂其枝以逮於下故瓜匏得而虆之詩云南有樛木甘瓠纍之次四小利小達大迷扁扁不救測曰小達大迷獨曉隅方也扁必沔切陸曰獨曉一隅與一方言不知四達也光謂扁扁狹小貌四為下祿而當夜故為小利小人獨曉隅方不達大道所得狹小不能救其所失也盆成括仕於齊孟子知其必死曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣次五達于中衢大小無迷測曰達于中衢道四通也五為中和又為著明當日之晝達之盛者也次六大達無畛不要止洫作否測曰大達無畛不可偏從也畛之人切六為極大過中而當夜故曰大達無畛畛田界也洫所以明田界也作治也君子之道當有壇宇宫廷譬如大田無界若不要而止之正其溝洫而作治於其內則荒穢而不修矣不可偏從者田既廣大從此則失彼也次七達于砭割前亡後賴測曰達于砭割終以不廢也砭彼驗切王曰雖有砭割之損終獲念疾之利賴利也光謂砭石之刺病也七為刀又為禍始而當晝君子達於事變知禍之至割愛去惡如砭割之去病雖有亡後得其利不為廢疾也次八迷目達腹測曰迷目達腹外惑其內也二在內體故曰達腹八在外體故曰迷目惑於外物以𨎬內明雖心知其非而不能自克所以終敗也上九達于咎貞終譽測曰達咎終譽善以道退也九為禍終而當晝君子知禍之窮守正而退不失令名也一方二州三部一家交陰家火亦準泰陽交於陰陰交於陽物登明堂矞矞皇皇小宋本作陰陽交泰雍容無疆今從諸家矞音聿宋曰於七分息卦為泰升陽在三已出地上也陸曰地下稱黃宫故地上稱明堂矞矞皇皇休美貌王曰矞矞皇皇明盛之貌初一冥交于神齊不以其貞測曰冥交不貞懷非含慙也齊與齋同范曰冥暗昧也交於鬼神必以肅敬齋也貞精誠也交於鬼神雖在冥暗不以精誠神弗福也思始而當夜故有是象次二冥交有孚明如測曰冥交之孚信接神明也中而當晝君子能以明信交於鬼神者也次三交于木石測曰交于木石不能嚮人也意始交於外而當日之夜交於愚人如交木石不能相益也孔子曰無友不如巳者次四往來熏熏得亡之門測曰往來熏熏與神交行也作福今從諸家王曰熏熏衆多之貌次五鶯猩不獲其榮測曰交于鶯猩鳥獸同方也言不離飛鳥猩猩能言不離禽獸五居盛位交物不以禮者也交不以禮而求榮耀安可云兕觥其觩旨酒思柔彼交匪敖萬福來求次六大圈閎閎小圈交之我有靈肴與爾殽之測曰大小之交待賢焕光也二宋陸王本閎閎作閣閣今從范本范王本肴作殽今從二宋陸本范本殽之或作散之圈求晚切王曰圈者殽羞之器待賢之道焕然有光交道之盛也光謂圈養畜間也閎閎大貌靈善也肴骨體也殽之字當作肴肴啖也大圈以諭富有之君子小圈以諭無祿之士六為盛多而當晝君子有祿樂與賢者共之易曰我有好爵吾與爾靡之次七交于鳥鼠費其資黍測曰交于鳥鼠徒費也七為敗損而當夜交非其人徒費而已法言曰頻頻之黨甚於斯亦賊夫糧食而已矣次八戈矛往來以其貞不悔測曰戈矛往來征不可廢也八為禍中交不以好而以兵者也故曰戈矛往來然當日之晝君子交兵所以沮亂禁暴不得已而用之不違於正故無悔也夫鞭朴不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳上九交于獸伐不貞覆于城猛則噉測曰交于獸伐奚可遂也九為禍窮而當夜小人交獸爭勝不以其正覆國喪家者也以桀攻桀德不相殊則以猛噉弱而已無有優劣也一方二州三部二家耎耎與軟同陽家木準需入耎初一日舍奎入次九八分二十秒日次降婁驚蟄氣應斗建卯位律中夾鐘陽氣能剛能柔能作能休見難而縮難乃旦切初一赤卉方鋭利進以退測曰赤卉方鋭退以動也范曰赤卉草木萌牙也光謂萌牙之生必先屈如君子退讓而身益進也次二耎其心作疾測曰耎其心中無勇也二為思中而當夜家性為耎以無勇為病者也春秋傳曰仁而不武無能達也次三耎其膝守其節雖勿肆終無拂測曰耎其膝體不可肆也膝與膝同拂扶勿切王曰拂戾也光謂三在下體故曰耎其膝雖不得自肆終未違於常道也次四耎其哇三歲不噣測曰耎哇不噣時數失也哇於佳切噣竹角切又音晝王曰哇喉也光謂四為下祿又為條暢而當夜可語而默者也孔子曰言及之而不言謂之隱次五黃菌不誕俟于慶雲測曰黃菌不誕俟逑耦也二宋陸本作救禍也王本作俟㐜偶也吳曰㐜古仇字今從范本逑音仇王曰居中體正為耎之主而又得位當晝黃菌謂靈芝也誕生也靈芝未生將待慶雲同表嘉瑞須待之義也光謂逑匹也芝不生者俟慶雲士不進者俟明君君明臣賢相匹偶也次六縮失時或承之災測曰縮失時坐逋後也災與災同王曰地居過滿而又失位遇夜乖於處耎之宜是縮而失時者也光謂君子進退消息與時皆行六過中而當夜退縮後時則災承之矣次七詘其節執其術共所歾測曰詘節共歾內有主也詘與屈同歾與沒同王曰能執其心則為有主光謂七為禍始而當晝君子屈身而伸道者也故曰詘其節執其術君子外雖遜順而內主正直執是道也與之共沒其身而不變者也次八窾枯木衛振其枝小人有耎三却鉤羅測曰窾木之振小人見侮也王小宋本振作扼小宋本枝作柯今從宋陸范本范本却作郤今從諸家窾音款上九悔縮往去來復測曰悔縮之復得在後也居物之上陷於禍極苟能悔而自縮猶不失道也故往則遂去不返來則復得其所也一方二州三部三家徯陰家金亦準需陸曰徯待也陽氣有徯可以進而進物咸得其願初一冥賊徯天凶測曰冥賊之徯時無吉也一為思始而當夜小人包藏禍賊之心必受其殃次二冥德徯天昌測曰冥德之徯昌將日也小宋本昌將日作昌將有日今從諸家王曰以德徯時昌時不日而至光謂二為思中而當晝君子積德於隱而蒙福於顯昌美之至將無日也次三徯後時測曰徯而後之解也王本作徯而後時今從諸家解與懈同三為思終不得其中而當夜懈慢後時者也次四詘其角直其足維以徯穀測曰詘角直足不伎刺也伎音置刺郎達切四為角為下祿而當晝穀祿也伎與忮同很也刺戾也屈其角不與物校也直其足行不失正也不為很戾可以待福祿也次五大爵集于宫庸小人庳徯空測曰宫庸之爵不可空得也五為宫為宅小人而逢盛福如大爵集于宫庸爵集于倉可以得食集于宫庸何所待也小德庫而位高之象也次六徯福貞貞食于金測曰徯福貞貞正可服也金者堅剛之物六為上福而當晝徯之盛者也正以待福雖金可食况其餘乎正可服者可以服行以待福也次七徯禍介介凶人之郵測曰徯禍介介與禍期也介介僻邪之貌郵過也七為禍始而當夜故有是象次八不禍禍徯天活我測曰禍不禍非厥訧也王本活作治今從諸家説音尤罪也八為禍中而當晝君子非罪而逢禍者也儻審己之道不以禍為禍天道福善必將生我也易曰困而不失其所亨上九徯尫尫天撲之顙測曰徯尫之撲終不可治也撲普卜切王曰尫者疾病仰向天光謂撲擊也顙額也小人不慎其初隱於禍極乃始尫尫然俟天之救天且益降之禍矣故曰天撲之顙一方三州一部一家從陽家水準隨陽躍于淵于澤于田于嶽物企其足宋曰陽氣踊躍在淵澤田嶽者謂其高下備矣萬物亦企其足而隨之初一日幽嬪之月冥隨之基測曰日嬪月隨臣應基也嬪婦也基始也一為思始故曰幽冥月始過朔潛隨日行若婦之從夫人君有為始發慮於心而同德之臣已從而應之不謀而叶也次二方出旭旭朋從爾醜測曰方出朋從不知所之也旭旭日初出之貌醜類也二為思中而當夜小人之心雜將形于外如日之方出旭旭然反復思慮未知所之之善則善朋從之之惡則惡朋從之故曰朋從爾醜次三人不攻之自牽從之測曰人不攻之自然證也三為思終又為進人而當晝君子率性自從於善不待攻治也證當作正次四鳴從不臧有女承其血匡亡測曰嗚從之亡奚足朋也王本朋作明今從諸家匡與筐同君子修德而人自從之鳴而求從不足善也施之夫婦則喪配偶而不獲所求矣易曰女承筐無實士刲羊無血無攸利次五從水之科滿測曰從水滿科不自越也王曰水之從下自然之理五既得位當晝為從之主物之從者如水之從科科者坎也滿科而已不復過越得中之道次六從其目失其腹測曰從目失腹欲丕從也王曰從其耳目之好而失其心腹之安大從其欲亡之道也光謂六過中而當夜徇外欲而亡內德者也次七拂其惡從其淑雄黃食肉測曰拂惡從淑救凶也小宋本雄作赨音雄今從諸家七為禍始而當晝君子去惡從善如雄黃能去惡肉生善肉也次八從不淑禍飛不逐測曰從不淑禍不可訟也小宋本作訟不淑今從諸家宋曰不可辨訟而解光謂小人從於不善禍發如飛不可追治也上九從徽徽後乃升于階終測曰從徽徽後得功也范本升作登今從諸家一方三州一部二家進陰家火準晉入進次六日舍婁陽引而進物出溱溱開明而前王本引作承今從諸家宋曰萬物隨之而出溱溱然盛也初一冥進否作退母測曰冥進否邪作退也王曰失進之道退之本也故曰作退母光謂一為思始而當夜潛進而不以其正者也次二進以中刑大人獨見測曰進以中刑刑不可外也王本無可字今從諸家次三狂章章不得中行測曰狂章章進不中也王本狂作往今從諸家三為思外過中而當夜妄進者也故曰狂章章章章失據貌次四日飛懸陰萬物融融測曰日飛懸陰君道四為福始而當晝君德進盛明無不燭如日飛登離陰絶遠萬物融融然莫不昭明也次五進以權疏或杖之扶測曰進以欋疏制于宗也王本欋作擢制作掣范本宗作尊今從二宋陸本宋陸王本杖作枝今從范本次六進以高明受祉無疆測曰進以高明其道迂也范曰迂遠也光謂六為隆福而當晝君子進德高明受福無疆也次七進非其以聽咎窒耳測曰進非其以毁滋章也七為禍始而當夜小人不以其道進升高位衆毁滋章塞耳而滿也次八進于淵君子用船測曰進淵用船以道行也范本測作進淵且船今從諸家淵者險難之象八為禍中故曰進于淵用船則淵可濟憑道則難可涉也上九逆馮山川三歲不還測曰逆馮山川終不可長也馮古憑字九為窮禍而當夜小人進不以道至於上極而陷於禍不能自返者也一方三州一部三家釋陽家木準解入釋次三二十六分一十一秒春分氣應陽氣和震圜煦釋物咸稅其枯而解其甲稅與脫同宋曰震動也圜陽形也范曰煦暖也初一動而無名酋測曰動而無名不可得名也王本作動能無名今從諸家酋就也謂成功也一為思始而當晝君子動於微眇化育萬物百姓見其成功而無名焉故曰動而無名酋次二動于響景測曰動于響景不足觀聽也響應聲景隨形皆動不由已者也二為思中而當夜小人隨人而動如響景然故不足觀聽也次三風動雷興從其高崇測曰風動雷興動有為也二宋陸本從其高崇作從其高宗王本作從其道直高崇今從范本三為成意而當晝君子動作之迹始見於外如風雷之益萬物故其功業日就高崇也次四動之丘陵失澤朋測曰動之丘陵失下危也丘陵以諭高澤以諭下四為福始而當夜小人之動務在升高而不顧其下則不免孤危也次五和釋之脂四國之夷測曰和釋之脂民説無疆也宋陸本和釋之脂作和釋脂民王小宋本作和釋脂今從范本説與悅同范曰和脂喻濡協也夷平也光謂五為中和居盛位當日之晝聖人得位布其德以和協四國莫不夷懌也次六震于廷喪其和貞測曰震于廷和正俱亡也喪息浪切六居二體之內而近於五廷之象也夫德以柔中國刑以威四夷以德懷近則近和以威懾遠則遠正今用震於廷失其所宜故和正俱亡也次七震震不侮濯潄其詬測曰震震不侮解恥無方也漱素侯切詬呼漏切漱浣也詬恥也震震有威嚴之貌七為禍始而當晝君子有威嚴之德人不敢侮故可以浣濯其恥也次八震于利顛仆死測曰震于利與死偕行也小人見利而動以陷禍中利與死偕而不自知也上九今獄後穀終説桎梏測曰今獄後穀于彼釋殃也宋陸本彼作皮今從范本説與脫同穀生也九為禍窮故今獄也在釋而當晝故後穀也一方三州二部一家格陰家金準大壯格拒也陽氣內壯能格乎群陰攘而却之攘汝陽切却去略切初一格內善失貞類測曰格內善中不宵也范本宵作省今從諸家吳曰宵與肖同引漢書人宵天地之貌宋曰宵類也類法也光謂善惡之原皆由乎思一為思始而當夜拒善而納惡故失正類二為思中而當晝拒惡而納善故幽正次二格內惡幽貞測曰格內惡幽貞妙也范本作幽貞類今從諸家幽者內潛於心之謂也次三裳格鞶鉤渝測曰裳格鞶鉤無以制也二宋陸本制作製王作掣今從范本范曰革帶曰鞶鉤所以屬鞶也王曰鞶鉤所以束其衣裳而反格拒之故當渝變而失宜也光謂三居下體故曰裳三為下上而當夜臣拒君命不受約束必有變也次四畢格禽鳥之貞測曰畢格禽正法位也范曰畢罔也光謂四為下祿而當晝君子之始得位者也得位則可以用法正邪而禁暴矣次五膠漆釋弓不射角木離測曰膠漆釋信不結也射食亦切王曰物相合者莫若膠漆角木之為弓格而離之其可射乎光謂五性信又為膠為漆為弓矢格者物相拒不合之象也弓以膠漆附合角木故可射君以信固結臣民故可使五以小人而居盛位不能以信結物上下離心故曰膠漆釋弓不射角木次六息金消石往小來奕測曰息金消石美日大也范曰奕大也王曰所息者金所消者石所失者至小所得者光大光謂息生也生金而消石以美拒惡之象也六為上祿而當晝君子道長而消小人者也故曰往小來奕次七格其珍類龜緺厲測曰格其珍類無以自匡也緺古蛙切范曰龜為印緺為綬光謂君子以善類自正故能保其福祿七為綬又為禍始而當夜小人拒善類而不受者也拒其善類則拒其福祿也棄善失祿危孰甚焉次八格彼鞶堅君子得時小人憂否測曰格彼鞶堅義不得行也王本鞶作磐今從諸家音惕上九郭其目䚩其角不庳其體撲測曰郭目䚩角還自傷也䚩音䚩音矯撲蒲角切范曰撲擊也王曰郭目張目也䚩角高其角也光謂格者用壯拒物者也九居其上用壯之極逢禍之窮當日之夜小人張目高角以拒於人不卑其體故為物所擊還自傷也一方三州二部二家夷陽家土準豫入夷次三日舍胃夷傷也平也不物則不能平矣舊準大壯非陽氣傷陰無救瘣物則平易音惕瘣户悔切宋曰去也陸曰陽氣壯故夷傷陰而除之瘣病也為陽所傷故病也萬物無陰害故平易也光謂髮也大人曰小兒曰陽氣剗群陰陰不能自救其病然後物得生殖而平易矣初一載幽二執夷內測曰載幽執夷易其內也范曰載始也光謂一為思始而當晝發慮之始幽而未顯二謂義利也二者交爭君子能取義而舍利執坦夷之心養浩然之氣自得於內無求於外者也子夏曰吾戰勝故肥法言曰紆朱懷金之樂也外顔氏子之樂也內次二陰夷冒于天罔測曰陰夷冒罔疏不失也陸曰天罔雖疏不失惡也光謂二為罔又二為思中而當夜小人為隱慝陰傷於物自以為人莫能知也然冒于天罔天必誅之老子曰天罔恢恢疏而不失次三柔嬰兒于號三日不嗄測曰嬰兒于號中心和也二宋陸王本嗄作嚘今從范本號胡刀切嗄所嚘於求切王曰嚘氣逆也光謂嗄聲變也三為成意而當晝君子含德之厚至平以易如嬰兒雖三日蹄號而聲不變者和柔故也老子曰赤子終日號而不嗄和之至也次四夷其牙或飫之徒測曰夷其牙食不足嘉也飫依倨切王曰牙既平無可以食徒猶空也或飫以食徒空爾也光謂四為骨為齒又為福始而當夜小人貪祿以自傷者也故曰夷其牙牙傷則雖有美食不能食適足飫其徒屬而已次五中夷無不利測曰中夷之利其道多也宋陸本其道多作利其多今從范王本王曰平以御於物物所歸往何不利之有乎五既居中體正得位當晝是其中物然平易也光謂五居盛位而當晝能平易其心以待物者也則物無遠近皆歸之矣易曰易簡而天下之理得矣次六夷于廬其宅丘虛測曰夷于廬厥德亡也德者君子之常居也六過中而當夜小人始毁傷其德喪其安居者也次七幹柔幹弱離木艾金夷測曰幹柔柔勝強也宋陸本測柔幹柔勝強也范本幹柔艾金弱勝強幹柔弱勝強也小宋本柔幹之離柔勝強也今幹柔從王柔勝強從宋陸本艾魚廢切王曰雖居過滿而得位當晝得夷之道是能以柔弱之物夷平於堅剛也光謂離木如汲綆之斷井幹艾金如越砥之厲刀劔以弱勝強終就平夷也次八夷其角厲測曰夷其角以威傷也八為禍中而當夜小人用威而傷自危之道也上九夷于耇利敬病年貞測曰夷耇之貞懸車鄉也陸曰致仕而歸於鄉黨也王曰敬其衰病與高年貞之道也光謂九為九十又為極君子老而辭位自處平易者也賢者以老病而歸人君所當欽奉也一方三州二部三家樂音洛陰家水亦準豫入樂次七三分一十八秒日次大梁清明氣應斗建辰位律中姑洗陽始出奧舒疊得以和淖物咸喜樂淖奴教切和也清明之初陽始發出幽奧舒展疊積之物皆得和淖而喜樂也初一獨樂款款及不遠測曰獨樂款款淫其內也范曰款款獨樂貌光謂一為思始而當夜小人獨樂其身而不能與衆共樂者也次二不可知辰于天測曰樂不可知以時歲也曰謂行德政使民歡樂若天時然民不知政之為也次三不宴不雅𠹑呱啞咋號咷倚户測曰不宴不雅禮樂廢也王本嘷作嘷今從諸家𠹑古弔五弔二切啞音厄咋音責王曰𠹑呱啞咋皆歡笑之聲也光謂宴安也雅正也三為成意而當夜棄廢禮樂沈湎淫泆廢禮則不得其安廢樂則不得其正雖𠹑呱啞咋苟窮目前之樂其憂患何遠哉近倚户外而巳詩魚藻刺幽王言萬物失其性王居鎬京將不能以自樂次四拂其繫絶其纗佚厥心測曰拂繫絶纗心誠快也繫與系同纗户圭切拂去也纗維網中繩也四為條暢而當晝君子志道樂以忘憂外物不能纍佚莫光焉故曰拂其繫絶其纗佚厥心次五鍾鼓喈喈管絃嚌嚌或承之衰測曰鍾鼓喈喈樂後悲也嚌側皆切嚌嚌哀思之聲五以小人而享盛福恣其淫樂樂極必悲盛極必衰也次六大樂無間民神禽鳥之般測曰大樂無間無不懷也般蒲干切王曰六居盛位當晝之時為首之主無間者天地之間萬物咸樂人神鳥獸各遂其性而般遊光謂般樂也六為隆福為盛多為極大太平之君子兼利萬物無有間異民神禽鳥靡不得所樂孰大焉四為下祿獨善其身六為上祿兼利天下者也次七人嘻鬼嘻天要之期測曰人嘻鬼嘻稱樂畢也宋陸本畢作卑今從范本要於宵切王曰要約也光謂嘻嘆聲也七為禍始而當夜小人樂極禍來人鬼共嘆大命近止而不自知也次八嘻嘻自懼亡彼愆虞測曰嘻嘻自懼終自保也王曰樂道將極又居禍中危之道也然而得位當晝善於補過是於嘻嘻笑樂之中而能自懼則無愆過與憂虞矣上九極樂之幾不移日而悲則哭泣之𨲠資測曰極樂之幾信可悔也幾音機𨲠資與嗟咨同陸曰幾危也王曰居樂之極而又當夜故不待移日而悲至矣則哭泣嗟咨也光謂三者戒之於思五者戒之於福九者戒之於禍大指皆言樂不可極使人始終反復常念之也一方三州三部一家爭陽家火準訟陽氣汜施不偏不頗物與爭訟各遵其儀汜敷梵切施式豉切頗普何切儀宜也陽氣汜施平均物皆爭進求遂其宜也詩由儀美萬物之生各得其宜初一爭不爭隱冥測曰爭不爭道之素也陸曰素質也王曰爭不爭謂爭於未形之時不見其迹也光謂一為思始而當晝君子執道之素爭於不爭之地外無其迹而物莫能勝也次二嚇河臞測曰嚇河之臞何可怙也嚇呼嫁切臞其俱切瘠也怙與怙同口拒人謂之嚇河之潰溢誰能拒之而臞瘠之人不量其力乃欲以口嚇之何足恃也詩云反豫來赫次三爭射齦齦測曰爭射齦齦君子讓鄰也范本齦作誾今從宋陸王本射神夜切齦音銀王曰君子之爭惟射而已齦齦勤至之貌讓鄰與讓相近也其意讀齦為懇也光謂齦與誾同誾誾恭讓貌孔子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子次四爭小利不酋貞測曰小利不絶正道乃昏也曰爭不以道而爭於小利焉宜其不成貞之矣次五爭于逵利以無方測曰爭于逵爭處中也范曰五處中位故稱逵逵九達道也光謂五為中和而當晝君子執道之要統理之會應變無方物莫能爭次六臂膊脛如股腳䐜如維身之疾測曰臂膊之脛臣大隆也王小宋本脛作胵其意音迭腫也今從宋陸范本范本測曰臂脛如股今從宋陸王本范曰枝大於幹臣大於君皆為疾也光謂臂膊脛如言臂大如脛不可使也䐜音嗔肉脹起也六以陰質過中極大如臣之強盛君不能制者也賈誼曰天下方病大瘇一脛之大幾如要一指之大幾如股次七爭干及矛胄用亨于王前行測曰干矛之爭衛君躬也王本爭干及矛作爭于及方測曰于方之爭今從諸家宋陸本用亨于王前行作用享王于前行今從范王本胄與胄同行户郎切七為禍始用兵以爭者也故曰爭干及矛胄用兵以爭不以其私而從事吉孰大焉詩云元戎十乘以先啓行次八狼盈口矢在其後測曰狼盈口不顧害也王曰狼之噬物盈口是爭不知後有害之者矣光謂狼性貪務盈其口而不知矢在其後如小人爭利而不顧其害也天文弧矢星在狼後上九兩虎相牙知掣者全測曰兩虎相牙知所掣也宋陸本測知所掣作製范本作制今從王本掣尺制切王曰爭之極者莫如虎鬪而相牙必有死傷之患若能懼於患害自掣而退乃可以全物不可以終爭故於爭極而見自退之象所以能知自退之道者以陽當晝故也光謂掣引也一方三州三部二家務陰家木準蠱入務次四日舍昴陽氣勉務物咸若其心而總其事陽氣勉務而生物物咸順其心而自喜總其事而不二也初一始務無方小人亦用罔測曰始務無方非小人所理也范本作初一始用無方今從宋陸王本宋陸王無人字今從范本一為思始可以應變無方然當日之夜非小人之所能為也故日小人亦用罔罔無也次二新鮮自求珍潔精其芳君子攸行測曰新鮮自求光于已也王本芳作方行作臧今從諸家二為思中而當晝君子精潔其心將以有為者也次三不拘不掣其心腐且敗測曰不拘不掣其體不全也宋陸王本其體不全作其體全今從范小宋本掣尺制切三為思終而當夜小人觸情而動喪心虧體者也次四見矢自升利羽之朋蓋戴車載測曰矢及蓋車厥道然也二宋陸測矢及蓋車作見矢及蓋范作矢及蓋今從王本范曰矢而自升羽之力也羽金朋合而後乃飛猶君臣同心乃馳風化也車之載物猶君子之濟世也次五蜘蛛之務不如蠶之緰測曰蜘蛛之務無益人也緰音須衫帛也王改作褕音遙范曰蜘蛛有絲雖其勉務非人所用則不如蠶一緰之利也光謂五為織為衣為繭小人事非其事勞而無功故有是象旅獒曰不作無益害有益功乃成次六華實芳若用則臧若測曰華芳用臧利當年也范本無實字今從宋陸王本六為極大務之大成者也務之大成莫若全德華實兼茂年時方盛則何用不臧也次七喪其芳無攸往測曰喪其芳德以衰也喪息浪切范曰七為失志故德衰也次八黃中免于禍貞測曰黃中免禍和以正也王曰八居過滿幾於禍者也而得位當晝以居之中是得黃中之道以免咎悔者也光謂八為禍中而當晝君子以中正為務雖禍不害也上九務成自敗雨成自隊測曰務成自敗非厥命也隊與墜同王曰處務之極而失位當夜則其所務業雖成必敗如陰成雨墜必至之理其可救乎光謂萬物營為務成終敗所以然者小人功成驕惰不能盡其天命也一方三州三部三家事陽家金亦準蠱陽氣勗昭職物則信信各致其力范本勗作冒今從二宋陸王本信與伸同言陽氣勸勗萬物膏核莢各明其職物則伸伸自竭其力各從其事也務者有所營為事者各職其事也初一事無事至無不事測曰事無事以道行也王曰萬事皆理豈有為也哉正其本而已然則處陽當晝居事之始能正其本者也光謂一為思始心精之源萬事之本也君子澄其源正其本則事無不矣老子曰無為而無不為次二事在樞不咨不諏喪其哲符測曰不咨不諏其知亡也諏與諏同子侯切又子于切知與智同符者所瑞也二為思中故曰事在樞樞者榮辱安危所係之地也事方在樞思而未行宜訪問於善以求至當而當日之夜愚而自用不咨不諏以喪其智符也堯稽于衆舜樂取於人以為善孔子每事問次三時往時來間不容犛測曰時往時來不失趣也王本無容字今從二宋陸范本三為成意思慮既成當決志而行一失其時悔無所及故曰時往時來間不容犛言得失之間相去微也次四男女事不代之字測曰男女事非厥務也王曰事非其事必之於凶男而女事事失之甚何不代之字育乎四失位當夜乖於其宜故云然也光謂男代女事則家凶君奪臣職則國亂明事各有常也次五事其事王假之食測曰事其事職所任也王曰假錫與也光謂事其事者事其所當事也各居其職故王豫之食受福祿也次六任大自事方來不救測曰任大自事奚可堪也六過中而極大力小而任重者也故曰任大自事事方大來故顛覆不救也次七丈人扶孤竪子提壺測曰丈人扶孤小子知方也曰七雖過滿而得位當晝不失事事之宜人有扶持弧弱之事小子亦知提壺以致養也次八女男事十年不誨測曰女男事終家不亨也范本作男女事今從宋陸王本王曰君位過滿而失位當夜乖事之宜是女代男事十年者數之極也不誨者不可教也光謂女任男事則家不亨臣侵君權則國不昌十年以往力勢已成不可復制故女不承男之教臣不受君之命也上九到耳順上事貞測曰到耳順止逆聞順行也到與倒同止與趾同九為禍終而當晝能納忠不失正順者也忠言逆耳利於行良藥苦口利於病集注太玄經卷之二
