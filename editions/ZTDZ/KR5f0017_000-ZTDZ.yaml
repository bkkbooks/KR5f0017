front:
  text: 太玄經心一讀玄余少之時聞玄之名而不獲見獨觀揚子之自序稱玄盛矣及班固爲傳則曰劉歆嘗觀玄謂雄曰空自苦今學者有禄利然尚不能明易又如玄何吾恐後人用覆醬瓿也雄笑而不應諸儒或譏以爲雄非聖人而作經猶春秋吴楚之君僣號稱王蓋誅絶之罪也固存此言則固之意雖愈於歆亦未謂玄之善如揚子所云也余亦私怪揚子不賛易而别爲玄易之道其於天人之緼備矣揚子豈有以加之乃更爲一書且不知其焉所用之故亦不謂揚子宜爲玄也及長學易苦其幽奥難知以爲玄者賢人之書校於易其義必淺其文必易夫登喬山者必踐於坱埤適遼海者必沿於江漢故願先從事於玄以漸而進於易庶幾乎其可跂而望也於是求之積年乃得觀之初則溟涬漫漶略不可入廼研精易慮屏人事而讀之數十過參以首尾稍得闚其梗㮣然後喟然置書嘆曰嗚呼揚人善大儒者邪孔子既没知聖人之道者非揚子而誰與荀殆不足擬况其餘乎觀玄之書昭則極於人幽則盡於神大則包宇宙細則入毛髮合天地人之道以爲之刮兵根本示人下出䧎育萬物而兼爲之母若地履之而不䧟也若海挹之而不可竭也天下之道雖有善者其蔑以易此矣考之於渾元之初而玄已生察之於當今而玄非不行窮之於天地之末而玄不可亡叩之以萬物之情而不漏測之以鬼神之狀而不違㮣之以六經之言而不悖藉使聖人復生視玄必懌然而笑以爲得己之心矣乃知玄者所以賛易也非别爲書以與易競也何歆固知之之淺而過之之深也或曰易之法與玄異揚子不遵易而自爲之制安在其賛易乎且如與易同道則既有易矣何以玄爲曰夫畋者所以爲禽也網而得之與弋而得之何以異哉書者所以爲道也易網也玄弋也何害不既網而使弋者爲之助乎子之求道亦膠矣且揚子作法言所以準論語作玄所以準易子不廢法言而欲廢玄不亦惑乎夫法言與論語之道庸有異乎玄之於易亦然大厦將傾一木扶之不若衆木扶之之爲固也大道將晦一書辨之不若衆書辨之之爲明也學者能專精於易誠足矣然易天也玄者所以爲之階也子將升天而廢其階乎先儒爲玄解者多矣然揚子爲文既多訓詁指趣幽邃而玄又其難知者也故余疑先儒之解未能盡契揚子之志世必有能通之者比老終且學焉説玄易與太玄大抵道同而法異易畫有二曰陽曰陰玄畫有三曰一曰二曰三易有六位玄有四重
