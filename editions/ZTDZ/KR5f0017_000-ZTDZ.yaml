body:
  text: 最上曰方次曰州次曰部次曰家本傳所謂叁摹而四分之極於八十一者也易以八卦相重爲六十四卦玄以一二三錯於方州部家爲八十一首凡家每首輒變三首而復初如中周礥之類是也部三首一變九首而復初如中閑上之類是也州九首一變二十七首而復初如中羨從之類是也方二十七首一變八十一首而復初如中更減之類是也八十一首以上不可復加故曰自然之道也易每卦六爻合爲三百八十四爻玄每首九賛合爲七百二十九贊圖曰玄有二道一以三起一以三生以三起者方州部家也以三生者叁分陽氣以爲三重極爲九營是爲同本離生天地之經也本傳曰雄潭思渾天叁摹而四分之極於八十一者謂玄首也又曰旁則三摹九据極於七百二十九賛者謂玄賛也首猶卦也賛猶爻也又曰觀易者見其卦而名之觀玄者數其畫而定之玄首四重者非卦也數也故易卦六爻爻皆有辭玄首四重而别爲九賛以系其下然則首與賛分道而行不相因者也皆當期以日易卦氣起中孚除震離兑坎四正卦二十四支二十四氣外其餘六十卦每卦六日七分凡得三百六十五日四分日之一中孚初九冬至之初也頤上九大雪之末也周而復始玄八十一首每首九賛凡七百二十九賛每二賛合爲一日一賛爲晝一賛爲夜凡得三百六十四日半益以踦羸二賛成三百六十五日四分日之一中初一冬至之初也踦羸二賛大雪之末也亦周而復始凡玄首皆以易卦氣爲次序而變其名稱始者中孚也周者復也礥閑者屯也少者謙也戾者睽也餘皆仿此故玄首曰八十一首歲事咸貞測曰廵乘六甲與斗相逢歷以紀歲而百谷時雍皆謂是也易有元亨利貞玄有罔直蒙酋冥五者太玄之德罔北方也於易爲貞直東方也於易爲元蒙南方也於易爲亨酋西方也於易爲利冥者未有形也故玄文曰罔蒙相極直酋相勑出冥入冥新故更代玄首起冬至故分貞以爲罔冥罔者冬至以後冥者大雪以前也易大衍之數五十其用四十有九玄天地之策各十有八合爲三十六策地則虚三用三十三策易揲之以四玄揲之以三太玄揲法卦一而中分其餘以三揲一作搜一作换之并餘於芳一芳之後而數其餘七爲一八爲二九爲三易有七九八六謂之四象玄有一二三謂之三摹皆晝卦首之數也易有彖玄有首彖者卦辭也首者亦統論一首之義也易有爻玄有賛易有象玄有測測所以解賛也易有文言玄有文文解五德并中首九贊文言之類也易有系辭玄有攡瑩掜圖告五者皆推賛太玄系辭之類也易有説卦玄有數數者論九賛所象說卦之類也易有序卦玄有衝衝者序八十一首陰陽相對而解之序卦之類也易有雜卦玄有錯錯者雜八十一首而說之殊涂而同歸百慮而一致皆本於太極兩儀三才四時五行而歸於道德仁義禮也集註揚子太玄經序司馬氏漢五業主事宋衷始爲玄作解詁吴鬱林太守陸績作釋正晋尚書郞范望作解賛唐門下侍郞平章事王涯注經及首測宋興都官郎中直昭文館宋惟幹通爲之注秦州天水尉陳漸作演玄司封員外郞吴祕作音義慶曆中光始得太玄而讀之作讀玄自是求訪此數書皆得之又作說玄疲精勞神三十餘年訖不能造其藩籬以其用心之乆棄之似可惜乃依法言爲之集注誠不知量庶幾來者或有取焉其直云宋者仲子也云小宋者昭文郞中也元豐五年六月丁丑序集註太玄經卷之一
