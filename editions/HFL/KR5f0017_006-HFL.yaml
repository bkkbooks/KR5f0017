front:
  text: 集註太玄經卷之六心六
  hash: sha256:df6e960e7100ef096581cc72abe2045dc1c915fab69d5f1136e898462a94741d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0017_HFL_006-001a, image: hfl/0862/0862-096.png}
body:
  text: 三方二州三部一家割陰家火準剥陰氣割物陽形縣殺七日幾絶宋陸本形作刑今從范王小宋本小宋本陰氣作羣陰宋曰殺衰也所介切王曰陰氣勝故殺傷萬物陽形消故縣而不用爲陰氣所殺也讀如字初一割其耳目及其心腹厲測曰割其耳目中無外也王本中無外作中外無今從宋陸范本耳目所以輔衛心腹耳目割則心腹危矣一爲思始而當夜小人惡忠忌諫自賊其聦明者也次二割其疣贅利以無穢測曰割其疣贅惡不得大也肬音尤贅之苪切王曰疣贅身之惡也割而去之無復滋大也光謂二爲思中而當晝君子自攻其惡不使滋大者也次三割鼻食口喪其息主測曰割鼻喪主損無榮也虞本食作飴今從陸范王本范曰鼻者氣息之主王曰割之不得其宜是割鼻以啖其口次四宰割平平測曰宰割平平能有成也王曰四居臣之盛而當晝宰割於物有均平之德光謂四爲下禄君子之始得位者也次五割其股肱喪其服馬測曰割其股肱亡大臣也宋陸本亡作忘王本作無今從范本王曰五居君位而當夜無君之德是割其股肱而以求理宜喪失所乘服矣光謂服馬所以負軛而夾轅任重致遠亦大臣之象也次六割之無創飽于四方測曰割之無創道可分也六居盛位而當晝分布其道教思無窮容保民無疆四方靡不充足而於道無所虧損也次七紫蜺矞雲朋圍日其疾不割測曰紫蜺矞雲不知刊也二宋陸本作不利刊也今從范本王本朋作明今從二宋陸范本矞余律切王曰紫蜺妖氣矞雲日旁刺日之氣光謂七爲敗損而當夜如小人結黨以蔽惑其君爲國之患君不能割除也次八割其蠹得我心疾測曰割其蠧國所便也王小宋本蠹作矞今從宋陸范本便步邊切八爲禍中而當晝能割除姧蠹得我心之所疾惡者也上九割内取骨滅頂于血測曰割肉滅血不能自全也割剥之極民既困窮君亦不能自全故曰滅頂于血也三方二州三部二家止陽家木準艮陰大止物於上陽亦止物於下下上俱止小宋本作太陰止物於上今從諸家本宋曰謂是時物上隔陰氣下歸陽氣各止其所而不行也初一止于止内明無咎測曰止于止智足明也小宋本止于止内作止于内今從諸家一爲思始而當晝止得其所者也夫智之不明誘於外物者也故止于可止之所則内明而無咎也易曰良其止止其所也大學曰知止而後有定定而後能静静而後能安安而後能慮慮而後能得物有本末事有終始知所先後則近道矣次二車軔俟馬首止測曰車軔俟不可以行也范本測車軔俟作車軔馬止今從宋陸王本吴曰軔而振切礙輪木也光謂二爲思中而當夜小人智不足以燭理就止則可行則凶也次三關其門户用止狂蠱測曰關其門户禦不當也王本禦作圉今從范本光謂蠱惑也禦亦止也三爲户又思之崇也又爲成意而當晝君子三思而行苟狂惑不當不可復掩故於成意之時必慎而後發也次四止于童木求其疏穀測曰止于童木其求窮也范本其求窮作求其窮今從宋陸本王曰童木謂然無枝幹者疏穀謂草木之可食者光謂四爲下禄而當夜小人千禄而不得其道必無獲也次五柱奠盧蓋蓋車轂均疏測曰柱及蓋轂貴中也范本轂作穀今從二宋陸王本穀轂古字通王曰奠定也如柱之定於盧舍之中得其所止蓋之蓋覆於車車運而蓋不運轂之均其疏數以湊群輻輻雖運而已常處中此皆以止爲用者也五居中得位善於止道故取象焉光謂盧草舍之圓者必先植柱於中央以定之蓋有斗以受弓輪有轂以均輻人心所止久執厥中如此三者故可貴也次六方輪廉軸坎坷其輿測曰方輪坎坷還自震也范本廉作廣今從諸家范小宋本坎坷作坎坎今從宋陸本坷軻皆音可王曰輪方必止軸廉必輆以之進路必坎坎然振其車輿而不獲其適矣光謂六爲上禄爲盛多而當夜小人進不以道雖止於盛位終不得安也次七車纍其傂馬擸其蹄止貞測曰車纍馬擸行可鄰也宋陸本傂作僥范本作俿今從小宋本小宋本鄰作憐今從宋陸范本傂陳音雉吴音馳擸吴良涉切諸家或作獵筆誤也范曰俿輪也擸躐也王曰纍有所繫也擸有所挂也車纍馬擸宜乎止以求正光謂七爲失志爲敗損而當晝故纍擸也君子見險而止則不失其正矣次八弓善反弓惡反善馬很惡馬很絶弸破車終不偃測曰弓反馬很終不可以也王本作弓善反馬善很惡馬很宋本作弓善反惡弓反馬善很惡馬很范本很作恨今很從諸家餘從范弸薄萌切宋曰絶弦破車故不可用也范曰弸弦也偃止也王曰弓之反戾不可以射馬之很惡不可以御而强用之必有絶弸破車之患終不可偃息而止矣光謂弓雖善而好反馬雖善而性很終不可用况其惡者乎八爲禍中爲剥落而當夜小人邪愎而不知止者也荀子曰弓調而後求勁焉馬服而後求良焉士信慤而後求知能焉上九折于株木輆于砋石止測曰折木輆石君子所止也宋陸本砋作砭彼驗切小宋本作硟音仙王本作砋音止云搗繒石也今從之吴曰輆音愷礙也光謂九爲限爲石又禍之窮也而當晝君子道既不行則當止矣三方二州三部三家堅陰家金亦準艮入堅初一八分二十秒日次析木立冬氣應斗建亥位律中應鐘陸曰艮爲山石又爲木多節皆堅貌陰形胼冒陽喪其緒物競堅彊小宋本形作貌冒作昌今從諸家胼部田切喪息浪切宋曰胼謂盛也緒業也謂是時陰氣壯盛陽喪其業無能爲矣故萬物依陰氣競謂彊也范曰胼固也王曰胼冒密盛貌初一磐石固内不化貞測曰磐石固内不可化也小宋本磐石作堅磐宋陸本化貞作不貞玉小宋本作不化其貞宋陸本測作磐固内中不可化也今皆從范本光謂一爲下人爲思始而當夜小人頑愚心如磐石之堅不可化而入於正也孔子曰惟下愚不移次二堅白玉形内化貞測曰堅白玉形變可爲也宋陸本無化字小宋本形作狀今從范王本二爲思中而當晝君子心雖堅固潔白如玉之美然見善則遷有過則改內化日新以就於正易曰介于石不終日貞吉次三堅不凌或泄其中測曰堅不凌不能持齊也宋陸本凌作陵今從范王小宋本宋曰齊中也范曰在於堅冰之月今不凌或恐陽氣泄於中也光謂三爲成意而當夜小人處心不堅善惡交戰二三其德有始無卒不能行無越思允軌其中如冰欲堅於外而愆陽泄其中終不能成也次四小蠭營營螮其蛡蛡不介在堅螮測曰小蠭營營固其氐也宋陸本營作熒無在字王本介作分吴曰蠭與蜂同范作螽誤也螮都計切蛡音詡又音弋今蠭從諸家營介從范本宋曰氐本也范曰螮德也蛡國也王曰螮蠭子也蛡其房也光謂螮與蒂通謂蠭房之蒂也介大也螮以喻德蛡以喻國四爲下禄而當晝君子修德以保其位國不在大在勤德以固其本而已亦猶小蠭營營將爲房必先爲其蒂房不在大但蒂堅則不墜矣次五蛡大螮小虚測曰蛡大螮小國虚空也范曰國小德大則民衆殷國大德小故民虚也光謂中和莫盛乎五而當夜小人享盛福而不能守國雖大而德薄如蠭房大而蒂小其墜不乆矣虚者言其外勢彊盛而中實無有也次六韱螮紗紗縣于九州測曰韯螮之縣民以康也小宋本紗作𢆶音幽云𢆶𢆶微貌今從諸家韯與纖同縣與懸同王曰紗與眇同光謂六爲上禄爲盛多爲極大而當晝天子秉德之堅一人有慶兆民賴之如纖蒂之縣大房也次七堅顛觸冢測曰堅顛觸冢不知所行也顛頂也七爲失志爲敗損爲下山而當夜小人彊很而不知道如用其堅頂進觸丘冢不知所如也次八𢛅堅禍維用解𧋈之貞測曰𢛅堅禍用直方也𢛅與怙同解𧋈與獬豸同王曰解𧋈觸邪之獸光謂八爲禍中而當晝恃其堅而犯禍者也然君子之志在於觸邪雖堅以蹈禍不失其正也上九蠭焚其翊喪于尸測曰蠭焚其翊所憑喪也宋陸本作蠭熒其翊今從范王小宋本喪息浪切范曰尸主也光謂翊當作蛡九爲禍極而當夜小人爲惡之堅至於覆家如蠭自焚其房失其所主也易曰鳥焚其巢三方三州一部一家成陽家水準既濟入成次九日舍箕陰氣方清陽藏於靈物濟成形范本陰氣方清作陰氣方消小宋本作太陰方清今從二宋陸王本宋曰地稱靈陸曰清寒也光謂陽藏地中潜爲物主物賴以濟得成其形初一成若否其用不已冥測曰成若否所以不敗也王曰處成之初得位當晝功成若否不伐其功則其用不已而冥契於道也光謂一爲思下而當晝君子之道闇然日彰冥者隱而不顯也老子曰功成不居夫惟不居是以不去次二成微改改未成而殆測曰成微改改不能自遂也王本改字止一今從諸家王曰失位當夜成之尚微而又改之則事必不成且危殆也光謂二爲反復而當夜小人秉心不壹必無成功易曰晋如鼫鼠貞厲次三成躍以縮成飛不逐測曰成躍以縮成德壯也王曰事之既成已躍而進又縮而退知自戒懼則進而無咎光謂三爲成意而當晝君子臨事而懼躍縮未決所以然者以事之既成則如鳥之飛不可復逐故進退宜慎也易曰或躍在淵無咎次四將成矜敗測曰將成之矜成道病也王曰失位當夜是將成而矜必敗其成成功之道惡其矜伐也光謂四爲下禄故將成也當夜故矜也葵丘之會齊桓公震而矜之諸侯叛者九國次五中成獨督大測曰中成獨督能處中也小宋本作中能成今從諸家本中和莫盛乎五而當晝王者功成獨運皇極以督四方德業光大者也次六成魁瑣以成獲禍測曰成之魁瑣不以謙也小宋本作成魁瑣瑣今從諸家范本謙作讓今從二宋陸王本王曰六居盛滿而失位當夜雖爲成之魁主而内懐瑣細之行必且墮其功而獲禍矣光謂六爲極大而當夜凡大功既成則人欲分功者多矣爲其首者既尸其大必分其細以與人則衆無不悦若欲兼而有之則爲衆所疾反因成功以獲禍矣次七成闕補測曰成闕之補固難承也宋陸本承作依今從范王本范曰七爲失志故闕也君子之道善於補愆故有闕則補之王曰成功之下難以承之當思補過之道也次八時成不成天降亡貞測曰時成不成獨失中也王本亡作止今從諸家范曰八木也秋之所成也光謂小人當可成之時而無德以成之失時之中故天降咎而失正也上九成窮入于敗毁成君子不成測曰成窮以毁君子以終也小宋本作小人毁成今從諸家九爲盡弊而當晝日中則月盈則食成窮而入于敗物理自然敗則毁其成矣君子知成之必毁也故常自抑損使不至于成以終其福禄也養由基去栁葉百步而射之百發而百中之有一人立其旁曰善子不以善息少焉氣衰力倦弓撥矢鉤一發不中百發盡息謂此類也三方三州一部二家䦯陰家火準噬嗑范王讀爲致密之致陳以䦯爲𨴗陟栗切閉門也吴曰𨴗丁結切與窒同陸曰嗑者合也䦯亦陰陽相䦯闔也陰陽交跌相闔成一其禍泣萬物宋曰謂是時陰跌興閏於上陽跌衰守於下下上閈守其闔密如一矣光謂跌猶過甚也初一圜方杌棿其内窾换測曰圜方杌棿内相失也杌音兀棿音臬窾音款范曰水在火家更相克如圓鑿方枘杌棿不安光謂䦯合也一爲思始而當夜其心不合者也次二䦯無間測曰無間之䦯一其二也范曰二火合會䦯密如一光謂二爲思中而當晝其合無間二如一也易曰二人同心其利斷金次三龍襲非其穴光亡于室測曰龍襲非穴失其常也王小宋本無龍字今從宋陸范本王曰襲入也次四臭肥滅鼻利美貞測曰滅鼻之貞没所芳也宋陸本作所没方也范小宋本作没所勞也今從王本䦯準噬嗑故有食象四爲福始而當晝飲食之來先覺臭若見得思義不可失正也次五嚙骨折齒滿缶測曰嚙骨折齒大貪利也五爲福中而當夜小人貪利以自傷者也易曰噬腊肉遇毒次六飲汗吭吭得其膏滑測曰飲汗吭吭道足嗜也王本吭吭作吮吮小宋本汗作污音鳥吭作哾山劣反云哾哾小飲也道足嗜作道得嗜今從宋陸范本范曰汗潤澤也潤澤多吭吭然也光謂六爲盛多爲極大君子所嗜者道雖多取而無害也次七䦯其差前合後離測曰䦯甘差甘合離也七爲消爲敗損而當夜故䦯密自是而差跌前合後離也次八輔甘折廅甘缺其人暉且偈測曰輔折廅缺猶可善也宋陸本廅作盧今從范王本陳音廅鳥合切小宋偈音傑范曰覆庇其瑕廅其缺也王曰能輔助其折廅藏其缺小宋曰偈武勇也光謂八爲耗爲剥落而當晝故有是象上九陰陽啓𠯒其變赤白測曰陰赤陽白極則反也范本測作陰陽啓𠯒極則反也王本作陰陽赤白極作反也小宋本啓作晵音啓赤作殷爲閑反測曰陰殷陽白極作反也今從宋陸本𠯒五禾切王曰𠯒古化字吴曰吪化也光謂䦯者陰陽閉塞不通之象物極則反故復變而開通化生萬物萌赤牙白也三方三州一部三家失陽家木準大過入失次四二十六分十一秒小雪氣應陰大作賊陽不能得物䧟不測宋曰謂是時陽爲賊陰所攻奪不能復有所得也初一刺虚滅刃測曰刺虚滅刃深自幾也幾者動之微吉凶之先見者也一者思之微也生神莫先乎一而當晝君子雖或有失能深思遠慮自其幾微而正之不形於外如以刀刺虚雖復滅刃終無傷夷之迹也次二藐德靈微失測曰藐德之失不知畏微也宋陸范本微作徵今從王本藐音眇藐猶遠小也二爲思中故曰藐德得失之機既靈且微而時當夜小人不能慎微以至大失也次三卒而從而恤而竦而于甘心祖測曰卒而從而能自改也王曰卒終也從順也恤憂也竦敬也三居失之時得位當晝是能終順大道恤憂過失而加之以竦敬焉于其心祖者心之思慮以此爲主也光謂三爲成意當晝故有是象一正之於未形三改之於既成次四信過不食至于側匿測曰信過不食失禄正也范本作正禄也今從宋陸王本王曰居失之時而失位當夜不能自正其失則是信其過差之行而不食焉至于側匿言終日也終日不食必且喪其身矣食又喻禄故測互言之小宋曰日斜爲側日没爲匿光謂四爲下禄而當夜故有是象次五黄兒以中蕃君子以之洗于愆測曰黄兒以中過以洗也兒五稽切范曰黄兒謂年老有黄髮兒齒之徵也宋曰髮白復變謂之黄齒落復生謂之兒蕃籬也能以中正而爲蕃籬次六滿其倉蕪甘田食甘實不養其根測曰滿倉蕪田不能修本也范曰不修其德而據上禄倉滿田蕪百姓罷極食實困根本基不固失之甚也光謂六爲上禄爲盛多爲極大而當夜故有是象百姓足而君足猶養根而食實也次七疾則藥巫則酌測曰疾藥巫酌禍可轉也范曰巫以謝闕闕除疾瘳酌以福之也光謂七爲禍下離咎而犯菑而時當晝故有是象次八雌鳴于辰牝角魚木測曰雌鳴于辰厥正反也范曰牝雞無晨牝宜童而角魚宜水而木失之甚也上九日月之逝改于尸測曰改于尸尚不遠也范曰君子之道執行於世雖没猶存不以年高日月巳逝其有得失雖在尸柩猶念自改王曰先賢垂勸戒之深死而後改猶謂之不遠光謂生時之失死告子孫而改之猶未爲遠也楚恭王臨薨告令尹進蘇而逐申侯劉向曰於以開後嗣覺來世猶愈於没身不寤者也字書無之申侯楚文王之臣新序之誤也三二部方三州一家劇陰家金亦準大過入劇次日舍南斗王曰劇極也過差之極光謂大過棟橈之世劇亦離亂之象陰窮大泣於陽無介離之劇王小宋本泣作位范本無於字王本介作分范本作儔小宋本作音仍惹也今從宋陸本音儔宋曰泣於陽使陽泣也謂是時陰氣極大陵弱於陽使其泣無復有纖介之功於萬物也光謂古儔字儔類也凡物得陽而生者皆陽之類也陰既窮大用事凡陽之類皆遭離其劇禍也初一骨纍其肉幽測曰骨纍其肉賊内行也宋陸范皆作骨纍其肉内幽今從王小宋本骨肉相親之物一爲思始而當夜禍亂之本自其内生如骨纍繫其肉潜隱而人莫之見也次二血出之蝕凶貞測曰血出之蝕君子内傷也范本作君子傷之今從二宋陸王本次三酒作失德鬼睒其室測曰酒作失德不能將也范本將作持今從二宋陸王本睒失冉切王曰睒視也次四食于劇父母來餕若測曰食劇以若爲順禄也范小宋本來作采今從宋陸王本餕音俊爲于爲切范曰餕熟食也若順也光謂四爲下禄而當晝君子仕於亂世求禄以食其親不失於順也次五出野見虚有虎牧猪攓絝與襦測曰出野見虚足也王本虎作唐今從諸家虚與墟同攓音愆取也絝與袴同襦音儒短衣也王曰出于田野而見丘虚光謂五爲中禄而當夜小人乘亂世而居盛位務爲貪暴以殘民如虎牧猪民無所措其手足也次六四國滿斯宅測曰四國滿斯求安宅也次七麃而丰而戴禍顔而測曰麃而丰而戴禍較也范本丰作半王本作牛小宋本作羊今從宋陸本麃普表切丰敷容切較音角次八缾纍于繘貞測曰纍于缾厥職迫也范本測作缾纍繘厥職迫也今從二宋陸王本繘餘律切上九海水群飛弊于天杭測曰海水群飛終不可語也范本弊作蔽王小宋本語作落今從二宋陸本王本天作大今從諸家三方三州二部二家馴陽家士準坤宋曰坤順也馴亦順也陰氣大順渾沌無端莫見其根宋曰謂陰成功於是將大順時歸之於陽其事渾沌無有端際莫能見其根源也初一黄靈幽貞馴測曰黄靈幽貞順以正也故黄生神故靈下下故幽當晝故貞思慮之德順而能正者也次二其膏女子之勞不静亡命測曰膏之亡不能浮也宋陸本作繩小宋本作音鴛云美好也今從范王本王本亡作正今從諸家吴曰古孕字范曰膏潤澤也次三牝貞常慈衛其根測曰牝貞常慈不忘本也易曰恒其德貞婦八吉坤爲母三性喜情仁又爲多子而當晝故曰牝貞常慈言常慈乃婦人之正道也三爲木爲思上爲成意爲自如能不忘其本者也次四徇其勞不如五之豪測曰徇其勞伐善也小宋本作不如五五之豪今從諸家王曰德兼千人爲豪光謂四爲下禄而當夜小人事君則伐其功不如五之靈囊大包不敢自盛也次五靈囊大包其德珍黃測曰靈囊大包不敢自盛也王本靈作虚今從諸家小宋本靈囊作靈括巨橐今從諸家王曰珍者爲物所貴黄者得中之義光謂五爲囊爲包地之爲物含弘光大故曰靈囊大包五居盛位而當晝君子爲臣位高而不驕功大而不伐故有是象易曰黄裳元吉次六囊失括泄珍器測曰囊失括臣口溢也小宋本囊亦作橐今從諸家六爲穴爲竇過中而當夜小人不能含章以從王事如囊之失結而泄珍器也易曰臣不密則失身次七方堅犯順利臣貞測曰方堅犯順守正節也七離咎犯菑而當晝君子事上獻可替否行之以方守之以堅雖有犯無隠而不失其順得爲臣之正道故利也次八馴非其正不保厥命測曰馴非其正無所統一也八爲疾瘀爲耗爲剥落而當夜小人事上左右前却是非可否惟君是順不能守道執一故不保其命也上九馴義忘生賴于天貞測曰馴義忘生受命必也九禍之窮也而當晝君子事君盡節有死無貳順義忘生所賴者天之正命耳三方三州二部三家將陰家水準未濟入將次八日次星紀大雪氣應斗建子位律中黄鐘陸曰將者陰陽窮上反下甫當復升既濟曰物不可窮故受之以未濟其義同之陰氣濟物乎上陽信將復始之乎下王本始作如今從諸家宋曰謂是時陰成物於上功成者退故陽氣復始之於下也初一將造邪元厲測曰將造邪危作主也范曰厲危也元始也王曰居將之初而失位當夜將造於邪者也以危爲本故云作主光謂一爲思始而當夜故有是象次二將無疵元晬測曰將無疵易爲後也范曰睟純也王曰得位當晝將寡其過故曰將無疵也二之本質純睟故云元睟始而無疵後必易繼也光謂二爲思中而當夜故有是象次三鑪鈞否利用止測曰鑪鈞否化内傷也宋陸測作鈎不化内傷也今從范王本范曰冶爲鑪陶爲鈎王曰鑪鈞者造物之始始而不以其道利在速止也將道益盛而失位當夜將而不以理者也光謂否音鄙不善也三爲成意而當夜故有是象次四將飛得羽利以登于天測曰將飛得羽其輔彊也四爲下禄爲外它而當晝君得位人復輔之如將飛而得羽也次五大爵將飛拔其翮毛羽雖衆不得適測曰大雀拔翮不足賴也王曰五居盛位當爲首主而失位當夜乖於其宜如大鳥將飛而拔其六翮雖有毛羽之衆安得有所飛哉光謂晋平公曰吾食客三千餘人尚可謂不好士乎固桑曰鴻鵠冲天所恃者六翮耳夫腹下之毳背上之毛增去一把飛不爲高下不知君之食客六翮邪將腹背之毛毳也次六日失烈烈君子將衰降測曰日失烈烈自光大也宋陸本衰降作襄隆王本降亦作隆今從范小宋本小宋失作昊今從諸家范曰降下也五爲日中故六爲日昳也烈烈盛也日之熱恒在中之後故言烈烈也光謂失與昳同徒結切六爲上禄然過中而當晝雖有烈烈之盛君子知其將衰能自降抑故不失其光大也次七趹船跋車其害不遐測曰趹船跋車不遠害也王本船作肱遐作今從宋陸范本趺古宂切跋蒲撥切范曰七爲失志船車載治之具賢者亦治世之具也失志之主故蹋趹之棄治之具害自己招故不遠也光謂七爲禍始而當夜故有是象國之將敗先棄賢輔次八小子在淵丈人播船測曰丈人播船濟溺世也范曰小子謂百姓也在禍難中若在淵也丈人播船而濟之光謂八爲禍中而當晝故有是象上九紅蠶緣于枯桑其繭不黄測曰緣枯不黄蠶功敗也范本測緣枯不黄作緣于枯桑王本作枯桑不黄今從宋陸本范曰蠶之初生有毛爲老故爲紅王曰九居亢極而失位當夜無所復將紅蠶蠶之病者而緣於枯桑則何由成其繭矣不黃謂不中用也三方三州三部一家難乃旦切陽家火準蹇陰氣方難水凝地坼陽弱於淵小宋本陰氣方難作太陰難今從諸家小宋曰陰窮極陽信復陰懼於陽大作險難初一難我冥冥測曰難我冥冥見未形也范本作未見形也今從二宋陸王本難者阻抑之象一思之微也而當晝阻抑禍惡於未形之時夫何病哉次二凍于冰瀆狂馬揣木測曰狂馬揣木妄生也范本無于字揣作椯今從二宋陸王本次三中堅剛難于非常測曰中堅剛終莫傾也王本傾作顧今從諸家三爲成意而當晝心能堅剛以阻抑非常者也次四卵破石毈測曰卵破之小人難也宋陸王本難作雜今從范小宋本徒玩切王曰當難之時失位當夜不知難之道是故以卵破石則其毈壞而不生也必矣次五難無間雖大不勤測曰難無間中密塞也王曰得位處中爲難之主是能窒塞其端而無間則禍難無自入矣雖處大難之際不勞勤力而遂免焉次六大車川川上輆于山下觸于川測曰大車川川上下軔也宋陸王本川川作巛巛吴曰巛古川字范王小宋本上下軔作上下輆今從宋陸本吴曰輆苦海切礙也軔而振切范曰川川重遲之貌王曰六居盛滿而失位當夜不得免難之宜次七拔石䂦䂦力没以引測曰拔石䂦䂦乘時也范本引作盡今從二宋陸王本䂦之人切宋曰時謂晝也范曰石以諭難䂦䂦難致之貌王曰力没謂盡力而引將出於難也勞而僅免以得位當晝故也次八觸石決木維折角測曰觸石决木非所治也王曰難道轉極而失位當夜無以自免是觸石决木必遇折角之凶光謂遇難當循理以免乃與木石爲敵非所以治難也上九角觟䚦終以直其有犯測曰角觟䚦終以直之也范本觟䚦作解衆范王本其有犯作其有施小宋本作有所施今從宋陸本觟䚦與解衆同觟音蟹䚦直介切王曰處難之極而得位當晝是以直免禍用其解䚦之角以直之終必有所施而不至於咎悔也光謂解衆之角所犯必以直也三方三州三部二家勤陰家木亦準蹇太陰凍沍戁創於外微陽邸冥膂力於内諸家無太字今從小宋本小宋本冥作寘今從諸家戁奴板切吴曰悚懼也邸與抵同王曰陰氣以極雖凍沍凝閉而戁恐創艾於外陽氣尚微而將邸觸冥昧之中以見其膂力於内陰極陽生之漸故象勤勞初一勤謀于心否貞測曰勤謀否貞中不正也諸家無謀字今從宋陸本王曰處勤之初而失位當夜勤而不以其道者也否貞不正之謂也光謂一爲思始爲勤勞居勤家而當夜故有是象次二勞有恩勤悾悾君子有中測曰勞有恩勤有諸情也悾音空王曰二得位當晝得勤之道勞而有恩勤不虚施者也性悾猶款款也勤之而款款不倦其勤者也又得君子之中道則何咎悔之能及乎光謂中衷情也二爲思中而當畫君子盡忠於人恩斯勤斯至誠悾悾非徒有於外者也次三羈角之吾其泣呱呱未得繦扶測曰羈角之吾不得命也小宋本未得作未有今從諸家一宋陸范本扶皆作杖今從王本繦居兩切宋曰羈角謂童幼也王曰男角女羈孩子之飾也吾者吾吾然無所歸之貌呱呱泣聲繦抱扶持也若孩童之吾吾而泣不得長者抱持之雖勤勞怨苦終無所歸以喻三當勞苦之時而失位當夜無所復歸故云然也次四勤于力放陪忘食大人有克測曰勤力忘食大人德也范本陪作倍今從二宋陸王本宋陸本德作得今從范王小宋本放甫罔切王曰勤道轉盛而得位當晝不失其宜是當勤難之時而能勤其力放乎陪隸之事而忘其禄食之報有大人之德乃能之以至于成功也光謂四爲下禄而當晝故有是象次五狂蹇蹇禍邇福遠測曰狂之蹇蹇遠乎福也宋陸范本狂作徃今從王小宋本王曰五居盛位而失位當夜勤而大失其宜故象狂而蹇蹇宜其遠福而近禍矣次六勤有成功幾于天測曰勤有成功天所來輔也宋陸王本作天夾也宋曰夾近也近之所以福也陸曰夾者洽也小宋本作天所夾輔今從范本王曰六居盛位而得位當晝故幾近也次七勞牽不其鼻于尾弊測曰勞牽之弊其道逆也范曰牽牛不其鼻而尾故勞弊也光謂七爲索爲繩又爲失志而當夜故有是象次八勞踖踖心爽蒙柴不却測曰勞踖其心殉國也踖吴資昔切小宋音鵲上九其勤其勤抱車入淵負舟上山測曰其勤其勤勞不得也王曰九居亢極之地而又失時當夜勤而不以其道者也三方三州三部三家養陽家金準頤九之末天度氣餘猶有六十分二十四秒踦當四十分一十六秒贏當二十分八秒陰弸于野陽蓲萬物赤之於下宋陸本弸作王本作殆小宋赤作殷今皆從范本字字書無之弸蒲萌切蓲陳吴侯切吴音敷范曰盛極稱弸蓲隱也物之初生其色赤謂是時陰氣盛極於野故陽隱藏萬物赤之於下陸曰蓲讀與漚菅之漚同言陽養漚萬物之根使皆赤光謂弸也初一藏心于淵美厥靈根測曰藏心于淵神不外也小宋本美厥靈根作美厥靈元今從諸家爲思下存神固本所以養生次二墨養邪元函匪貞測曰墨養邪中心敗也范本匪作否今從二宋陸王本吴曰墨與默同函胡男切王曰失位當夜失養之宜默然養其邪僻之道光謂元始也二爲思中而當夜小人之惡雖未著於言行養其邪端内含非正終不能入於君子之塗次三糞以肥丘育厥根荄測曰糞以肥丘中光大也荄古哀切王曰得位當晝善於養道故象糞於肥丘之上以育草木之根荄則其滋茂蕃昌可立待矣次四燕食扁扁其志𠑩𠑩利用征賈測曰燕食扁扁志在賴也小宋本在作有今從諸家扁音篇𠑩居蠖切賈音古宋曰賴利也光謂四爲下禄而當夜小人得位志在求利以自養如燕之飛扁扁然𠑩食而已此乃行賈之道耳次五黃心在腹白骨生肉孚德不復測曰黄心在腹上德天也范本上德作上得今從二宋陸王本宋曰言上德如天施也光謂黄中也骨枯槁之物也孚信之洽者也五爲福中而當晝爲養之主允執其中以養天下雖白骨可以生肉況於人乎況於鳥獸草木乎其德如天雲行雨施治于四表萬物不可德之而報復也次六次次一日三餼祇牛之兆肥不利測曰次次之餼肥無身也王本無次次字小宋本作沉沉睢睢又曰肥没今從宋陸范本吴曰次與趑同音咨范曰次次不安之貌巳卜之牛待肥則用故無身也陸曰六居過滿失位當夜養之太過而不得其宜者也故象一日三餼以豐其食若神祇郊廟之牛芻秣過常已應卜郊之兆然而體益肥則益不利於身矣光謂六爲上禄當夜故有是象次七小子牽象婦人徽猛君子養病測曰牽象養病不相因也宋陸本徽作微今從諸家王曰七居過滿之地理近於危然得位當晝君子處之則吉小人婦人處之則凶若小子牽象力不服制必有顛危之患唯君子知時之極以道養其病乃可以得終吉焉一吉一凶二道相反故曰不相因也光謂徽大索謂縻縶也猛猛獸也七爲敗損爲禍階故曰病時當晝故爲君子養之太過福極禍來小人不量其力尚欲固其所養君子知時與之消息如養病然故無咎也次八鯁不脱毒疾發鬼上壟測曰鯁疾之發歸于墳也八爲禍中當夜小人固養不已如骨鯁其咽不能自脱以致大禍如毒疾之發而不可救藥也上九星如歲如復繼之初測曰星如歲如終養始也范本作終始養今從宋陸王本養之上九居首賛之末日窮于次月窮于紀星回于天歳將更始以終養始以初繼末循環無端此天道之所以無窮也踦賛一水踦不足也朞三百六十五日四分日之一玄七百二十九賛當三百六十四日半其不足者半日爲踦賛踦居宜切凍登赤天晏入玄泉測曰凍登赤天陰作首也范曰凍至寒也而天至高也晏至熱也而泉至深也凍在天上故爲首也光謂赤陽之盛也玄陰之極也凡物極則反自始以來陰陽之相生晝夜之相承善惡之相傾治亂之相仍得失之相乘吉凶之相反皆天人自然之理也贏賛二火贏有餘也三百六十五日之外有餘者四分日之一爲贏賛一虚一贏踦踦所生測曰虚贏踦踦儃無巳也范小宋本踦踦作踦奇范本儃作禪今從宋陸王本儃古禪字時戰切陸曰陰極陽生更相儃代無窮巳也光謂數之踦贏雖天地不能齊也夫惟不齊乃能變化生生無窮是故曰二十九日有踦而遷次月二十七日有踦而周天然後有晦朔十干十二支然後有六甲此其所以爲長久也集註太玄經卷之六
