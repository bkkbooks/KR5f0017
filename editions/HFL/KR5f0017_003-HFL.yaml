front:
  text: 集註太玄經卷之三心三二方一州一部一家更
  hash: sha256:f9b70233556d82ca9707b6cf3d81086c83b1e878abeddad93ccaac4ca654eee6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0017_HFL_003-001a, image: hfl/0861/0861-004.png}
body:
  text: 更居亨切陰家水準革入更初一二十分九秒穀兩氣應次八日舍天畢陽氣既飛變勢易形物改其靈宋曰在天稱飛初一冥化否貞若性測曰冥化否貞少更方也少詩照切一爲思始而當夜幼少之時習於不正如其天性不可復改也賈誼曰幼成若天性習慣如自然少更方者道變於幼少之時也次二時七時九軫轉其道測曰時七時九不失當也七者陽之盛也九者陽之衰也軫輪也二爲思中而當晝君子消息盈虚隨時盛衰如輪之轉應變無窮不失至當也次三化白于泥淄測曰化白于泥變不明也王曰凡改更之道貴於變惡從善今反爲泥淄失更之宜光謂淄黑也三爲思上而當夜與不善人居如以白物涅於泥中與之皆黑也次四更之小得用無不利測曰更之小得民所望也王本不利字下更有我否非其有恥六字今從諸家四爲福始而當晝變更之小得者也變更小得合於民望用無不利次五童牛角馬不今不古測曰童牛角馬變天常也王曰五居盛位而當夜是改更之道大不得其所牛反童之馬反角之不今不古無其事也光謂無角曰童小人得位妄變法度反易天常既不適於今又不合於古若劉歆王莽之類是也次六入水載車出水載杭宜于王之更測曰車杭出入其道更也諸家皆無王字今從范本杭與航同舟也水舟陸車理之常也如履雖新必施於足冠雖敝必冠於首然湯武達節應天順人君臣易位其道當然不得不變也次七更不更以作病測曰更不更不能自臧也諸家本皆作能自臧也今從王本七爲禍始而當夜俗化之敝失於當更而不更故也董仲舒曰爲政而不行甚者必變而更化之乃可理也次八駟馬跙跙能更其御測曰駟馬跙跙更御乃良也范本作而更其御今從宋陸王本跙才與切范曰跙跙不調也王曰得位當晝更之以道駟馬跙跙行不進也更以良御乃得其宜光謂八爲禍中故曰駟馬跙跙以象國家不安也然當日之晝故曰更其御也更御以象改任賢人使修政治也上九不終其德三歲見代測曰不終之代不可乆長也范本無久字今從宋陸王本九爲禍極而當夜小人不終其德驕淫失位人將代之也二方一州一部二家斷陽家火準夬陽氣彊内而剛外動能有斷决范本作動而能有斷决王本作動而能斷决今從宋陸本初一斷心滅斧冥其繩矩測曰斷心滅斧内自治也一爲思始而當晝能以法度内斷於心而人不見其迹者也次二冥斷否在塞耳測曰冥斷否中心疑也二爲思中而當夜心識蒙暗不能决斷雖有嘉謀不知適從聽之不聦故曰塞耳也次三决其聾𪖣利以治穢測曰决其聾𪖣利謀也𪖣丁計切王曰𪖣鼻疾也光謂三爲成意而當晝能决去蔽塞通納善謀者也次四斷我否食非其有耻測曰斷我否食可恥也四爲下禄而當夜處非其位食非其禄不能自斷而去誠可恥也次五大腹决其股脱君子有斷小人以活測曰大腹决脱斷得理也王本股作服今從諸家五爲著明而當晝斷之盛者也大腹决不容姧也其股脱所存大也次六决不决爾仇不闊乃後有鉞測曰决不决辜及身也六過中而當夜當斷不斷仇讎不遠必將受其戮辱者也次七庚斷甲我心孔碩乃後有鑠測曰庚斷甲義斷仁也范曰庚義也甲仁也孔甚也碩大也鑠美也光謂庚金主羲甲木主仁七爲刀有用刑之象君子以羲斷仁舍小取大然後有治平之美也夏書曰威克厥愛允濟次八勇侏之傠盗蒙决夬測曰盗蒙之决妄斷也小宋本傠作𣣢音移今從諸家王本無夬字今從二宋陸范本侏音株傠音伐范曰無道爲侏反義爲傠上九斧刃蛾蛾利匠人之貞測曰蛾蛾之斧利征亂也九爲兵爲鉞又爲禍極故曰斧刃蛾蛾匠人執斧以伐木君子秉羲以征亂二方一州一部三家毅陰家木亦準夬致果爲毅夬揚于王庭故毅兼有言語之象陽氣方良毅然敢行物信其志信與伸同宋曰善而不橈爲良初一懷威滿虚測曰懷威滿虚道德亡也一爲思始而當夜小人懷威滿心恃力滅羲者也次二毅于心腹貞測曰毅于心腹内堅剛也二爲思中而當晝君子守正堅剛不可奪也次三戴威滿頭君子不足小人有餘測曰戴威滿頭小人所長也三爲成意而剛毅外露故曰戴威滿頭君子居之則自以爲不足小人居之則自以爲有餘次四君子説器其言柔且毅測曰君予説器言有方也范本言作人今從宋陸王本四爲下禄而當晝君子之言皆有法度適用如器柔而不懦毅而不愎也次五不田而穀毅于揀禄測曰不田而穀食不當也宋陸王本揀作棟今從范本五當日之夜無德而享盛禄剛果所施施於擇禄而已故曰不田而穀毅于揀禄詩云不稼不穡胡取禾三百廛兮次六毅于棟柱利安大主測曰毅于棟柱國任彊也六爲上禄而當晝國之大臣忠力强毅能勝其任以安社稷者也次七觥羊之毅鳴不類測曰觥羊之毅言不法也范曰觥羊大羊也光謂羊很物也類善也七爲禍階而當夜小人剛很言無所擇不顧法度也次八毅于禍貞君子攸名測曰毅于禍貞不可幽蔀也宋陸本蔀作都王作却今從范本蔀蒲口切王曰八居禍中故毅于禍而當位當晝不失其貞是君子之所名也光謂君子守正遇禍剛毅不撓身雖可殺而名不可掩也蔀覆也上九豨毅其牙發以張弧測曰豨毅其牙吏所獵也王本吏作人今從諸家豨音喜王曰居毅之極位且當夜若野豕之毅其齒牙必有張弧之斃也光謂豨大豕也小人極毅以取禍如豕毅其牙適足自招射獵而已一方一州二部一家裝陽家金準旅入裝次四三十八分三十二秒日次實沈立夏氣應斗建巳位律中仲吕裝治行也陽氣雖大用事微陰據下裝而欲去陸曰陰氣據下故陽裝束志在去也初一幽裝莫見之行測曰幽裝莫見心已外也一爲思始而當晝君子見微潜有去志而人莫知之也次二𪃿鵝𢡖于冰翼彼南風内懷其乘測曰𪃿鵝之𢡖懷憂無快也宋陸本𢡖作摻今從范王本𪃿音哥又音加或作𪃿乘時證切又食陵切王曰𪃿鴈也失侶後時𢡖于寒冰然後翼風之南内懷其侶憂而無快乘者四鴈也光謂方言飛鳥曰雙鴈曰乘乘匹也鴈避寒就温自北徂南猶人之去危就安也二爲思中而當夜小人懷寵耽禄不能避患於微如鴈之内懷其乘而不能遠游也易曰係遯有疾厲次三徃其志或承之喜測曰徃其志遇所快也三爲思上而當晝雖爲羈旅徃得其志故或承之喜也次四鶤鷄朝飛踤于北嚶嚶相和不輟食測曰鷄朝飛何足賴也宋陸本踤作咵王作跨今從范本與鵾同古魂切踤與萃同又慈恤切王曰大鳥朝飛宜就陽以自反之於北失其所向雖相和嚶嚶然終不輟其求食之意既失其道亦何利焉次五鴻裝于淄飲食頤頤測曰鴻裝于淄大將得志也次六經六衢周九路不限其行賈測曰經六衢商旅事也王曰六衢九路無所不歷勞而求利者小人之事也光謂六爲盛多而當夜小人周流天下不限其行非爲行道也其志徇利而已與商賈無異也次七裝無㒧利征咎測曰裝無㒧禍且至也宋陸王本㒧作離今從范小宋本㒧與儷同音麗次八季仲播軌泣于道用送厥往測曰季仲播軌送其死也范王本泣于道作泣于之道今從宋陸本上九裝于昬測曰裝于昬尚可避也王曰處裝之道宜處於先今居極位頗失違難之道然得位當晝如整裝避禍於昬昧之時雖云太晩猶可避也光謂九爲禍終而當晝君子遇禍之窮裝而去之雖於時已晩猶愈於宴安不去者也二方一州一部二家衆陰家土準師入衆次四日舍觜觿次八日舍參陽氣信高懷齊萬物宣明嫭大衆多信與伸同嫭音護陸曰嫭美貌初一冥兵始火入耳農輟馬穀尸將班于田測曰冥兵之始始則不臧也王本穀作轂今從諸家王曰班布光謂一以幽微在兵之初兵端已萌而未著者也故曰冥兵始夫兵者不祥之器人聞之驚遽故曰火入耳農輟其耕爲給饋餉食馬以穀爲將用之尸布于田言死者多也次二兵無刃師無陳麟或賓之温測曰兵無刃德服無方也王本麟作鄰今從諸家陳直刃切范曰麟獸有角不觸王曰二居下體之中而又得位當晝得衆之宜故能兵不交刃師不置陳而彊鄰敵國皆或賓之光謂二爲思中而當晝君子修德於心而四海率服兵無所用故曰兵無刃師無陳賓者自外來者也麟或賓之象有武而不用也温者不威暴也次三軍或纍車丈人摧孥内蹈之瑕測曰軍或纍車廟戰内傷也宋陸本丈作大孥作弩王本摧作推孥作奴今皆從范本三爲思終未戰而先謀於内者也車被纍絓覆所載也丈人家之長也孥妻子也謀之不臧如丈人而自摧毁其家也夫敗豈外來哉由在内之時已踐瑕釁故敵人得而乘之孫子曰未戰而廟算不勝者筭少也次四虎虓振廞豹勝其私否測曰虎虓振廞如鷹之揚也王本勝作騰今從宋陸范本二宋陸范本私作秘今從王本虓許交切廞許金切否方九切范曰虓怒聲也振廞盛怒貌王曰處衆而近尊位將帥之任也得位當晝善用其衆如虎之虓振起廞興也光謂四爲下禄得位用衆者也虎豹皆武猛之象用兵者雖闞如幀虎時惟鷹揚然不以之争利决忿能自勝其私心故可用而不用也法言曰或問武曰克能勝其私曰克次五躆戰喈喈若熊若螭測曰躆戰喈喈恃力作王也躆與踞同當作劇劇甚也五居盛位而當夜恃力取勝不足以服天下也次六大兵雷霆震其耳維用詘腹測曰大兵雷霆威震無疆也王本維作候今從諸家詘與屈同屈腹猶言服其心也六爲極大而當晝王者之兵非務殺傷憚之而已故如雷如霆以威聲震之使其心服也詩云震驚徐方如雷如霆徐方震驚白虎通曰戰者憚也次七旌旗絓羅干鉞蛾蛾師孕唁之哭且䁲測曰旌旗絓羅大恨民也范王本鉞皆作戈今從宋陸本絓户卦切唁音彦䁲莫佳切范曰弔生曰唁竊視稱䁲光謂七爲禍始而當夜師之覆敗者也旌旗絓羅干鉞蛾蛾敗亂之貌也師衆也夫死婦孕民之愁苦尤劇者也衆孕相唁既哭且竊視其上怨恨之也次八兵衰衰見其病不見輿尸測曰兵衰衰不血刃也衰衰罷弊貌八爲疾瘀爲耗爲剥落爲禍中而當晝能罷弊敵國不戰而屈人兵者也上九斧刃缺其柯折可以止不可以伐徃血測曰刃缺柯折將不足徃也王曰徃必見血而自傷也光謂九爲用兵之極逢禍之窮窮兵而不知止者也二方一州二部三家密陽家水準比密者比近也周密也陽氣親天萬物丸蘭咸密無間王本咸作盛今從諸家王曰丸蘭盛大貌萬物乘陽氣皆盛大周密而無間隙也光謂陽氣上而親天高之極也初一窺之無間大幽之門測曰窺之無間密無方也宋曰事事皆密故以無方言之光謂一爲思始而當晝君子潜心於密以立事定功人莫能窺者也幾事不密則害成次二不密不比我心即次測曰不密不比違厥鄉也比頻寐切下同君子愛近以懷遠小人反是二爲思中而當夜不能懐近而勞心於遠即就也次旅舍也違去其鄉而欲就次於旅舍舍近而圖遠者也詩云無田甫田維莠驕驕無思遠人勞心忉忉次三密于親利以作人測曰密于親爲利臧也三爲思上而當晝君子愛其親則知愛人之親推其心以及他人故曰利以作人次四密于腥臊三日不覺殽測曰密于腥臊小惡通也王曰密于腥臊親惡德也光謂四爲外佗而當夜與不善人相親者也與不善人相親久則化之矣孔子曰與不善人居如入鮑魚之肆久而不知其臭則與之爲一矣小惡通者始於小惡弗去久則與之通而爲一也殽混殽也次五密密不罅嬪于天測曰密密不罅并天功也罅呼嫁切嬪音頻王曰居中體正得位當晝爲時明君親於可親故曰密密不罅謂無間隙也如此則能功配於天矣光謂密密不罅者君臣百姓靡不親密無有間隙也次六大惡之比或益之恤測曰大惡之比匹異同也六爲福終而近於禍故比于大惡而或益之憂也非我族類其心必異異類相匹適足自累也易曰比之匪人次七密有口小鰓大君在無後測曰密口小鰓賴君達也王本無無字小宋本無作其今從宋陸范本范小宋本達作逢今從宋陸王本鰓蘇來切次八琢齒依齦三歲無君測曰琢齒依齦君自拔也齦語斤切王曰齒之與齦相親者也或琢其齒而依其齦則失其所親矣上九密禍之比先下後得其死測曰密禍之比終不可奪也九爲禍極而當晝君子同志相比堅不可奪先相謙下則其志益親故雖遇大禍而終得其死力也二方一州三部一家親陰家火亦準比入親次八日舍東并一十六分七秒小滿氣應親者相愛厚也陽方仁愛全真敦篤物咸親睦陽氣純粹故曰全真初一親非其膚其志齟齬測曰親非其膚中心閑也王本無親字今從二宋陸范本王曰居親之初而失位當夜失其親道非其膚謂踈遠之人非其肌膚之親而或親之則其志齟齬不相入矣心相防閑失其親道光謂一爲思始而當夜親非其親者也外雖相親内志不合終必乖離閑者隔礙不通之謂也次二孚其内其志資戚測曰孚其内人莫間也范本内作肉間作聞王本内作肉間作閑今從宋陸本王曰資取也戚親也其志惟取於相親附也光謂二爲思中而當晝君子以誠信相親之深者也故曰孚其内次三螟蛉不屬蜾蠃取之不迓侮測曰螟蛉不屬失其體也王本不迓侮作蠃侮今從宋陸范本蜾音果蠃郞果切螟音冥蛉音零屬之欲切螟蛉桑蟲蜾蠃蒲盧也屬綴也迓侮猶言御侮也三爲思終而當夜小人不能屬綴其親以御外侮而使之乖離與佗人相合如螟蛉不能自育其子而爲蜾蠃所取也詩云螟蛉有子蜾蠃負之教誨爾子式穀似之次四賓親于禮飲食几几測曰賓親于禮賓主偕也王曰几几有法度也光謂四爲條暢而當晝君子以饗燕之禮交通親愛者也賓所以親親其有禮不在飲食也孔子曰吾食於少施氏而飽少施氏食我以禮賓主偕言皆有禮也次五厚不厚比人將走測曰厚不厚失類無方也比頻寐切王曰五雖居中而失位當夜當厚者不厚則其所比附之人皆將去之光謂不能親其所當親厚其所當厚使比近之人皆棄之而走失類孤立危無日矣子太叔曰晋不鄰矣其誰云之次六厚厚君子秉斗測曰厚厚君子得人無疆也六爲盛多而當晝能親其所親厚其所厚者也夫君子厚近而遠者至親親而䟽者附如斗居中央而衆星拱之故曰君子秉斗次七高亢其位庳於從事測曰位高事庳德不能也宋陸本從作周范作同今從王本庳便是必至二切又音卑王曰七居過滿之地失位當夜位雖高亢而所行之事則甚庳細也次八胏附乾餱其幹已良君子攸行測曰胏附之行不材也宋王本胏作脯幹作乾行作徃王本附作腑今從范本餱音侯范曰削曰胏胏附如胏之附木王曰有胏附之親而生乾餱之怨君子去之詩云民之失德乾餱以愆光謂肺附以諭族人附著宗主也民雖微賤猶當分乾餱以濟其親也胏附之親至薄也猶當以乾餱收恤之況良幹而棄之乎此微子所以歸周也上九童親不貞測曰童親不貞還自荄也荄古哀切宋曰謂自盡其根荄也王曰居親之極而失位當夜若童昬之人所親者必不正矣二方一州三部二家斂陽家木準小畜陽氣大滿於外微陰小斂於内陸曰謂陰小斂萬物之根荄初一小斂不貸利用安人正國測曰小斂不貸其道當也貸它代切自一至三微而未著故皆有韱小之象一當日之晝君子賦斂薄而有常不稱貸於民故利用安人正國一曰貸當吐得切次二墨斂韱韱𥧲我匪貞測曰墨斂韱韱非所以光也小宋本韱作截王本𥧲作𥧲今從宋陸范本韱息廉切范曰韱韱少也光謂墨貪也小人貪於聚斂喜見小利漸而入於匪正非所以爲光美也次三見小勿用以我扶䟽測曰見小勿用俟我大也王曰三得位當晝得斂之宜見小勿用是因我滋以至扶踈盛大也光謂物方微小君子養之以俟大而後取之禮不麛不卵不胎不殀夭草木零落然後入山林皆此意也次四斂利小刑小進大退測曰斂利小刑其政退也范本政作正今從宋陸王本次五畜槃而衍繭純于田測曰畜槃繭純不奪時也槃樂也純美也五爲繭又居盛位而當晝賦斂不妄生之有時用之有節故六畜蕃衍蠶桑饒美也次六閔而緜而作大元而小人不戒測曰閔緜之戒不識微也王本閔緜之戒作閔緜不戒今從宋陸范本閔緜小貌元始也六在斂家過中而當夜斂怨者也怨始於小而至於大小人不戒故怨及之而不自知也次七夫牽于車妻爲剥荼利于王姑不利公家病測曰牽車剥荼斂之資也陸曰資財夫妻斂財利家不利國也王曰牽車重役而其利微剥荼苦菜而其功寡可以給私室利于王姑不足以供公上也光謂爾雅王父之姊妹爲王姑次八大斂大顛測曰大斂之顛所斂非也陸范王本顛作巔今從二宋本王曰八居斂極而失位當夜大斂者也處禍之中而求大斂必有顛隮之患矣上九斂于時利圉極菑測曰斂于時奚可幾也王曰圉與禦同光謂九爲禍極而當晝君子當豐穰之時重斂而民不以爲暴所以豫備凶歳禦此極灾也幾當作譏言斂得其時雖重無譏也孟子疾狗食人食而不知檢塗有餓莩而不知發二方一州三部三家彊陰家金準乾陽氣純剛乾乾萬物莫不彊梁范王本純作統今從宋陸本初一彊中否貞無攸用測曰彊中否貞不可與謀也否方乆切一爲思始而當夜彊心而不正者也故無所可用次二鳳鳥于飛修其羽君子于辰終莫之圉測曰鳳鳥于飛君子得時也范曰圉止也光謂辰時也二爲思中而當晝君子得時彊於爲義人莫之止如鳳鳥之飛其羽修長不能制也凡中者皆有得位得時之象次三柱不中梁不隆大厦微測曰柱不中不能正基也三居下體之首而承於上梁柱之象也當日之夜小人不彊而弱不勝其任者也不勝其任則國基墜矣次四爰聦爰明左右㩖㩖測曰爰聦爰明庶士方來也宋陸王本㩖皆作橿小宋作彊今從范本王本方作永今從諸家范曰四在其行行數相扶㩖㩖盛也王曰㩖㩖然衆扶之貌也吴曰㩖從手字書無之從木者音薑范以四爲金而本首爲金故云行數相扶不以彊爲扶也光謂四爲條暢而當晝君子有聰明之德故庶士方來左右助之所以爲彊也次五君子彊梁以德小人彊梁以力測曰小人彊梁得位益尤也王曰五居君位而失時當夜無君之德小人之彊梁也彊梁以力必有顛危次六克我彊梁于天無疆測曰克我彊梁大美無基也王本無基作無疆今從宋陸范本宋曰無基謂無疆界言廣遠也王曰六爲彊主得位當晝能克彊梁自彊其德則君道益光故至于天而無窮也光謂五以消六過乎中而當晝君子能與時消息自勝其彊者也如是則享有遐福與天無疆矣次七金剛肉柔血流于田測曰金剛肉柔法太傷也王本無流字今從諸家七爲敗損而當夜小人用法太傷者也以剛金斷柔肉無有不勝血流于田不仁之甚也次八彊其衰勉其弱測曰彊其衰勉自彊也八爲疾瘀而當晝君子能彊衰勉弱不自淪溺者也上九太山拔梁柱折其人顛且蹶測曰山拔梁折終以猛也王本太山拔作大枝拔今從諸家王曰處彊之極而失位當夜彊而過亢者也光謂小人彊梁過甚山拔梁折自取顛蹶者也二方二州一部一家睟陽家水亦準乾睟與粹同陸曰乾純粹精也陽氣袀睟清明物咸重光保厥昭陽王本袀作初今從諸家袀與均同宋曰保安也是時陰氣斂藏於下陽氣袀睟清明故萬物高者下者皆重光華安其性命而煦陽之德矣陸曰袀睟猶純睟也初一睟于内清無穢測曰睟于内清無穢也一爲思始而當晝君子純粹在心清明不雜故能總群元成萬務也次二冥駮冒睟𥅡于中測曰冥駮冒睟中自也𥅡與恧同女六切於計切陸曰隱也范曰𥅡慙也駮不純也光謂二爲思中而當夜小人於冥昧之中以駁雜之心冒没純粹雖外以欺物而心不免慙也次三目上于天耳下于淵恭測曰目上耳下聰察極也王本無恭字今從諸家三爲思終而當晝君子思慮純粹則聰明無所不通故曰目上于天耳下于淵雖然不敢以此自恃猶嚴恭寅畏所以能全其粹也次四小人慕睟失禄貞測曰小人慕睟道不得也王曰失位當夜其道已駁雖慕純粹之道而失其福禄與貞正也次五睟于幽黄元貞無方測曰睟于幽黃正地則也陸曰則法也王曰居中體正得位當晝爲睟之主純德大明睟于幽玄之中而有黄中通理之德元始貞正其道無方不可名也光謂元者善之長也五爲中和而當晝君子雖有幽隱不失中和之道所以爲粹也守其元正以應萬務無施不適如地之德亦以幽黄元貞成萬物也次六大睟承愆易測曰大睟承愆小人不克也王本賛云大睟承愆小人不克測云大睟之道小人不克今從諸家王曰六居盛位睟之大者而失位當夜故承之以愆光謂五以上作消六過中而當夜不能全其純粹者也夫白玉易瑕清水易污故大粹者非小人之所能全必將承以過差也次七睟辰愆君子補愆測曰睟辰愆善補過也王曰七居禍始是睟時之愆然以得位當晝不失君子之德故能補過無咎也光謂時之有過惟君子能補之以成其粹也詩云衮職有闕惟仲山甫補之次八睟惡無善測曰睟惡無善終不可佐也王曰失位當夜純于惡德則善無由而入矣光謂八爲疾瘀而當夜純惡無善之人何可輔也上九睟終永初貞測曰睟終之貞誠可嘉也王曰九居數極而得位當晝是能保其純粹不失善道永如初之正也光謂九爲粹極能慎終如始全其純正者也二方二州一部二家盛陰家火準大有入盛次二三十三分三十秒日次鶉首芒種氣應斗建午位律中蕤賓陽氣隆盛充塞物窴然盡滿厥意王本窴作冥今從宋陸范本窴音田宋曰窴然滿也初一盛不墨失冥德測曰盛不墨中不自克也宋陸本中作終今從范王本陸曰克勝也不能自勝其嗜欲王曰一居盛始而當夜盛而不能默者也如此則失其闇然之德矣光謂墨法也凡盛之道非致盛之難處盛難也一爲思始而當夜盛而無法以自制約則喪其幽隱之德也次二作不恃克大有測曰作不恃稱玄德也稱尺證切王曰居盛之時得位當晝明乎自然之道是有作爲之功而不恃其功如此則能至於大有矣光謂二爲思中而當晝作而不恃爲而不有惟其不有故能大有也稱當也次三懷利滿匈不利于公測曰懷利滿匈不私門也三爲思上而當夜君子諭於義小人諭於利小人思慮求盛不過營利而已故曰懷利滿匈利於私斯害於公矣次四小盛臣臣大人之門測曰小盛臣臣事仁賢也王本仁作人今從宋陸本四爲福始故曰小盛也臣臣自卑賤之意也君子當小盛之初能自卑賤承事仁賢以致大盛凡爲大人者未有不由此道而出故曰大人之門也次五何福滿肩提禍撣撣測曰何福提禍小人之道也宋本撣撣作闡闡今從范王本何胡可切王曰撣音纏義亦取其相纏不去之象陳音丹又使丹切曰五居盛位故云何福福至盛故云滿肩極盛必反故云提禍光謂凡賛當夜者皆小人之道也以小人而享盛福禍必隨之故曰何福滿肩提禍撣撣次六天賜之光大開之彊于謙有慶測曰天賜之光謙大有也范王本賜作錫今從宋陸本六爲盛多極大而當晝君子受天明命大啓上宇者也夫極盛難處也故必用謙然後有慶次七乘火寒泉至測曰乘火寒泉禍不遂也范本測曰乘火泉至禍不遠也今從宋陸王本王曰當盛之時七居過滿又與本首同爲火數二火之盛炎炎上干爲六所忌故寒泉將至而有撲滅之憂也光謂七爲禍始而當夜乘火者盛之極也寒泉至者滅不乆也次八挹于滿熒幾後之傾測曰挹于滿幾不免也宋陸本挹作拘今從范王本王本無熒字今從宋陸范本范本幾不免也作幾危也今從宋陸王本幾音畿又音機王曰得位當晝善於處盛滿而能挹必後之傾危而不傾蓋謙挹以免也處盛之極非挹滿之道殆不免乎上九極盛不救禍降自天測曰極盛不救天道反也九居盛極當日之夜逢禍之窮盛極必衰者也二方二州一部三家居陽家木準家人陽方躆膚赫赫爲物城郭萬物咸度范本萬物咸度作物咸得度今從宋陸王本躆音據宋曰爲物城郭欲萬物皆安其居陸曰躆充實貌陽爲城郭萬物皆居其中故曰咸度也王曰城郭在外之象光謂膚亦當作躆躆動作彊梁貌爲物城郭者言養衛萬物使陰氣不得傷也度當作定𡧪古宅字宅居也初一匪譽匪咎克守厥家測曰匪譽匪咎其道常也一居家之最下子孫之象當日之晝能守常道無咎無譽保家之主也次二家無壺婦承之姑或洗之塗測曰家無壺無以相承也壺者承上以養人者也家無壼下不供養也二居下體之中有婦之象婦者所以承姑也今反使姑承之爲之先塗服勞辱之事上下失序逆莫大焉次三長幼序子克父測曰子克父乃能有興也范本作長幼序序今從宋陸王本王曰得位當晝故居室有倫長幼各得其序子能幹父之業者也光謂三居下體之上而當晝幼能事長子能任其父事者也次四見豕在堂狗繫之迒測曰見豕在堂其體不慶也迒音剛又户郎切繫與系同迒獸迹也狗豕皆汙穢之物堂尊者之處也四爲下禄而在中體位稍尊矣然當日之夜小人之道也凡爲家之道正其身然後可以齊家今四在堂自有豕行則在下者亦如狗系迹而進不可止也慶善也次五舳艫調安利富貞測曰舳艫安和順其疆也舳直六切艫落胡切王曰不失其居而無遠不適處舟之義也五既得位當晝爲居之主徃必濟者也故舳艫調安而有所利富不失其居室之道乎光謂舳船後用柂處也艫船前刺棹處也五居盛位而當晝君子能治其家者也舳艫調安則衆賴以寧上下和順則家賴以齊富者家之福也富不失正所以爲美也其當作無次六外其井竈三歲見背測曰外其井竈三歲不享也王曰三歲數之終也光謂井竈者飲食之資要務也而外之則家何以養矣六過中而當夜小人不能睦其宗族之賢者而踈外之不過三歲則親皆叛之矣不享者不得飲食也次七老父擐車少女提壺利考家測曰老父擐車其體乃莊也王本考作于今從宋陸范本擐音患擐貫也以手貫車轅而行之所以載物也提壺者承上以養也考成也七居上體有尊長之象老父者家之至尊也少女者家之至卑也尊能載衆卑能承上故利以成家也夫齊家者不可以不嚴也故其體莊嚴然後能載衆也易曰家人嗃嗃悔厲吉婦子嘻嘻终吝次八反其几雙其朼其家不旨測曰反几雙朼家用不臧也二宋陸本朼皆作牝王作牡今從范本其家宋陸作九家范小宋作几家按古其字作兀因此致誤耳今從王本朼與匕同几當上承匕當用一理之常也八爲禍中而當夜反其几者幼不承長而上不獲安也雙其匕者家不統於尊而用事者衆也旨美也幼不承長尊不統卑家道壞亂故不美也上九株生糵其種不絶測曰株生糵其類乃長也蘖魚列五葛二切種章勇切王曰九居過亢枯朽之象得位當晝株而生蘖者也光謂木斬而復坐曰蘖九爲禍極家已絶矣而當日之晝是尚有遺種能復興其家者也二方二州二部一家法陰家金準井改邑不改井無喪無得徃來井井有法之象陽高縣厥法物仰其墨莫不被則縣音玄宋曰墨者法之繩墨也光謂是時陽氣極高物咸象之莫不蒙被其法初一造法不法測曰造法不法不足用也王曰作法之初而失位當夜不足法者也光謂一爲思始故曰造法法言曰模不模範不範爲不少矣次二摹法以中克測曰摹法以中衆之所共也摹與模同摹猶制也二爲思中而當晝制法以中然後能成也洪範皇極衆之所共由也次三準繩不甫亡其規矩測曰準繩不甫其用爽也甫美也爽差也不能正其身如正人何次四準繩規矩莫違我施測曰準繩規矩由身行也君子先修其身其身正不令而行次五繘陸陸瓶窴腹井潢洋終不得食測曰缾窴腹非學方也宋陸本窴作冥今從范王本繘音繘窴音田潢音黄陸曰方道也王曰缾窴腹不可以盛也井潢洋水多之貌也終不得食者汲引之道非也光謂繘汲索也陸陸索下貌缾腹先實則水不得入井雖潢洋終不得食也學者虛以受人則人樂告之五居井之盛而當日之夜小人先自驕滿不能納物者也次六于紀于綱示以貞光測曰于紀于綱大統明也王曰以貞正光明之道俾人不惑光謂六居上禄以施其法能紀綱天下示人正光之道者也次七密網離于淵不利于鱗測曰密網離淵苛法張也王曰七居過滿而當夜作法太密網麗于泉而鱗不寧法施於國而人不便者也光謂七爲網又爲敗損而當曰之夜法苛民駭者也故曰密網離于淵不利于鱗次八正彼有辜格我無邪測曰正彼有辜敺而至也敺與驅同宋曰敺百姓使至無邪也王曰八居上體之中而當晝能用其法正其有罪以至於人無邪心也光謂格至也正有辜以至無邪用刑之善者也舜曰刑期于無刑上九井無幹水直衍匪谿匪谷終于愆測曰井無幹法妄恣也王本匪溪匪谷作利心匪谿今從宋陸范本幹音寒范曰幹以檢扞於井泄取有時王曰處法之極而當夜無法者也國而無法則人易犯井而無幹則水衍溢也光謂九爲禍極而當夜法妄恣無常與無法同民志迷惑不知所從則冒犯而終亂耳如并無幹水將衍溢非谿非谷而注射妄行終於愆過而已矣二方二州二部二家應陽家上準咸入應次六一十八分五秒夏至氣應故兼準離陽氣極于上陰信萌乎下上下相應信猶聲兆也初一六幹羅如五枝離如測曰六幹羅如附離君也次二上歷施之下律和之非則否測曰上施下和匪其真也范本真作肯今從宋陸王本和胡卧切歷謂十二辰也律謂十二管也斗建十二辰於上律布十二管於下上下相應苟非其合則不應也次三一從一横天網測曰一從一橫經緯陳也從即容切陳音郞吴郞宕切范曰廣大貌王曰天網者踈而不漏之義光謂三爲思上而當晝君子能經緯天地者也離爲文明又有網罟之象次四授我罘罟絓羅于野至測曰援我罘罟不能以仁也授音爰罘音浮絓胡卦切四者陽氣將熄陰氣將生德去而刑至者也又離有網罟之象故曰援我罘罟絓羅于野至者言其事將至如云履霜堅冰至也次五龍翰于天貞栗其鱗測曰龍翰之栗極懼墜也翰胡安切王曰居中體正得位當晝爲應之主故象龍飛于天光謂龍以諭陽翰飛也五爲純陽盛大之極故曰龍翰于天君子居盛大之極不可不正不可不懼故曰貞栗其鱗次六熾承于天冰萌于地測曰承天萌地陽始退也王本熾承作𡑠古熾字今從宋陸范本熾陽之盛也冰陰之極也六當夏至之初陽極陰生之際小人道長君子道消故曰熾承于天冰萌于地敬戒之微盡在於是也次七日彊其衰應蕃貞測曰自彊其衰惡敗類也惡烏故切七爲禍始而當晝君子能自彊其衰則應之者蕃多而不失其正也次八極陽徵陰不移日而應測曰極陽徵陰應其發也王本徵作微其作時今從宋陸范本治極召亂盛極召衰福極召禍不移日而應也上九元離之極君子應以大稷測曰元離之極不可遏也范本作不可遏止今從宋陸王本陸曰遏止也王曰大稷日將暮也吴曰稷音義與昊同光謂元離大明也大明之極極盛必衰君子應時與之消故曰君子應以大昊集註太玄經卷之三
