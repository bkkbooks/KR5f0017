body:
  text: 三方一州一部一家減陽家水準損入減初一四十一分一十七秒處暑氣應次日舍軫陰氣息陽氣消陰盛陽衰萬物以微王本作陰息陽消小宋本作群陰息陽氣消今從宋陸范本初一善減不減冥測曰善減不減常自沖也陸曰冲虚也光謂一爲思始而當晝常自謙沖善減者也自損者人益之故不減一爲下下善減之謙不減之益皆在冥昧之中人莫得而見故曰冥次二心減自中以形于身測曰心減形身困諸中也宋陸本形作刑今從范王本人之進德修業必自强於心然後顯著於外二爲思中而當夜志先減矣德業何從而益乎是其中先自困也子謂冉求曰力不足者中道而廢今汝畫次三減其儀利用光于階測曰减其儀欲自禁也三爲下上爲思終爲進人居上則多驕盈思終則於外發於儀貌矣减其儀者自貶損禁約也階以進也自損而得進有光輝也次四減於艾貶其位測曰減於艾無以莅衆也范本艾作乂今從二宋陸王本艾與乂同音范曰治也光謂四爲下禄而當夜小人不勤於爲治無以衆則不能保其禄位矣故曰減於艾貶其位次五減黄貞下承于上寧測曰減黄貞臣道丁也范本作減其黄貞今從諸家宋曰丁當也王曰得位當晝能爲減主又得黄中貞正之道衆所咸歸故下承于上而獲安寧之福也光謂中和莫盛乎五故曰黄以陽當位故曰貞夫盛極則衰不可不減臣用此道以承其上乃可自安故曰臣道當也次六幽闡積不減不施石測曰幽闡不施澤不平也施失豉切范曰六爲水故積幽小宋曰大開曰闡光謂六與家性皆爲水故曰幽六爲上禄故曰闡又爲盛多爲極大故曰積君子當裒多益寡稱物平施今乃不減不施其頑如石故曰澤不平也次七減其疾損其恤厲不至測曰減其疾不至危也范曰恤憂也厲危也王曰七居過滿危之道也而得位當晝是能自減其疾患損其憂戚則厲無從而至矣光謂七爲禍始而當晝在於減家故有是象易曰損其疾使遄有喜次八瀏漣漣減于生根測曰瀏漣之减生根毁也王本無下漣字今從宋陸范本瀏音留又力乆切漣音連范曰八木也秋木始衰瀏㳅也漣漣㳅垂之貌㳅古流字光謂八爲木爲沈天爲疾瘀爲耗爲剥落沈天秋冬之交也木之所以生者根也所以榮者滋液也今滋液下流漣漣然减其資生之根則何以復能盛榮乎上九減終利用登于西山臨于大川測曰減終之登誠可爲也范曰在西爲金故曰西山金生水故曰大川光謂物極則反故減終必增登山臨川以高下也西者物之成也夫登高臨下鮮有不危以減處之故可爲也三方一州一部二家唫陰家火準否陳音欽又音琴小宋吴皆巨錦切説文口急也與噤同今從之陸曰唫閉塞也陰不之化陽不之施萬物各唫凡陽施其精陰化其形萬物乃生皆處暑之氣陰不化陽不施萬物各閉塞之時也初一唫不予丈夫婦處測曰唫不予人所違也予與與同王曰唫閉而不與物接丈夫而效婦人之光謂爲思始而當夜處乎窮下君子思道將及人今乃唫而不與若丈夫而婦處也夫孤立無親則人皆違而去之故曰人所違也次二唫于血資乾骨測曰唫于血臞自肥也范本臞作䂄吁縛切諸本皆作臞小宋音具吴音衢今從之王曰唫其血以資乾骨懼於臞瘠思以自肥光謂二爲思中而當晝能蓄其德以美其身者也大學曰富潤屋德潤身次三貌不交口唭㘈唫無辭測曰貌不交人道微也范王本無口字今從二宋陸本唭去吏切㘈魚記切范曰唭㘈有聲而無辭也王曰人道殆至於微絶也光謂三爲思終又爲成意思慮既成則言貌可以接人矣而家性爲唫當日之夜尚閉塞而不交則人道幾乎絶矣易節之九二曰不岀門庭凶次四唫其穀不振不俗纍老及族測曰唫其穀不得相也次五不中不督腐蠹之嗇測曰不中不督其唫非也小宋曰禄以待賢廪粟紅流腐蠧猶嗇其唫非也光謂督亦中也君子積而能散可唫則唫可施則施五居盛位家性爲唫當日之夜失其中道故腐蠧而猶吝嗇也次六泉原洋洋唫于丘園測曰泉源之唫不可譏也二宋陸王本譏作議今從范本范曰六水也故爲泉源丘園以諭高也光謂六爲盛多爲極大蓄水於高待時而施則所及者遠今日之唫乃所以爲異日之澤故不可譏也次七唫于體黄肉毁測曰唫于體骨肉傷也王本黃肉毁作黃骨肉毁今從宋陸范本七爲消爲敗損而又當夜黃中也骨肉在中故曰黃肉夫氣血所以養體也唫而不及於四體骨肉毁傷矣恩澤所以綴親也唫而不及於九族則内外乖離矣次八唫遇禍禱以牛解測曰唫遇禍大費當也范曰牛爲大費王曰雖過唫招禍而能禱之以牛以解其凶光謂八爲禍中故曰唫遇禍當日之晝故曰禱以牛解不愛費以解禍其道當也上九唫不雨孚乾脯測曰唫不雨何可望也范曰孚信也王曰九居唫極而當夜陰陽俱閉故不雨光謂潤澤既竭而無望信乎肉乾而爲脯矣言王澤竭而民物瘁也三方一州一部三家守陽家木亦準否陰守户陽守門物莫相干初一閉朋牗守元有測曰閉朋牖善持有也王小宋本作閉明牖守元有今從宋陸范本范曰朋黨類也光謂易曰憧憧徃來朋從爾思言心有所感則物以其類應之牗者所以窺外也元始也樂記曰人生而静天之性也感物而動性之欲也一爲思始而當晝能閉外類之誘守其始有之性者也次二迷自守不如一之有測曰迷自守中無所以也宋曰以用也無所用自守也王曰二守其迷一守其道故不如一之所有也光謂二爲思中而當夜誘於外物迷而失其所守者也書曰惟民生厚因物有遷次三無喪無得往來默默測曰無喪無得守厥故也三爲進人爲自如爲成意當日之晝德成於内能守而勿失者也外物之往於我何喪外物之來於我何得默而成之不言而信也易曰无喪无得往來井井次四象艮有守測曰象艮之守廉無𢛅也宋陸本象艮有守作象㒵自守小宋本作象貌有守今從王本𢛅與怙切宋曰㒵音狗陸曰𢛅禁禦也象狗不能有所廉察禁禦也范曰象似也若刍狗光謂㒵音狗當云艮爲狗字之誤也象狗猶言象龍也次五守中以和要侯貞測曰守中以和侯之素也二宋陸本守中以和作守中以一和王本要侯貞作要侯之貞今皆從范本范曰五爲天子守中和之道諸侯之正主也光謂素向也中和莫盛乎五守中和之道以要約諸侯諸侯之所取正而歸向也次六車案軔圭璧塵測曰車案軔不接鄰也王本不接鄰作交接鄰今從諸家軔而振切小宋曰軔礙車輪之木也禮諸侯兵不用諸侯自爲正之具也執守失貞不接鄰國車輪按軔以靡行圭璧生塵而不用光謂家性爲守六過中而當夜自守太過者也次七群陽不守男子之貞測曰群陽之守守貞信也王本群陽不守作群陽不字今從諸家次八曰無杵其曰舉天陰不雨白日毁暑測曰臼無杵其守貧也王曰臼而無杵守之而終無所用舉而不下守之而終無所成光謂其碓舉無米可舂也天陰不雨無澤可冀也八爲禍中爲耗故有此象上九與荼有守辭于盧首不殆測曰與荼有守故愈新也宋陸本作有荼有守測作其荼其守今從范王小宋本荼音徒宋曰愈猶勝也范曰荼白也盧黑也九西方故白光謂荼茅秀也其色白九爲禍終而當晝能悔其禍者也故思老成白首之人與守其故道而辭去黑首諞言之士則國家不至於危殆也秦誓曰番番良士旅力既愆我尚有之仡仡勇夫射御不違我尚不欲三方一州二部一家翕陰家金準巽入翕次五一十八分三十四秒白露氣應日次壽星斗建酉位律中南吕陸曰巽者入也翕亦入也王曰翕合也光謂巽爲鷄故翕多飛鳥之象陰來逆變陽徃順化物退降集二宋陸王本陽往順化作陽徃以順今從范本宋曰陰來從下故以逆言之陽徃從上故以順言之光謂陰升而害物故曰逆陽降而育物故曰順初一狂衝于冥翕其志雖欲梢揺天不之兹測曰狂衝于冥天未與也宋陸本翕其志作以翕其志不作下今從范本范本梢揺作逍遥今從二宋陸王本梢揺與逍遥同曰兹古滋字光謂爲思始而當夜小人有不善之心狂蕩衝激於冥昧之中翕斂其志未形于外逍遥自縱適之貌言雖欲縱適其志天未之與不得滋長也次二翕冥中射貞測曰翕冥中正予也王本正予作正弓今從諸家予與與同二爲思中而當晝君子有善心亦翕斂於冥昧之中如射之有志正己而發發無不中故曰射貞正予猶言惟正是與也次三翕食嘬嘬測曰翕食嘬嘬利如舞也嘬楚夫切范曰嘬嘬食疾貌王曰嘬嘬盡臠貪之甚也欲利之速如舞之赴節光謂三爲成意而當夜近於禄小人見禄貪而務入無所不至次四翕其羽利用舉測曰翕其羽朋友助也四爲下禄又爲外它當日之晝如鳥翕其羽士得朋友之助利於進也次五翕其腹辟穀測曰翕其腹非所以譽也范王小宋本辟穀皆作辟金穀今從宋陸本范小宋本譽作舉今從陸王本五爲中禄又爲腹而當日之夜但能翕其福禄以自與者也故曰翕其腹夫自與者人必奪之此乃辟去福禄之道也况令名何從而得之次六黄心鴻翼翕于天測曰黄心鴻翼利得輔也宋陸王本利作和今從范本六爲中上故稱黄鴻鳥飛之高者也六又爲盛多居福之隆當曰之晝君子以中庸爲心輔之者衆如傅鴻翼其高飛無不至矣次七翕繳惻惻測曰翕繳惻惻被離害也繳音灼范曰七爲繩爲射射用繩者繳之謂也光謂七爲禍階而當夜故被離害也次八㩣其罦絶其羂殆測曰罦㩣絶羂危得遂也㩣與揮同羂古縣切王曰晝可以自危雖不至於終凶亦殆之甚小宋曰罦覆車也羂罔也光謂八爲禍中而當晝故得免也上九㩣其角維用抵族測曰㩣其角殄厥類也王本族作撲今從諸家抵音紙范曰抵擊也王曰㩣其角以拒物物所同惡光謂九爲殄絶爲禍極爲猛爲角而當夜翕禍不已至於窮極猶欲用猛取勝故至於絶族也三方一州二部二家聚陽家土準萃入聚次七日舍角易曰萃王假有廟故聚多鬼神之象陰氣收聚陽不禁禦物相崇聚崇亦聚也初一鬼神以無靈測曰鬼神無靈形不見也見賢遍切王曰鬼神以無形爲靈陳曰聚者陰氣收聚萬物衰落有形復於無形物歸其本本無者非靈而何夫精氣爲物遊魂爲變聚則爲物散則無形故鬼神以無形爲靈也光謂一爲下下又爲水幽深之象也次二燕聚嘻嘻測曰燕聚嘻嘻樂淫愆也范本愆作衍小宋本作衎今從宋陸王本二爲思中爲人當夜相聚冥樂過則成愆次三宗其高年群鬼之門測曰宗其高年鬼待敬也二宋陸王本皆作宗其高辛今從范本范曰三爲門次四牽羊示于叢社執圭信其左股測曰牽羊于叢不足榮也范本信其左股作信辟其左股測曰不足勞也今從二宋陸王本信與伸同羊中牲也依叢林而爲社鬼之微者也執圭重禮也拜當伸右股四當日之夜雖有福禄不能用之如牽羊但示于叢社而已不足榮也執圭而拜乃伸其左股不免於鄙野也次五鼎血之蕕九宗之好乃後有孚測曰鼎血之蕕信王命也王曰蕕與槱同謂薪燎也次六畏其鬼尊其禮狂作眯淫亡測曰畏鬼之狂過其正也范本眯作昧今從二宋陸王本王曰眯者自無所見也狂瞽而求淫祀亡則冥焉次七竦萃于丘冡測曰竦萃丘冢禮不廢也王曰竦敬也光謂七爲高爲禮又爲禍始而當晝以敬而聚於丘冢葬以禮之象也次八鴟鳩在林㕹彼衆禽測曰鴟鳩在林衆所㕹也宋陸本㕹作呱王本作吠今從范小宋本㕹於交切多聲也王曰鴟鳩惡鳥聚中林必爲衆禽所噪也光謂八爲禍中而當夜小人惡聲已著如鴟鳩所在之林衆禽必聚而噪之上九垂涕纍鼻聚家之匯測曰垂涕纍鼻時命絶也小宋曰彚類也光謂九爲禍極爲殄絶如君子生有令德其死也哀趙文子成室曰歌於斯哭於斯聚國族於斯此之謂也三方一州二部三家積陰家水準大畜陰將大閉陽尚小開山川藪澤萬物攸歸王曰山藪所以蓄藏萬物也光謂陰盛陽微萬物極陽之末盡皆歸藏於山川藪澤委積其中也初一冥積否作明基測曰冥積否始而在惡也宋陸本始而在惡作已而在惡范本無已而字小宋本無已字今從王本王本基作資今從諸家否音鄙范曰否不善也光謂一爲思始而當夜小人積惡於幽而取禍於明故冥冥之惡乃所以爲明罰之基也次二積不用而至于大用君子介心測曰積不用不可規度也度待洛切范曰介大也宋曰積乆不用明德深藏果遇其時至於大用光謂二爲思中而當晝君子積善於中困於下位不爲時用然積之不已其用必大君子廣大其德心而已不汲汲於求用也次三積石不食費其勞力測曰積石不食無可獲也三爲思上而當夜費心於無用勞力於非務如積石之不可食勤而無獲也次四君子積善至于車耳測曰君子積善至于蕃也小宋本至于蕃作至于大蕃今從諸家王曰蕃謂蕃庶附袁切小宋曰蕃車耳也敷袁切光謂車耳兩轓也至于車耳言其盈積著見也次五藏不滿盗不贏測曰藏滿盗贏還自損也嬴一作贏王本藏作減今從諸家藏徂浪切五居尊位受盛福不務德施而蓄積無已適足爲盗之贏利也秦積敖倉爲楚漢之資隋積洛口爲李密之用皆其類也次六大滿碩施得人無亢測曰大滿碩施人所來也王本亢作方今從諸家施式豉切王曰六居盛位得時當晝所積大滿而能大施以濟於物故得人皆歸之其道無窮也光謂財散則人聚故得人也亢敵也詩云無競惟人斯無敵於天下矣次七魁而顔而玉帛班而决欲招宼測曰魁而顔而盗之招也范本招作收王本決作快今從二宋陸王本魁者言其首出也顔者言其顯著也班布也七爲禍始而當夜積蓄不已首出顯著玉帛布列雖可以窮一時之欲而不知盜乘其後也次八積善辰禍維先之罪測曰積善辰禍非巳辜也小宋本辰作展今從諸家辰時也積不善之家必有餘殃八爲禍中當晝身雖積善而遭時之禍蓋其先人之罪也上九小人積非至于苗裔測曰小人積非禍所骫也王本苗作亡小宋本作笛音迪今從宋陸范本骫古委字范曰惡大者乃至苗裔之家光謂積非之極遇禍之窮禍所委積故延及苗裔也三方一州三部一家飾陽家火準賁入飾次八三十六分一十五秒秋分氣應故兼準兌兌爲口舌故飾多言語之象陰白陽黑分行厥職出入有飾諸家厥作其今從宋陸本宋曰陰氣出治於上故以白爲飾陽氣入治於下故以黑爲飾陸曰陰而治西故言白陽退於北故言黑王曰白爲見黑爲隠白黑分形飾之象也初一言不言不以言測曰言不言默而信也王本賛辭止云言不以言今從諸家一爲思始而當晝君子内守其至誠沈潜淵黙以不言爲言所以然者不言而信故也孔子曰天何言哉四時行焉百物生焉次二無質飾先文後失服測曰無質先文失貞也王本貞作真今從諸家王曰無其本質欲以求飾雖先以文采後必失其所服光謂二爲思中而當夜小人内無誠實徒事外飾其始則文采信美矣終則失其正服也服以諭德之形於外者也次三吐黄舌鉗黄聿利見哲人測曰舌聿之利利見知人也宋陸范本吐黄舌皆作吐黄酋舌今從小宋本宋陸本鉗作柑今從范王小宋本鉗渠廉切知與智同鉗執也聿筆也君子發言著書不失中道惟智者能知之愚者不足語也法言曰言心聲也書心畫也聲畫形君子小人見矣次四利舌哇哇商人之貞測曰哇哇之貞利于商也宋陸本利舌哇哇作舌哇哇范小宋本作利口哇哇今從王本哇烏佳切王曰文飾虚辭以炫鬻故爲商人之貞而非君子之正道也光謂四爲富而當夜故有是象次五下言如水實以天牝測曰下言之水能自冲也王本牝作比今從諸家小宋曰剛處於中能自虚懷聽其讜議從諫如流何有不納光謂牝谷也天牝謂海也五居尊位而當晝能自下以納人言如此則人争以善道告之如流之實海也海自下而百川赴之故能成其大君自下而衆善歸之故能成其聖次六言無追如抑亦飛如大人震風測曰言無追如抑亦揚也大人謂在貴位之人六過中而當夜失言者也一言之失駟不及舌故曰言無追如清之而愈濁者雖欲抑之已飛楊矣故曰抑亦飛如況夫威福在發口一言疾如風霆爲物休戚可不慎乎次七不丁言時微于辭見上疑測曰不丁言時何可章也小宋本無不字今從諸家見賢遍切范曰丁當也風切而已不可章灼光謂七爲禍始而當晝君子事暴君非可以直言之時故微辭風切而巳苟爲章見則上必疑之孔子曰君子信而後諫未信則以爲謗巳也次八蛁鳴喁喁血出其口測曰蛁鳴喁喁口自傷也蛁與蜩同喁音顒王曰蜩善鳴之蟲也光謂喁喁猶諄諄也八爲禍中而當夜君不受諫臣彊以言聒之不辱則刑矣如蜩之鳴喁喁不已雖復血出其口誰則聽之徒自傷耳上九白舌于于屈于根君子否信測曰白舌于于誠可長也宋陸本測曰白舌于于作信舌不白王本于于作干干測曰言不信也小宋本作白舌不白于屈于根今皆從范本否與不同方九切于于屈貌九爲禍極而當晝君子居無道之世言不見信正當屈舌緘口而巳此誠可久長之道易曰有言不信尚口乃窮也三方一州三部二家疑陰家木亦準賁彼飾此疑矣入疑次四日舍亢二宋陸王皆以爲象巽范以爲象震皆非也陰陽相磑物咸雕離若是若非磑午對切宋曰物相切劘稱磑是時陰陽相劘分數均晝夜等陸曰彫傷也離散也陰卑而主陽尊而廢故若是若非疑之也光謂以氣運言之若陰是而陽非以物情言之若陽是而陰非故疑初一疑恛恛失貞矢測曰不正之疑何可定也小宋本恛恛作呬虚利反呬呬笑也今從諸家范本不正之疑作疑恛失貞今從諸家恛音回范曰矢直也王曰恛恛昬亂貌光謂一爲思始而當夜小人心不正直多疑少决終無所定次二疑自反孚不遠測曰疑自反反清静也二爲思中爲反復而當晝君子有疑則當屏去利欲平除愛憎清静其心自反於身義則行之不義則舍之以此决疑夫何遠之有次三疑强昭受慈閔閔于其心祖測曰疑强昭中心冥也范本强作彊今從宋陸王本强其兩切王曰疑而强昭暗而强明宜其受此閔憂於心祖祖本也光謂三爲成意而當夜故有是象孔子曰知之爲知之不知爲不知是知也曲禮曰疑事毋質次四疑考舊遇貞孚測曰疑考舊先問也王曰心有所疑而稽考舊典以明之則疑必釋矣光謂四爲外它爲條暢而當晝故有是象舊典舊人皆可問也問而遇正信斯可從矣孔子曰疑思問次五赨黄疑金中測曰赨黄疑中邪奪正也宋陸本赨作嚇字書無之范本作𧋒今從王陳本𧋒徒冬切范曰𧋒赤也王曰𧋒與彤同雖盛位而處陰當夜不能辨析所疑彤黄之色而疑其爲金小宋曰赨音雄雄黄石也赨黄之色光瑩粲然疑有兼金在其中也光謂五居尊位而當夜疑而不明大佞似忠故邪能奪正也次六誓貞可聽疑則有誠測曰誓貞可聽明王命也王曰六得位當晝能釋群疑誥誓以正而人皆可聽以辨所惑其疑而未悟則有誠明之道以貫之則愚迷皆釋矣申明王命以斷衆疑者也光謂物情疑故誓之誓正則人可聽矣誓而人猶疑之則當申之以至誠誠則人從不誠人不從矣六爲上禄故曰王命次七鬼魂疑嚘嗚弋木之烏射穴之狐反目耳厲測曰鬼魂之疑誠不可信也宋陸范王本皆云鬼魂疑貞厲今從小宋本小宋本耳作貞今從諸家諸家本目皆作自今從宋陸本曰嚘嗚嘆也光謂鬼魂恍惚若有若無誠可疑也莫黑匪烏莫赤匪狐易辨者也目視耳聽理之常也七爲失志爲消爲敗損而當夜巳既不明惑之者衆若鬼若魂不能判别嘆嗟而已烏狐易辨而或得失猶不免疑已之耳目且不自信反以耳視而目聽宜其危矣次八顛疑遇幹客三歲不射測曰顛疑遇客甚足敬也射音亦范曰射厭也上九疑無信控弧擬麋無測曰疑無信終無所名也宋陸范本疑無信皆作九疑無信今從王小宋本范曰無信無所信也控弧擬麋猶曰無者疑之甚也光謂九爲疑極故有是象終疑不決必無所成名也三方一州三部三家視陽家金準觀陰成魄陽成妣物之形貌咸可視王曰是時萬物形貌已成皆可見光謂秋分之陰如月成魄妣當作㘩匹計切配也陰陽中分成配偶也初一内其明不用其光測曰内其明自窺深也范曰内省不疚夫何憂何懼光謂一爲思始而當晝收規内明不用外光次二君子視内小人視外測曰小人視外不能見心也身之榮悴人之賢不肖莫不皆然次三視其德可以幹王之國測曰視德之幹乃能有全也三爲成意又爲進人當日之晝德成而外形者也故王者視德之大小任以爵位爲國家之楨幹也次四粉其題䪻雨其渥須視無姝測曰粉題雨須不可忍瞻也宋陸本無忍字小宋本無可字今從范王本王本䪻作頩云面權也小宋本作䪻匹迥切面無色也今從范本䪻薄變切姝春宋切范曰題額也䪻面也姝好也光謂四色白爲下禄爲外它小人飾外貌而得禄者也僞久必敗如粉其題䪻而遇雨沾渥其須它人視之安有好乎次五鸞鳳紛如厥德暉如測曰鸞鳳紛如德光皓也小宋本皓作時今從諸家五居尊位受盛福而當晝王者盛德光暉嘉瑞來臻故鸞鳳紛如而多也賈誼曰鳳凰翔於千仞兮覽德暉而下之次六素車翠蓋維視之害貞測曰素車翠蓋徒好外也六爲上禄而當夜小人無德而禄外好内醜如乘素車而張翠蓋視其外則華内實無文也貞者當以正視之則好醜自分矣次七視其瑕無穢測曰視其瑕能自矯也小宋本無作罔今從諸家王曰七居過滿之地然得位當晝是能因時而自視其瑕戒於未萌則咎悔不生故終以無穢也光謂七爲禍始而當晝故能如是次八翡翠于飛離其翼狐鼦之毛躬之賊測曰翡翠狐鼦好作咎也鼦都聊切與貂同范曰各以文毛之用遂致殺身之禍小宋曰罔離其翼光謂八爲禍中而當夜外觀之美適爲身灾孟子謂盆成括小有才而未聞君子之大道則足以殺其身而巳矣上九日没其光賁于東方用視厥始測曰日没賁東終顧如也范曰賁黄白色也小宋曰日之將没賁東方光謂九居視之終而當晝君子修德立功慎終如始日之將没反照東方易曰視履考祥其旋元吉三一部方二一家州沈陰家水亦準觀入沈次日舍氐沈下視也諸家以兑非也陰懷于陽陽懷于陰志在玄宫宋曰懷思也陰陽别行久矣咸在於秋中而相思也故其志俱在玄宫矣初一沈耳于閨不聞貞測曰沈耳于閨失德體也范曰一爲耳耳在水中故沈也光謂一爲下下而當夜小人好沈耳于閨潜聽以下人之隱私不聞君子正道垂旒充耳而物無隱情也次二沈視自見賢於眇之眄測曰沈視之見得正美也范曰二爲目而在沈家故沈視也小宋曰眇一目盲也眄邪視也光謂二爲思中而當晝沈視於身自見善惡得其正美賢於小人不能内省而旁窺它人之是非如眇目之人己則不明而好邪視也次三沈于美失貞矢測曰沈于美作聾盲也范曰矢直也光謂三爲思上而當夜小人沈溺聲色之美失其正直之性老子曰五音令人耳聾五色令人目盲謂所聞見皆不得其正如聾盲也次四宛雛沈視食苦貞測曰宛雛沈視擇食方也小宋本宛作冕今從諸家王曰宛雛鳳屬光謂四爲下禄而當晝君子擇禄而食守苦節循正道如鳳下規四方有道之國非竹實不食必擇可食之方然後集也次五雕鷹高翔沈其腹好惡粥測曰雕鷹高翔在腐糧也二宋陸本作繩今從范王本吴曰古孕字光謂管子曰婦不期銷棄粥與育同好惡讀如字五處尊位而當夜望高而志趣卑如雕鷹鷙鳥其飛翔非不高而下視腐鼠志在攫之以實其腹始若善而終於惡故曰好孕惡育也次六見粟如纍明利以正予王測曰見粟如纍其道明也范王本粟作票今從二宋陸本范本纍作累今從諸家次七離如婁如赤肉鴟梟厲測曰離婁赤肉食不臧也七色赤用明類爲羽又七爲失志而當夜雖明視如離婁見赤肉取之乃得惡鳥不擇禄而食危之道也次八盼得其藥利征測曰盼得其藥利征邁也范小宋本利征作征利今從宋陸王本八爲禍中而當晝故得藥利征也上九血如剛沈于顙前尸後喪測曰血剛沈顙終以貪敗也宋陸本血如剛沈于顙作如血如剛沈于之顙王本作如血如岡沈于之顙小宋本作血如岡沈於顙今從范本王曰亡之道相繼而至故前尸後喪光謂血猶膏澤也剛當作岡沈有漁利之象九爲禍極爲盡弊爲顙漁利不巳浚民膏澤聚如岡陵至于沈顙不知巳故危亡相繼也三方二州一部二家内陽家火準歸昧入内次三一十三分二十二秒日次大火寒露氣應斗建戍位律中無射陰去其内而在乎外陽去其外而在乎内萬物之既宋曰既盡也初一謹于㐜初貞後寧測曰謹于媐㐜治女政也范王本治女政作始女政今從宋陸本㐜古妃仇字范曰㐜匹也謹其妃匹男女道正室家安光謂内者室家之象居内之初故戒之也易家人初九閑有家悔亡次二邪其内主迂彼黄牀測曰邪其内主遠乎寧也范本乎作乃今從宋陸王本范曰内主謂婦也迂遠也黄中也小宋曰牀者人所安次三爾儀而悲坎我西階測曰爾儀而悲代母情也范曰坎憂也親迎之道婦升西階有代親之義故悲也王曰儀匹也小宋引昬義曰厥明舅姑共饗婦以獻之禮舅姑先降自西階婦降自阼階以著代也次四好小好危喪其緼袍厲測曰好小好危不足榮也范本緼作藴王本袍作飽今從宋陸本次五龍下于泥君子利用取遇庸夷測曰龍下于泥陽下陰也王本庸作膚今從諸家取與娶同范曰龍以諭陽暘下于陰親迎之義也光謂親迎之禮婿御輪三周陽下陰也庸者得其常也夷等夷也次六黄昏于飛内其羽雖欲滿宫不見其女測曰黄昏内羽不能自禁也王曰六居盛滿而失位當夜乖於居内之宜黄昏于飛者無所定也内其羽者不能禁於内也雖欲滿宫欲無窮也不見其女者失其配偶之道終無所獲也次七枯垣生莠皬頭内其稚婦有測曰枯垣生莠物慶類也王本莠作秀今從諸家范小宋本物作勿今從宋陸王本皬胡覺切范曰白而不純謂之皬光謂七爲禍始而當晝衰而復興者也有富有也物慶類者物情喜得其類也易曰枯楊生稊老夫得其女妻無不利次八内不克婦荒家及國涉深不測測曰内不克婦國之孽也范本不測作不可測今從諸家范曰克勝也上九雨降于地不得止不得過測曰雨降于地澤節也三方二州一部三家去陰家木準無妄漢儒解無妄爲無所復望故揚子以去準之三測曰妄行也四測曰非所望也是兼取二義陽去其陰陰去其陽物咸倜倡倜張留切倡音昌是時陰陽各去其所未定萬物亦倜倡不知所處也王曰倜與侜同萬物猖狂而離散初一去此靈淵舍彼枯園測曰去此靈淵不以謙將也范曰一爲水最在下故曰靈淵去下即高非謙德也小宋曰枯園猶高上也光謂園木之枯必地高而無潤澤也一爲思始而當夜小人厭下思高欲去此而從彼必有殃也次二去彼枯園舍下靈淵測曰舍下靈淵謙道光也二爲思中而當晝君子慮以下人故道光也次三高其步之堂有露測曰高步有露妄行也范小宋本妄行作妄升王本作安行今從宋陸本露沾人衣禍辱之象也三爲成意而當夜小人見高位趨之不覺涉於禍辱也次四去于子父去于臣主測曰去于子父非所望也范本作去于父子今從二宋陸王本王曰既得晝去之得宜去于子而之父去干臣而之主順于尊卑之序則咎悔不生光謂四爲福始而當晝去卑而得尊福生望外故云非所望也次五攓其衣之庭有麋測曰攓衣有麋亦可懼也小宋曰攓音愆舉也光謂攓衣而行庭有荆棘也麋鹿遊庭亡國之墟也五情恐懼又爲衣居尊位而當夜將去其位而失其國可無懼乎次六躬去于成天遺厥名測曰躬去于成攘不居也二宋陸本成作城今從范王本攘古讓字遺以醉切范曰六爲上禄家性爲去功成身退故天遺其名次七去其德貞三死不令測曰去其德貞終死醜也范曰令善也王曰七居過滿而又失位當夜乖去之宜去之之惡者莫若去其德義貞正之方故雖三死猶有不令之名滅也三者舉其多也次八月高弦火幾縣不可以動動有愆測曰月弦恐見咎也幾居衣切又音祈縣古懸字范曰月高弦二十餘也火謂大火火之幾懸歲將晩也八者老疾之於年爲八十如月動而益晦火日以流退致遺法後生不可妄動以有愆也光謂火中寒暑乃退八爲耗爲剥落如人衰老宜静不宜動也上九求我不得自我西北測曰求我不得安可乆也小宋引玄圖曰生陽莫如子西北則子美盡矣光謂西北陰位九爲盡弊爲殄絶居去之極而當夜已去矣故求之不得如日也歲也由西入北安可乆也三方二州二部一家晦陽家金準明夷入晦次七日舍房陰登于陽陽降于陰物咸喪明喪息浪切王曰萬物恃陽以爲明陽降則物喪其明初一同冥獨見幽貞測曰同冥獨見中獨照也范王本照作昭今從二宋陸本王曰處冥晦之時而得位當晝故曰同冥獨見自守於幽玄之中不失其正光謂一爲思下又爲下下當日之晝故能獨見幽貞次二盲征否測曰盲征否明不見道也否方乆切與不同王曰冥晦而又失位當夜益其暗焉則是以盲而有所徃必有顛躓之憂矣光謂二爲思中而當夜故有是象次三陰行陽從利作不凶測曰陰行陽從事大外也范王本大作必今從宋陸本次四晦其類失金匱測曰晦其類法度廢也范曰四金也而在其行處晦之世故曰晦其類也光謂法度所以固國如匱之固金凡一國之中有晦有明法度猶可守也若彼晦而此又晦之依阿苟合類聚如一則法度廢矣四爲下禄爲外它而當夜故有是象次五曰正中月正隆君子自晦不入窮測曰日中月隆明恐挫也王曰五爲中和而又得位當晝日中月滿之時而能戒其過盛自晦其迹既達消息屈伸之義理則其道不窮次六玄鳥維愁明降于幽測曰玄鳥維愁將下昧也王曰玄鳥知時之鳥六居盛滿而又失位當夜去明向幽之象也小宋曰玄鳥乙也光謂六爲廓天渉於秋初故有兹象次七𣆺提明或遵之行測曰𣆺提明德將遵行也二宋陸本𣆺作睄息井切義與省同或作醒小宋音眇一目盲也宋陸本提作𤟥都黎切諸家賛辭皆無德字范本作睄提明德因測而誤也范云明目不眀意與眇同今從王本王本測無遵字今從諸家王睄古宵也七得位當晝是於宵夜之中提眀自照或遵之行斯不失其道提眀謂燭之類光謂七爲消爲敗損有夜之象而當日之晝故曰提明也德謂明德之人也昏晦之世有明德者將之衆之所從如夜得燭衆所遵行也次八視非其真夷其右曰滅國喪家測曰視非夷目國以喪也諸本真皆作直今從宋陸本諸家測皆云視直夷目今從范本范曰夷傷也光謂八爲疾瘀爲耗而當夜故有是象上九晦冥冥利于不明之貞測曰晦冥之利不得獨明也宋陸王本晦冥之利作晦在上下小宋本作晦冥冥今從范本九爲晦極而當晝君子用晦爲正則如是可矣易曰内難而能正其志箕子以之又曰箕之明夷利貞三方二州二部二家瞢瞢古夢字又莫登切陽家土亦準明夷入瞢次六三十一分三秒霜降氣應次八日舍心晦外闇瞢内昏也或曰晦二盲征否非内昏邪瞢二明腹睒天非外闇邪恒有不恒其德節有不節若爻與卦反者也盲反眀也明反瞢也陰征南陽征北物失明貞莫不瞢瞢吴本征作延云古征字也王本作近誤也陸曰陽在南則萬物相見於離今在北故曰瞢初一瞢腹睒天不睹其畛測曰瞢腹睒天無能見也范本瞢腹明腹皆作復畛作軫今從二宋陸王本睒失冉切畛章忍切又音真范曰睒窺也王曰睒暫視也失位當夜心腹昏瞢暫視於天豈能知其疆畛哉光謂天至大而難知者也一爲思始而當夜故有是象次二明腹睒天睹其根測曰明腹睒天中獨爛也范曰二爲目故明也爛明也王曰得位當晝以明達之腹仰視於天必究其根本矣光謂二爲思中而當晝故有是象次三師或導射豚其埻測曰師或導射無以辦也王本導作遵今從宋陸范本王小宋本豚作遯蓋古字通用埻之尹切范曰師瞽者也豚遁也埻射的也光謂三思之崇也爲進人爲股肱而當夜譬如瞽師而教導人射必遠其埻不能中矣豚猶遠也次四鑒貞不迷于人攸資測曰鑒貞不迷誠可信也范曰四金也故爲鑒鑒之正者猶爲不迷況得賢者與爲治乎資取也王曰得位當晝則是能正其鑒無所迷非獨自正於已亦爲人之所資資取其明也次五倍明仮光觸蒙昏測曰倍明仮光人所叛也宋陸本作人所瀕也范本作人可頻也小宋本作人所頻也今從王本王曰仮古反字五當盛位而處陰當夜迷而不復故有背明之象次六瞢瞢之離不宜熒且𡛖測曰瞢瞢之離中不眩也王本宜作肎古肯字今從二宋陸范本宋陸本𡛖作姽小宋本且𡛖作其妖云𡚼居宜切細腰美婦也今從范王本范本不眩作薆薆小宋本作𦭼𦭼符少切云物之零落貌今從王本姽牛委切𡛖乃果五果二切范曰𡛖小貌王曰六居陰位又當晝時爲瞢之主以正群迷者也瞢瞢之離自昏而明熒小光有所眩惑𡛖弱也光謂自昏而明非盛彊不能濟也故不宜熒且𡛖次七瞢好明其所惡測曰瞢好之惡著不昧也范本作著不可昧也王本作著昧也今從二宋陸本次八昏辰利于月小貞未有及星測曰昏辰利月尚可願也范本未有及星作未及星王本作禾有及星今從二宋陸本宋曰以月繼日故猶可願也上九時不獲其嘉男子折笄婦人易哿測曰不獲其嘉男死婦歎也王本笄作筭今從諸家王以𨲠爲古嗟字哿爲珈音加三方二州二部三家窮陽家水準困入窮次九日舍尾陰氣塞宇陽亡其所萬物窮遽小宋本陰氣作群陰王小宋本窮遽作窮處今從宋陸范本六合之間謂之宇初一窮其窮而民好中測曰窮其窮情在中也次二窮不窮而民不中測曰窮不窮詐可隆也次三窮思達測曰窮思達師在心也王本師作思小宋本心作中今從宋陸范本三爲成意爲進人困而學之者也能盡其心則無不達矣師何遠哉次四土不和木科橢測曰土不和病乎民也橢徒和切王曰科橢木病也光謂四爲下禄而當夜小人得位困民以自奉民困則國危譬猶土瘠則本病矣有子曰百姓不足君孰與足次五羹無糝其腹坎坎不失其範測曰食不糝猶不失其正也范本賛測皆云羹無糝今從二宋陸王本𤏟桑感切王曰得位居中爲窮之主不失處窮之宜羮無糝其腹坎坎然空乏然猶不失賢聖之範處窮之美莫過是焉陳曰𤏟碎米也次六山無角水無鱗困犯身測曰山無角困百姓也焚山而獵涸澤而漁所獲雖多後無繼也重斂以窮民民窮則犯上災必迨其身矣次七正其足蹛于狴獄三歲見録測曰正其足險得平也狴音弊王曰蹛與跌同得位當晝正足遇跦時之窮非巳招也録寬録也讀爲慮窮不失正宜其險而得平小宋曰蹛音帶蹈也光謂狴牢也七離咎而犯災故有是象次八涉于霜雪纍項于厀測曰纍項于厀亦不足生也宋陸本項作頂今從范王小宋本厀與膝同王曰失位當夜不能自正其足涉于霜雪犯難而行也累項于厀囚繫之重也上九破璧毁圭曰竈生蛙天禍以他測曰破璧毁圭逢不幸也范本蛙作音猛今從二宋陸王本蛙烏媧切王曰時數巳極不能反之於通雖得位當晝而不免於患破璧毁圭失其所寶也曰竈生蛙無所復食也大禍以它者咎非它作也光謂破璧毁圭其人可珍而遭時不幸也禍之極窮之至故有是象集註太玄經卷之五
