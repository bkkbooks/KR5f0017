front:
  text: 集注太玄經卷之一太玄
  hash: sha256:34cbd6625f2645ea9b66a9a3a2b36294e0e927700f4eff1364f9a122b5135a40
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0017_HFL_001-001a, image: hfl/0860/0860-020.png}
body:
  text: 諸家皆謂之太玄經陳曰史以雄非聖人而作經猶吳楚之君僣號稱王蓋誅絶之罪也按子雲法言解嘲等書止云太玄然則經非子雲自稱當時弟子侯芭之徒從而尊之耳今從之宋陸依揚子舊本分玄之贊辭為三卷一方為上二方為中三方為下次列首衝錯測攡瑩數文掜圖告凡十一篇范散首測於贊辭之間王因之小宋依易之序以玄首準卦辭測準小象文準文言攡瑩掜圖準系辭告數準説卦衝準序卦錯準雜卦吳因之范本於觀覽講解差便今從之宋陸又於贊辭之前列天始始始中始終中始中中中終終始終中終終地下下下中下上中下中中中上上下上中上上人思內思中思外福小福中福太禍生禍中禍極諸家本皆無之玄首馴乎玄渾行無窮正象天宋曰馴順也陸曰渾然象天周運光謂揚子嘆玄道之順渾淪而行終則復始如天之運動無窮也陰陽坒參坒毗至切宋曰坒二也王曰坒配合也光謂一生二二生三配而三之以成萬象以一陽乘一統萬物資形一陽謂冬至也太初上元十一月甲子朔旦冬至無餘分後千五百三十九歲甲辰朔旦冬至無餘分又千五百三十九歲甲申朔旦冬至無餘分又千五百三十九歲還甲子朔旦冬至無餘分凡千五百三十九歲為一統三統為一元一統朔分盡一元六甲盡方州部家三位疏成范本疏作踈王小宋本作統今從宋陸本宋曰疏布也光謂揚子名首之四重以方州部家者取天下之象言之故一玄都覆三方方同九州枝載庶部分正群家玄者天子之象也方者方伯之象也州者州牧之象也部者一國之象也家者一家之象也上以統下寡以制衆而綱紀定矣三位一二三也以一二三錯布於方州部家而八十一首成矣曰陳其九九以為數生陸曰玄數起於三為方州部家轉而相乘以成八十一首七百二十九贊之數也贊上群綱乃綜乎名二宋陸王本綱作剛今從范本上時掌切舉也揚子作玄以七百二十九贊為曼漶難知故以八十一首舉上其名區别其義使炳然散殊若綱在網有條而不紊故曰贊上群綱乃綜乎名也八十一首歲事咸貞首者九贊之端首也玄測盛哉日乎炳明離章五色淳光陸曰所以於測篇首而述日者謂行於七百二十九贊之中為晝夜休咎之徴也日含五行之精以為光明故稱淳光謂晝夜循環寒暑運行以生殺萬物成立歲功皆日之所為也故揚子嘆以為敘測之端炳亦明也離文也淳粹也物之五色非日不彰夜則測陰晝則測陽一日兩贊前贊為晝後贊為夜凡日法八十一分晝贊首前半日夜贊直後半日晝夜之測或否或臧否音鄙宋曰否不善也范曰臧善也陽推五福以類升陰幽六極以類降陽為出陰為入陽為顯陰為隱陽為善陰為惡陽為福陰為禍故曰陽推五福以類升陰幽六極以類降皆謂贊之陰陽也晝為陽夜為陰升降相關大貞乃通關交也升降相交然後三儀大正之道乃通明二者不可偏廢偏廢則正道否塞而不行也經則有南有北緯則有西有東巡乘六甲與斗相逢宋曰日右行而斗左回故相逢也光謂巡行也十日行乘十二辰而為六甲逢迎也歷以紀歲而百穀時雍范本紀作記今從二宋陸王本宋曰雍和也光謂日運行於上而有寒暑四時聖人治歷以紀一歲之氣節然後事不失時而百穀和熟人得以自養也方一州部一家中陽家水準易中孚中一之初日舍牽牛初度冬至氣應陽氣始生兼準坎所以然者易以八卦重為六十四卦因爻象而定名分坎離震兌直二十四氣其餘六十卦每卦直六日七分玄以一二三錯布於方州部家而成八十一首每首直四日有半起於冬至終於大雪準易卦氣直日之敘而命其名或以兩首準一卦者猶閏月之正四時也坎離震兑在卦氣之外故因中應釋飾附分至之位而準之揚子本以顓頊及太初歷作太玄故日躔宿度氣應斗建不皆與今治歷者相應中者心也物之始也中孚者誠發於中而信著於外也洪範五事思曰睿睿作聖陽氣潛萌於黃宫信無不在乎中首者明天地以陰陽之氣發斂萬物而示人法則者也黃中之色也中直冬至之初陽氣潛生於地中如人之居宫室也信無不在乎中者揚子嘆三儀萬物變化云為原其造端無不在乎中心也信辭也初一昆侖旁薄幽測曰昆侖旁薄思之貞也范小宋本之作諸今從宋陸王本昆音魂侖盧昆切范曰昆渾也侖淪也天之象也旁薄猶彭𩲸也地之形也幽隱也王曰幽者人之思慮幽深玄遠也光謂贊者明聖人順天之序修身治國而示人吉凶者也昆侖者天象之大也旁薄者地形之廣也夫以天地之廣大而人心可以測知之則心之為用也神矣一者思之始也君子之心可以鈎深致遠仰窮天神俯究地靈天地且不能隱其情况萬類乎以其思而未形也故謂之幽法言曰或問神曰心請問之曰潛天而天潛地而地天地神明而不測者也心之潛也猶將測之况於人乎况於事倫乎君子思慮之初未始不存乎正故曰思之正也易曰正其本萬事理孔子曰詩三百一言以蔽之曰思無邪次二神戰于玄其陳陰陽測曰神戰于玄善惡并也陳直刃切神者心之用也人以心腹為玄陰主惡陽主善二在思慮之中而當夜其心不能純正見利則欲為惡顧義則欲為善狐疑猶豫未知適從故曰神戰于玄其陳陰陽也子夏出見紛華盛麗而悅入聞夫子之道而樂二者交戰於中子夏戰勝故為大賢不勝則為小人矣次二龍出于中首尾信可以為庸測曰龍出于中見其造也宋陸王本作首尾信可罔以為庸范小宋本無罔字今從之陸曰造作也范曰庸法也王曰陽氣益進造物之功始見光謂三為成意而處思之外君子既思之則行之所為之迹見於外人得而知故曰龍出于中也君子行已自始至終出處語默不失其宜信乎可以為人之常法也易曰見龍在田利見大人次四庫虛無因大受性命否測曰庫虛之否不能大受也庳毗至切王曰四近於五臣位盛極當高而自卑實而若虛有而若無因物之功不自作為故曰庳虛無因光謂庳下也中和莫盛於五五者位之隆德之盛也四當夜小人也而逼於五不度其德進取狂簡謂夫性命之理造次可及也故大受之而無辭避夫性命理之至精者也非小人之所得知也故曰否論語曰子罕言命又子貢曰夫子之言性與天道不可得而聞也子曰亡而為有虛而為盈約而為泰難乎有常矣次五日正于天利用其辰作主測曰日正于天貴當位也范小宋本用作以今從宋陸王本王曰五既居中體正得位當晝且為一首之主故象日正于天辰時也利用及其明盛之時而為物主也光謂三儀之道莫盛於中正故陽家之五贊之中也陰家四六體之中也而又當晝得正一首之中最吉者也故曰日正于天以言陽之盛也君子有其道必有其時有其時必有其位然後能為民之父母時既得矣位既正矣而不能以道濟天下豈為民父母之意哉故曰利用其辰作主次六月闕其摶不如開明于西測曰月闕其摶賤始退也范本摶作博賤作明王本摶作磚小宋本摶作博陳讀摶為東今摶從宋陸賤從諸家摶博磚皆與團同王曰六為盛極物極則虧故象月之過望而闕其團開明于西象月之初一也玄道貴進故一象月初而吉六象月闕而凶光謂團圓也六以陰質而始過乎中故曰月闕其摶也夫月闕其摶明未甚虧北之始生於西猶為盛大然玄之道貴將進賤始退故曰不如開明于西也猶人之盛滿心志先退而後福祿從之也次七酋酋火魁頤水包貞測曰酋酋之包任臣則也諸家本作大魁頤王本作火魁頤今從之陸曰則法也任臣用典法也范曰酋就也小宋曰頤養也光謂魁斗之首也任用也七為消為敗隕為減天有秋之象又有刑罰之象秋物成就故曰酋酋天之成物必資於秋君之馭臣必資於法子産曰太上以德撫民其次莫如猛火烈人望而畏之故鮮死焉水懦弱人狎而玩之故多死焉人君之心執法無私如火烈烈人不敢犯以為物之首然不可失養人之道寬而容物如水之浮天載地無所不包然不可懦而失正故曰火魁頤水包貞此人君用臣之大法也次八黃不黃覆秋常測曰黃不黃失中德也范曰黃中之色也八亦上體之中也光謂八為剝落又為沈天亦秋之象也秋者萬物成就收功之時也八居中位而當夜無中之德覆敗秋之常道喪其成功也上九顚靈氣形反測曰顛靈之反時不克也范曰顛下也死氣為魂其形為魄魂登于天魄歸于地故言反也王曰陽極于上陰絶於下靈魂已顛墜矣則氣反於天形歸於土光謂靈者心之主所以營為萬務物之所賴以生者也上九居中之極遇禍之窮有生之終者也靈已隕矣則氣形各反其本也凡玄之贊辭晝夜相間晝辭多吉夜辭多凶又以所逢之首及思福禍述其休咎此玄之大指也九逢日之晝而云顛靈氣形反辭若凶者何哉夫吉凶者非幸不幸之謂也得君子之道雖遇禍猶為吉失君子之道雖遇福猶為凶故瑩曰天地所貴曰福鬼神所祐曰福人道所喜曰福其所賤所惡皆曰禍文曰君子年高而極時者也明君子守正以順命也洪範五福有考終命孟子曰君子盡其道而死者正命也方一州部二家周陰家火準復入周次八日舍婺女周匝也旋也陽氣周神而反乎始物繼其彚宋曰彚類也光謂萬物隨陽出入生長收藏皆陽之神也歲功既畢神化既周而復反乎始萬物各繼其類而更生也初一還於天心何德之僣否測曰還心之否中不恕也次二植中樞周無隅測曰植中樞立督慮也督猶中也衣之背縫謂之督無隅猶言無方也二思之中又體之中也而當日之晝象君子立慮於中以應萬變如樞之運無所不周故曰植中樞周無隅也次三出我入我吉凶之魁測曰出我入我不可不懼也夫外物之來入乎思也言行之動出乎思也得其宜則吉失其宜則凶三居成意之地思之隆也而當日之夜故戒之曰吉凶之出亦自我吉凶之入亦自我為吉凶之魁首可不懼乎一出一入周之義也次四帶其鈎鞶錘以玉環測曰帶其鉤鞶自約束也錘直偽切鉤所以綴帶為急也鞶革帶也錘與縋義同謂以繩有所係也王以象君子之德環以象周旋無闕也君子德義可尊作事可法容止可觀進退可度以臨其民故曰帶其鉤鞶錘以玉環言以禮自約束周旋無闕也帶與環皆周之象次五土中其廬設其金輿厥戒渝測曰廬金戒渝小人不克也士中其廬居得中也設其金輿所未安也夫廬非不美也輿非不堅也然小人必不能久居而行之故曰厥戒渝孔子曰中庸之為德也其至矣乎民鮮能久矣又曰人皆曰豫知擇夫中庸而莫能期月守也土中其廬周之象也次六信周其誠上亨于天測曰信周其誠上通也王曰玄經之例以五為陽數又居中位故為陽首之主六為陰數又居盛極故為陰首之主光謂反復其信皆出至誠非由浮飾故可以上通于天也次七豐淫見朋還于蒙不克從測曰豐淫見朋不能從也次八還過躬外其禍不大測曰還過躬外禍不中也范本過作今從二宋陸王本上九還于喪或棄之行測曰還于喪其道窮也生極則反乎死盛極則反乎衰治極則反乎亂九處周之極逢禍之窮當日之夜故曰還于喪夫國家將興則人歸之將亡則人去之故曰或棄之行一方一州一部三家礥礥下珍切又音賢陽家木準屯宋曰礥難也光謂物之初基必有艱難惟君子能濟之陽氣微動動而礥礥物生之難礥礥難貌初一黃純于潛不見其畛藏鬱於泉測曰黃純于潛化在嘖也畛音真嘖與賾同士革切陸曰嘖隱也光謂嘖幽深難見者也一非中位而云黃者陽氣未見猶在地之中也家性為礥一為思始始有拔難之心者也陽氣潛於地中純粹廣大藏鬱於泉以化育萬物而人莫見其畛界也猶君子有拔難之心精純幽遠利澤將施於天下而人未之知者也次二黃不純屈于根測曰黃不純失中適也小宋本適作道今從諸家二為思中而當夜故曰黃不純陽氣不純則萬物失其性屈于根而不能生小人妄慮則萬事失其適隳其功而不能成次三赤子扶扶元貞有終測曰赤子扶扶父母詹也范本詹作瞻今從二宋陸王本詹瞻古字通用扶扶拔援依慕之貌元善之長也三為成意而當晝象君子將行其志拔難濟民民皆瞻仰而歸之非有元貞之德則不能成兹大功故曰元貞有終次四拔我不德以力不克測曰拔我不德力不堪小宋本作匪德今從諸家四當夜小人也而逢時之福無德而以力勝者也終當覆敗烏能濟衆哉次五拔車山淵宜於大人測曰拔車山淵大位力也王曰或山或淵道之險者五為一首之主而又得位當晝體正居中有大人之德拔車以出于險則為萬物之所見故宜於大人光謂車者民所載也五福之盛也而又當晝大人之得位者也故可以載民於險阻矣次六將其車入于丘虛測曰將車入虛道不得也虛與墟同六過中而當夜象雖有濟民之志而不得其道則愈陷於難矣過中者失其宜適之象也次七出險登丘或牽之牛測曰出險登丘莫之代也范本代作伐今從諸家陸曰引車莫如牛誰人能代牛者乎王曰位既當晝難又將終猶有八九故且登丘陵而未復平途光謂丘者難之小者也牛者物之有力者也七雖當晝而涉於禍境如已出大險而猶有小難者也夫大險已出則小難不憂乎不濟也况或助之牛以牽車乎如君子既能濟險而復有賢才助之也次八車不拔骭軸折測曰車不拔躬自賊也宋陸本骭作髀音義皆闕范本作髀小宋作𨌬丑孝切車弓也今從王本下晏切王曰骭人脛也無德而將出難禍又至故象以人代牛則引車不拔而骭軸俱折矣光謂八為禍中而又當夜小人不量其力不能拔難覆國喪身者也上九崇崇高山下有川波其人有輯航可與過其測曰高山大川不輯航不克也其音基語助輯與楫同九處難之極遇禍之窮故曰崇崇高山下有川波其言險之甚也然當日之晝其才足以濟險者也故曰人有輯航可與過其一方一州一部一家間陰家金亦準屯入間次四一十八分二十四秒日次玄枵小寒氣應斗建丑位律中大吕間間也防也陽氣間於陰礥然物咸見間宋曰礥然者陽欲出不能之貌也陽主出內萬物者也而見防遏故萬物亦皆見間初一蛇伏于泥無雄有雌終莫受施測曰蛇伏于泥君不君也施式豉切一陽而當日之夜君不君之象也君德龍也失道而見間於巨故曰蛇伏于泥也無雄有雌則終莫受施無君有巨則澤不下達矣次二間其藏固珍寶測曰間其藏中心淵也藏族浪切二思中也君子藏器於身默而識之待價而沽若間藏固寶者也次三關無鍵舍金管測曰關無鍵盜入門也小宋本作金舍管今從諸家鍵其偃切舍與舍同鍵鎖牡也管所以出鍵者也關無鍵則舍金管而不用矣三為成意而當日之夜不能防間失其權重故盜入門也易曰弗過防之從或戕之凶又曰慢藏誨盜次四拔我輗軏小得利小征測曰拔我輗軏貴以信也范曰輗軏喻信也論語曰大車無輗小車無軏次五礥而間而拔我姦而非石如石厲測曰礥間如石其敵堅也范曰五處尊位當拔除其姦非石之固而使如石故危也光謂五居盛位為物藩衛而欲以不正拔物故敵堅如石而身危也次六間黃垁席金第測曰間黃垁以德固也小宋本垁作埃今從諸家光曰五堵為垁王曰垁古字城也第簀也光謂席猶藉也金至堅之物福之隆也而又當晝君子以德自防外患無者也故曰間黃垁席金第次七跙跙間于遽篨或寢之盧測曰跙跙之間惡在內也范本遽篨作遽除王小宋本作蘧篨今從宋陸本跙七余莊助二切遽音渠篨音除王曰跙跙行不正貌遽篨傳舍或寢之盧間外而失內也七為禍生位且當夜失間之道也光謂惡人已跙跙然入其室盧而不自知者也秦大發兵備胡而胡亥亡其國次八赤臭播關大君不間克國乘家測曰赤臭播關恐入室也王本不間作不開小宋本作不關今從宋陸范本王曰赤臭者陰陽交爭殺傷之氣也播於遠關之外上九間門以終虛測曰間門以虛終不可實也王曰處間之極當夜之位失間之宜如間其門户人之所以自終必且虛交不獲光謂間門自終不與物交慎則慎矣而終無所得求之功業不亦遠乎易曰括囊無咎無譽一方一州二部二家少陽家士準謙入少次五日舍虛陽氣淡然施於淵物謙然能自韱范王小宋本謙作溓今從宋陸本小宋本能作溓音斂韱與纖同宋曰淡然不動也謂陽防間於是淡然施意於淵不復動也謙然者言見陽氣不動亦謙然自約也光謂萬物當發生尚能自守其纖細如人之謙也初一冥自少眇于謙測曰冥自少不見謙也小宋本自作目今從諸家一者思之微也當日之晝處衆之下內自謙抑而不求人知者故曰冥自少眇于謙眇微也次二自少不至懷其恤測曰自少不至謙不誠也二為思中而當日之夜小人之謙貌恭心很不以其誠故憂未免也次三動韯其得人主之式測曰韯其得其謙貞也范本作韯其得人謙貞也今從諸家次四貧貧或妄之振測曰貧貧妄振不能守正也王曰失位當夜妄有所求非謙靜之時所宜然也光謂家性為少四為下祿故貧也在中之下不自多大自旌其貧者也故曰貧貧當日之夜不能守正自旌其貧妄求振救斯亦鄙矣次五地自沖下于川測曰地自沖人之所聖也王曰能正居中又當晝位如地之能自沖虛下于川谷川谷歸之則為百谷王矣光謂五者福之盛也地體卑沖故百川就之聖人謙損故百祿歸之次六少持滿今盛後傾測曰少持滿何足盛也王曰當自少之時居極盛之位位既當夜德又失謙謙虛之時反欲持滿今雖盛大後必傾危次七貧自究利用見富測曰貧自究富之聘也七雖為消而當日之晝君子也君子之貧也求諸己而不求人是以人樂與之故曰貧自究利用見富聘問也言富者自將問而與之况見之乎論語曰義然後取人不厭其取次八貧不貧人莫之振測曰貧不貧何足敬也王曰當少不少當貧不貧則人莫之振也光謂八為耗又當夜小人貧而強為不貧者也如是則人誰振之亦衆所賤惡也上九密雨溟沐潤于枯瀆三日射谷測曰密雨射谷謙之靜也溟音脈射時亦切范曰雨之細者稱溟沐小宋曰溟沐猶霡沐也光謂小雨至微也枯瀆至燥也積潤不已三日之後乃至射谷九處少之極當日之晝如君子積謙以至功名光大非躁動而得之也此言謙道收功之遠一方一州二部三家戾陰家水準睽戾者相乖反也陽氣孚微物各乖離而離其類卵之始化謂之孚草之萌甲亦曰孚然則孚者物之始化也陽氣始化其氣尚微萬物之形粗可分别則各以類生而相乖離矣戾之象也初一虛既邪心有傾測曰虛邪心傾懷不正也虛者神之所宅也一思之微也居戾之初當日之夜虛邪則心傾矣次二正其腹引其背酋貞測曰正其腹中心定也范曰酋就也腹以喻內背以喻外光謂若先正其內以引其外則不相乖戾而皆就正矣是故君子正心以待物修身以化人齊家以刑國治國以平天下次三戾其腹正其背測曰戾腹正背中外爭也小人心不正而求物之正身不修而責人之修舍內而求外棄本而逐末是以中外乖爭而陷於敗亂也二三皆思也故以正腹戾腹言之次四夫妻反道維家之保測曰夫妻反道名有守也夫治外妻治內道相戾也然而內外相感以保其家四為下祿而當書故有是象次五東南射兕西北其矢測曰東南射兕不得其首也射時亦切首舒救切末曰首向也光謂五以小人而居盛位舉措大繆不能服猛者也故曰東南射兕西北其矢言失其所嚮也次六準繩規矩不同其施測曰準繩規矩乖其道也王本乖作孤今從諸家王曰準繩規矩曲直方圓雖乖戾不同各有所施終得其道此亦得戾之宜也光謂準平繩直規圓矩方所施不同皆可為法君子出處語默其迹不同而皆合於道六為上祿而當晝故有是象次七女不女其心豫覆夫諝測曰女不女大可醜也諝須與切豫與與同王曰諝智也光謂夫唱婦和道之常也今乃乖戾棄同即異女則覆夫之智臣則敗君之功大可醜也次八殺生相午中和其道測曰殺生相午中為界也范本午作矢今從諸家午古牾字逆也八為剝落有殺物之象天有殺生國有德刑其道相逆不可偏任必以中和調適其間然後陰陽正而治道通也一曰午交午也殺生往來相交午也上九倉一作篬靈之雌不同宿而離失則歲之功測曰倉靈之雌失作敗也倉靈木之精歲星也其雌金之精謂太白也漢書天文志歲與太白合則為衣之會為水太白在南歲在北名曰牝牡年穀大熟太白在北歲在南或有或亡此言金水性殊同離一宿則有變邪正道反同處一朝則有亂九處戾之極逢禍之窮當日之夜故有是象一方一州三部一家上上時掌切陽家火準升入上次七日舍危三十六分一十五秒大寒氣應陽氣育物于下咸射地而登乎上射時亦切初一上其純心挫厥鏩鏩測曰上其純心和以悅也鏩音讒王曰鏩鏩鋭進貌光謂一為思始而當晝能以純一之心日就月將不失和悅以至高大挫其鋭進躁急之志是以求道則得道干祿則得祿老子曰挫其鋭次二上無根思登于天谷在于淵測曰上無根不能自活也范本活作治今從諸家谷窮也凡物有根則能生人有德則能升二為思中當夜躁於進取其志欲登於天而不免窮在於淵猶木無根而上生終不能自活也次三出于幽谷登于茂木思其珍穀測曰出谷登木知向方也宋曰方則道也王曰珍穀謂草木之實可食而珍美者光謂珍穀諭美道也君子棄惡就善舍邪趣正如鳥出幽谷而登茂木也三為思上故曰思其珍穀詩云出自幽谷遷于喬木孟子謂陳相曰吾聞出於幽谷遷于喬木者未聞下喬木而入幽谷者次四即上不貞無根繁榮孚虛名測曰即上不貞妄升也即就也榮木華也四為福為祿故曰就上當日之夜故不正夫以不正而得祿猶木無根而有榮雖其繁多何可久也信惟虛名而巳無益於實也論語曰不義而富且貴於我如浮雲二在下體欲升而不能得者也四居福祿雖升而不以正者也次五鳴鶴升自深澤階天不怍測曰鳴鶴不怍有諸中也怍與怍同階猶登也五為中和又為盛福上之至美者也君子之道暗然而日章雖升聞于天亦無所愧詩云鶴鳴于九臯聲聞于天次六升于堂顛衣到裳廷人不慶測曰升堂顛到失大衆也上曰衣下曰裳慶喜也六為上祿故曰升于堂當日之夜小人而居君子之位者也故曰顛衣到裳小人在上則下皆不悅故曰廷人不慶次七升于顛臺或柱之材測曰升臺得柱輔拂堅也范小宋本拂作弗今從宋陸王本拄陟主切拂古弼字七在上體而為敗損故曰升于顛臺然而當日之晝雖在衰厄而得良輔如將顛之臺拄以良材則高而不危也次八升于高危或斧之梯測曰升危斧梯失士民也王曰八居過滿之地位且當夜而務進不已如升高履危而或斧去其梯欲求復下不可得矣光謂八為禍中而當夜象小人驕亢於上不恤士民如升高斧梯危莫之救矣士民者國之梯也君賴以尊者也上九棲于災初亡後得基測曰棲災得基後得人也災與災同居物之上故曰棲九為禍極又為殄絶故曰棲于災然當日之晝是得賢人而為之助者也豈唯救亡乃可以立國家之基也詩云樂只君子邦家之基一曰災當作椔木立死曰椔棲于枯木孤危之甚也一方一州三部二家干陰家木亦準升干者上而有所干犯也諫説者以直干上故干有諫説之象陽扶物如鑽乎堅鉿然有穿范王本作陽氣扶物而鑽乎堅今從二宋陸本鉿音閣宋曰鉿陷聲也謂是時陰氣猶堅於上故陽氣扶萬物如鑽之鉿然有穿初一丸鑽鑽于內隙厲測曰丸鑽于內轉丸非也丸者流轉無所不入者也佞邪之人研求人心得其間隙從而説之以納其非則無所不入此國家所以危也孔子惡利口之覆邦家者一為思始而當夜故有是象班固答賓戲曰商鞅挾三術以鑽孝公次二以微干正維用軌命測曰以微干正維大諫微也范王本測無維字今從二宋陸本宋曰謂大諫其事在微時王曰二位當晝知諫諍之道當及事之幾微而干之則易為功然後以正道維持之則能用軌法之命矣光謂二為方沮而當晝故有是象孔子曰諫有五直諫為下度君而行之吾從諷諫矣軌法也志正君之號令使應法度也次三𦴑鍵挈挈匪貞測曰𦴑鍵挈挈干祿回也𦴑渠淹切宋曰回邪也光謂𦴑者緘束使不得解鍵者固結使不得離皆縱橫之術説人求合者也鬼谷子有內揵飛鉗篇挈挈急切貌干求也祿福也言小人以術説人急切求合非正道也詩云愷悌君子求福不回次四干言入骨時貞測曰干骨之時直其道也干言直言犯上者也入骨論深切也夫切直之言不得其時則自取怨咎而無益於人故君子貴於時正也家性為干四為福而當晝故有是象次五蚩蚩干于丘飴或錫之壞測曰蚩蚩之干錫不好也飴與之切壞音酷范曰飴美食也王曰丘聚也光謂蚩蚩愚貌丘以諭高大飴餳也以諭甘美壞未燒瓦以諭惡物五以小人而干盛位不度其德如見血飴之美利不循已分而求之則人皆賤惡而以惡物與之矣次六幹干於天貞馴測曰幹干之貞順可保也馴順也六逢福而當晝干而至于極大如木之幹乃至于天盛之至也然以正順而致之則吉以邪逆而致之則凶故曰貞馴次七何戟解解遘則曰何戟解解不容道也何胡可切解胡買切二宋陸王本遘作覯今從范本小宋解解作鮮鮮今從諸家光謂何擔也小人之性多所干犯如何戟而行遇物絓羅不容於道也次八赤舌燒城吐水于瓶測曰赤舌吐水君子以解崇也王本于作干今從諸家祟音粹范曰崇猶禍也上九干于浮雲從墜于天測曰干于浮雲乃從天墜也王小宋本經無從字今從宋陸范本王曰處干之極不能自反位既當夜窮而無之如干雲不止轉求上進既失其道乃墜于天凶其宜也光謂九為禍極而當夜故有是象一方一州三部三家𤕠王本𤕠作𤕞音佇小宋作音踈陳云一本作丁吕切一本作所菹切吳云説文通也從爻從匹亦聲束匹守皆同聲揚子用古字字書多收不盡𤕠與踈音義同陽家金準臨陸曰臨𤕠皆進貌也小宋曰通也光謂𤕠進也大也陽氣強內而弱外物咸扶𤕠而進乎大陽浸而大故曰強內陰氣猶盛故曰弱外扶踈之貌初一自我匍匐好是冥德測曰匍匐冥德若無范本冥作宜今從宋陸王本匍匐者雖未能行而志在於進者也一思之微也故曰冥君子自微賤之時人未之知而已好是冥德進而大之匍匐而前若將無有得行之時言汲汲於進德不能待也次二熒𤕠狧狧不利有攸往測曰熒𤕠狧狧多欲往也狧他合切范曰熒者光明小見之貌狧狧貪欲之意也王曰狧狧犬食貌次三卉炎于𤕠宜于丘陵測曰卉炎丘陵短臨長也王曰三位當晝能扶陽而進如百卉遇炎陽之氣當𤕠進之時宜其處于丘陵而下臨衆木矣光謂熒火之微炎則稍進矣以短卉小火而能臨物者以其托於丘陵如君子之擇術也荀子曰西方有木焉名曰射干莖長四寸生於高山之上而臨百仞之淵木莖非能長也所立者然也次四𤕠于酒食肥無譽測曰𤕠于酒食仕無方也四為下祿小人學未優而仕所進大者酒食而已故雖肥無譽也次五𤕠有足托堅穀測曰𤕠有足位正當也王本穀作轂今從二宋陸范本穀轂古字通王曰五位當晝而又居中體正為𤕠之主車堅馬良可以周行天下以此而進何往不利哉光謂中和莫盛於五五為福中日又當畫君子有中和之德而又得位膺福如足力已強自可進大况托堅轂無所不之矣次六獨𤕠逝逝利小不利大測曰獨𤕠逝逝不可大也小宋本逝逝作晰晰今從諸家次七白日臨辰可以卒其所聞測曰白日臨辰老得勢也次八蚤虱之𤕠厲測曰蚤虱之𤕠不足賴也范曰家性為𤕠亦𤕠附於人故以為喻蚤虱之性荀尋而進故危也上九全𤕠絭其首尾臨于淵測曰全𤕠之絭恐遇害也二宋陸本作全𤕠之絭絭其首尾尾臨于淵今從范王本范本害作困今從宋陸王本絭音券又厥萬切小宋曰絭縛也光謂九為進大之極進極則退大極則消君子欲全進大之道非恭慎則不可故恐懼如以繩繫首尾臨于淵乃免咎也一方二州一部一家羡羡于線切陰家水準小過舊準臨卦非也王曰羡者邪曲不正之象光謂周禮有璧羡不圓之璧陽氣贊幽推包羡爽未得正行范曰羡者萬物尚為陰氣所包爽差也光謂萬物在幽陽氣贊之為陰所包陽氣推之邪曲差爽未得挺然正行而出故曰羡也初羡於初其次迂塗測曰羡于初後難正也一為思始始初而邪則次後難正矣故曰其次迂塗易曰君子作事謀始次二羡于微克復可以為儀測曰羡微克復不遠定也二為思中邪而未遠所失尚微若能自復於中猶可以為法也易曰不遠復無祗悔元吉次三羡于塗不能直如測曰羡于塗不能直行也范本于作迂今從宋陸本羡至於三失道浸遠不若直往之善也次四羡權正吉人不幸測曰羡權正善反常也君子之道未常曲也其有曲者遭時不得已而行之以權正也權者權其輕重所曲者小所正者大非不幸不可為也若孔子與蒲人盟而適衛答南子之拜之類是也善反常者雖反常道志在於善也次五孔道夷如蹊路微如大輿之憂測曰孔道之夷奚不遵也宋陸本大作泰今從范王小宋本蹊音奚王曰孔道謂空道也蹊邪徑也空道坦夷不之踐履蹊路微狹而遵之又乘大車必見覆敗憂其宜矣光謂踐田成徑謂之蹊大輿以象聖人之道人所載也五為中和故曰孔道夷如夜為小人故曰蹊路微如孔子曰攻乎異端斯害也已老子曰大道甚夷而民好徑次六大虛既邪或直之或翼之得矢夫測曰虛邪矢夫得賢臣也大虛謂神所宅也失夫直臣也羡而過中故曰大虛既邪當日之晝故或直之或翼之得賢臣以正其邪也齊桓公得管仲行若狗彘強伯諸侯衛靈公得仲叔圉祝他王孫賈雖無道而不喪次七曲其故迂其塗厲之訓測曰曲其故為作意也范王小宋本訓作馴今從宋陸本次八羡其足濟于溝瀆面貞測曰羡其足避凶事也面向也八為禍中而當晝故邪其足者以避溝瀆也君子屈其節者以避禍患也其終也歸於向正而已法言曰塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸又曰水避礙則通于海君子避礙則通于理上九車軸折其衡抈四馬就括高人吐血測曰軸折吐血終不可悔也二宋陸本抈作相今從范王本抈音月范曰抈折也光謂括結也行邪不已至於禍極故軸折衡抈四馬絓結而車上之人被傷也高人以諭在高位者一方二州一部二家差陽家火亦準小過入差次二十三分二十二秒日次諏訾立春氣應斗建寅位律中太簇次五日舍營室差者過之小者也陽氣蠢鬪於東帝由群雍物差其容陽氣動開於東天道由於衆和物容差殊差之象也初一微失自攻端測曰微失自攻人未知也一為思始其差尚微人未之見荀能自治不害於正也次二寖其所好將以致其所惡測曰寖其所好漸以差也王本寖作寢今從宋陸范本好呼報切惡鳥路切寖漸也所好謂利欲也所惡謂禍殃也二為思中而當夜惑於利欲寖以差失將至禍殃也次三其亡其亡將至于暉光測曰其亡其亡震自衛也王曰震懼也光謂三為思上而當晝能知其過常若將亡震懼自衛乃至暉光也次四過小善不克測曰過小善不能至大也小人偏介不協中庸過於小善不能至大也如尾生鮑焦要離之類次五過門折入得彼中行測曰過門折入近復還也范本彼作此今從宋陸本折之舌切家性為差五為中和如行已過門而能折入不失其中行也次六大跌過其門不入其室測曰大跌不入誠可患也六過於中跌已大矣過門不入遂至失所也孔子曰過而不改是謂過矣次七纍卵業業懼貞安測曰纍卵業業自危作安也過以入禍故曰纍卵當日之晝故能自危臨禍而懼則不失正安矣次八足纍纍其步躟𨄍輔銘滅麋測曰足纍纍履禍不還也范本躟𨄍作蹉躟王本作蹉衰今從二宋陸本蹉七何切躟汝陽切𨄍倉回切小宋曰躟𨄍急行貌光謂輔頰車也銘當作名目上為名麋與眉同足纍纍其步躟𨄍謂邪行不已履禍寖深而不自知也故陷輔及名至於滅眉猶易之過涉滅頂凶也上九過其枯城或蘖青青測曰過其枯城改過更生也蘖牙葛切木斬而復生曰蘖過而不已至於禍極故曰過其枯城枯城者亡國之象也然當曰之晝能改過自新興衰起廢者也故曰或蘖青青集注太玄經卷之一
